<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>GM View — DJI Assistant</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0f172a;color:#e2e8f0;font-size:14px;min-height:100vh}
:root{--bg:#0f172a;--bg2:#1e293b;--bg3:#334155;--border:#334155;--text:#e2e8f0;--text2:#94a3b8;--text3:#64748b;--accent:#3b82f6;--red:#ef4444;--green:#22c55e;--orange:#f97316;--yellow:#eab308;--purple:#a855f7}

header{background:#1e293b;border-bottom:1px solid #334155;padding:12px 16px;position:sticky;top:0;z-index:50;display:flex;align-items:center;justify-content:space-between;gap:12px}
.hdr-left{display:flex;align-items:center;gap:10px}
.hdr-icon{font-size:22px}
.hdr-title{font-size:15px;font-weight:700}
.hdr-sub{font-size:10px;color:#64748b}
.hdr-refresh{background:none;border:1px solid #334155;color:#94a3b8;border-radius:6px;padding:5px 10px;font-size:11px;cursor:pointer}
.hdr-refresh:hover{border-color:#3b82f6;color:#3b82f6}

.tabs{display:flex;background:#1e293b;border-bottom:1px solid #334155;padding:0 12px;overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{padding:10px 16px;font-size:13px;cursor:pointer;border-bottom:2px solid transparent;color:#64748b;white-space:nowrap;transition:.15s}
.tab.act{border-bottom-color:#3b82f6;color:#3b82f6;font-weight:600}

.content{padding:12px;max-width:1100px;margin:0 auto}
.card{background:#1e293b;border:1px solid #334155;border-radius:12px;padding:14px;margin-bottom:10px}
.card-h{font-size:12px;font-weight:700;margin-bottom:10px;color:#94a3b8;text-transform:uppercase;letter-spacing:.5px;display:flex;align-items:center;justify-content:space-between}

/* Stats */
.stats-row{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:12px}
@media(min-width:500px){.stats-row{grid-template-columns:repeat(4,1fr)}}
.stat-card{background:#0f172a;border:1px solid #334155;border-radius:10px;padding:12px;text-align:center}
.stat-num{font-size:22px;font-weight:700;color:#3b82f6}
.stat-lbl{font-size:10px;color:#64748b;margin-top:3px}

/* Filter bar */
.fbar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px;align-items:center}
.fsel{padding:6px 10px;background:#1e293b;border:1px solid #334155;border-radius:7px;color:#e2e8f0;font-size:12px;outline:none;cursor:pointer}
.fsel:focus{border-color:#3b82f6}
.fsearch{padding:6px 10px;background:#0f172a;border:1px solid #334155;border-radius:7px;color:#e2e8f0;font-size:12px;outline:none;flex:1;min-width:120px}
.fsearch:focus{border-color:#3b82f6}
.fcount{font-size:11px;color:#64748b;margin-left:auto;white-space:nowrap}

/* Table */
.pipe-table{width:100%;border-collapse:collapse;font-size:12px}
.pipe-table th{background:#0f172a;padding:7px 8px;text-align:left;color:#64748b;font-weight:600;border-bottom:1px solid #334155;white-space:nowrap;position:sticky;top:0;z-index:1}
.pipe-table td{padding:8px;border-bottom:1px solid #1e293b;vertical-align:top}
.pipe-table tr:hover td{background:#1e293b;cursor:pointer}
.pipe-table tr.is-won td{background:#22c55e08}
.pipe-table tr.is-lost td{opacity:.55}

/* Badges */
.badge{display:inline-block;padding:2px 7px;border-radius:4px;font-size:10px;font-weight:700}
.b-main{background:#3b82f620;color:#3b82f6;border:1px solid #3b82f640}
.b-sales{background:#f9731620;color:#f97316;border:1px solid #f9731640}
.b-conflict{background:#ef444418;color:#ef4444;border:1px solid #ef444430}
.s-prospect{color:#94a3b8}.s-tor_review{color:#f97316}.s-quotation{color:#eab308}.s-bidding{color:#3b82f6}.s-negotiation{color:#a855f7}.s-win{color:#22c55e}.s-ordered{color:#10b981}.s-delivered{color:#10b981}.s-lost{color:#ef4444}

/* Modal */
.modal-bg{display:none;position:fixed;inset:0;background:#0009;z-index:200;align-items:flex-end;justify-content:center}
.modal-bg.open{display:flex}
.modal-box{background:#1e293b;border:1px solid #334155;border-radius:16px 16px 0 0;width:100%;max-width:560px;max-height:92vh;overflow-y:auto;padding:18px 16px}
.modal-hd{font-size:15px;font-weight:700;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center;gap:8px}
.modal-x{background:none;border:none;color:#94a3b8;font-size:20px;cursor:pointer}

/* Form (modal) */
.fg{margin-bottom:10px}
.fg label{display:block;font-size:11px;color:#94a3b8;margin-bottom:3px}
.fi{width:100%;padding:9px 11px;background:#0f172a;border:1px solid #334155;border-radius:8px;color:#e2e8f0;font-size:13px;outline:none}
.fi:focus{border-color:#3b82f6}
.fi-row{display:flex;gap:8px}.fi-row .fg{flex:1}
textarea.fi{resize:vertical;min-height:65px}
select.fi option{background:#1e293b}
.fa{display:flex;gap:8px;margin-top:14px}
.btn{padding:9px 14px;border-radius:8px;border:none;font-size:13px;font-weight:600;cursor:pointer}
.btn-p{background:#3b82f6;color:#fff}.btn-o{background:transparent;color:#94a3b8;border:1px solid #334155}.btn-d{background:#ef4444;color:#fff}
.btn-sm{padding:5px 10px;font-size:11px}

/* Detail rows in modal */
.drow{padding:6px 0;border-bottom:1px solid #334155;display:flex;gap:10px;font-size:12px}
.dk{color:#64748b;width:90px;flex-shrink:0;font-size:11px}
.dv{color:#e2e8f0}

/* Conflict item */
.conflict-item{display:flex;align-items:flex-start;gap:10px;padding:10px 12px;background:#ef444408;border:1px solid #ef444420;border-radius:8px;margin-bottom:6px}

/* Forecast funnel */
.funnel-row{display:flex;align-items:center;gap:10px;padding:6px 0;border-bottom:1px solid #1e293b}
.funnel-label{width:90px;font-size:11px;font-weight:600;flex-shrink:0}
.funnel-bar-wrap{flex:1;background:#334155;border-radius:3px;overflow:hidden;height:14px}
.funnel-bar{height:14px;border-radius:3px;background:#3b82f6}
.funnel-amt{width:70px;text-align:right;font-size:11px;color:#3b82f6;flex-shrink:0}
.funnel-cnt{width:36px;text-align:right;font-size:11px;color:#64748b;flex-shrink:0}

/* Month grid */
.month-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.month-cell{background:#0f172a;border:1px solid #334155;border-radius:8px;padding:10px;cursor:pointer}
.month-cell:hover{border-color:#3b82f6}
.month-cell.cur{border-color:#3b82f6;background:#3b82f610}
.month-name{font-size:11px;color:#64748b;margin-bottom:4px}
.month-amt{font-size:15px;font-weight:700;color:#3b82f6}
.month-cnt{font-size:10px;color:#64748b}
.month-bar-wrap{background:#334155;border-radius:3px;overflow:hidden;height:4px;margin-top:6px}
.month-bar{height:4px;background:#3b82f6;border-radius:3px}

/* Member forecast table */
.mem-table{width:100%;border-collapse:collapse;font-size:12px}
.mem-table th{padding:7px 8px;text-align:left;color:#64748b;font-weight:600;border-bottom:1px solid #334155}
.mem-table td{padding:7px 8px;border-bottom:1px solid #1e293b;vertical-align:middle}

/* Loading */
.loading{text-align:center;padding:40px;color:#64748b;font-size:13px}
.empty{text-align:center;padding:32px;color:#64748b;font-size:13px}

/* PIN Screen */
#pinScreen{display:none;position:fixed;inset:0;background:#0f172a;z-index:300;align-items:center;justify-content:center;flex-direction:column}
#pinScreen.show{display:flex}
.pin-box{background:#1e293b;border:1px solid #334155;border-radius:16px;padding:28px 24px;width:100%;max-width:340px;text-align:center}
.pin-icon{font-size:40px;margin-bottom:12px}
.pin-title{font-size:17px;font-weight:700;margin-bottom:4px}
.pin-sub{font-size:12px;color:#64748b;margin-bottom:20px}
.pin-input{width:100%;padding:12px;background:#0f172a;border:1px solid #334155;border-radius:10px;color:#e2e8f0;font-size:20px;text-align:center;letter-spacing:6px;outline:none;margin-bottom:6px}
.pin-input:focus{border-color:#3b82f6}
.pin-err{font-size:12px;color:#ef4444;min-height:18px;margin-bottom:10px}
.pin-btn{width:100%;padding:11px;background:#3b82f6;border:none;border-radius:10px;color:#fff;font-size:14px;font-weight:700;cursor:pointer}
.pin-btn:hover{background:#2563eb}
.btn-logout{background:none;border:1px solid #334155;color:#64748b;border-radius:6px;padding:5px 10px;font-size:11px;cursor:pointer;margin-left:8px}
.btn-logout:hover{border-color:#ef4444;color:#ef4444}

/* Toast */
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:10px 20px;border-radius:8px;font-size:13px;z-index:999;opacity:0;transition:opacity .2s;pointer-events:none;white-space:nowrap;max-width:90vw}
#toast.show{opacity:1}

@media(max-width:500px){.hide-sm{display:none}}
</style>
</head>

// ── AUTH ───────────────────────────────────────────────
var GM_PIN = null;

function init() {
  if(sessionStorage.getItem('gm_auth')==='1'){showApp();return;}
  db.collection('teamConfig').doc('main').get().then(function(doc){

      showApp();
    }

// ── STATE ──────────────────────────────────────────────
var allPipeline = [];
var conflicts = [];
var currentTab = 'overview';
var filterOwner = 'all';
var filterStatus = 'all';
var searchQ = '';
var editingPipeId = null;
var _toastTimer;

var PIPE_STATUSES = [
  {id:'prospect',name:'Prospect',cls:'s-prospect'},
  {id:'tor_review',name:'TOR Review',cls:'s-tor_review'},
  {id:'quotation',name:'Quotation',cls:'s-quotation'},
  {id:'bidding',name:'Bidding',cls:'s-bidding'},
  {id:'negotiation',name:'Negotiation',cls:'s-negotiation'},
  {id:'win',name:'Win',cls:'s-win'},
  {id:'ordered',name:'Ordered',cls:'s-ordered'},
  {id:'delivered',name:'Delivered',cls:'s-delivered'},
  {id:'lost',name:'Lost',cls:'s-lost'}
];
var ACTIVE = ['prospect','tor_review','quotation','bidding','negotiation','win','ordered'];
var MONTHS_TH = ['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];

// ── LOAD ───────────────────────────────────────────────
function loadData() {
  document.getElementById('mainContent').innerHTML = '<div class="loading">🔄 กำลังโหลด...</div>';
  db.collection('teamPipeline').get().then(function(snap) {
    allPipeline = [];
    snap.forEach(function(d) { allPipeline.push(d.data()); });
    allPipeline.sort(function(a,b) { return (b.updatedAt||'').localeCompare(a.updatedAt||''); });
    conflicts = detectConflicts(allPipeline);
    var owners = [];
    allPipeline.forEach(function(p) { if(p.ownerName && owners.indexOf(p.ownerName)===-1) owners.push(p.ownerName); });
    document.getElementById('hdrSub').textContent = 'DJI Sales Team · ' + allPipeline.length + ' Pipeline · ' + owners.length + ' คน';
    renderTab(currentTab);
  }).catch(function(e) {
    document.getElementById('mainContent').innerHTML = '<div class="empty">❌ ' + e.message + '</div>';
  });
}

function reload() { loadData(); }

// ── CONFLICT DETECTION ─────────────────────────────────
function bigrams(str) {
  var s=(str||'').toLowerCase().replace(/\s+/g,''),set={};
  for(var i=0;i<s.length-1;i++)set[s[i]+s[i+1]]=true;
  return set;
}
function bigramSim(a,b) {
  var ba=bigrams(a),bb=bigrams(b),inter=0,ua=Object.keys(ba).length,ub=Object.keys(bb).length;
  Object.keys(ba).forEach(function(k){if(bb[k])inter++;});
  return(ua+ub)===0?0:Math.round(2*inter/(ua+ub)*100);
}
function pipeScore(a,b) {
  return Math.round(bigramSim(a.projectName,b.projectName)*0.5+bigramSim(a.endUserTH,b.endUserTH)*0.35+bigramSim(a.endUserEN,b.endUserEN)*0.15);
}
function detectConflicts(pipes) {
  var active=pipes.filter(function(p){return ACTIVE.indexOf(p.status)!==-1;});
  var pairs=[];
  for(var i=0;i<active.length;i++) for(var j=i+1;j<active.length;j++) {
    if(active[i].ownerId&&active[i].ownerId===active[j].ownerId)continue;
    var sc=pipeScore(active[i],active[j]);
    if(sc>=60)pairs.push({a:active[i],b:active[j],score:sc});
  }
  return pairs.sort(function(a,b){return b.score-a.score;});
}

// ── TABS ───────────────────────────────────────────────
function showTab(tab) {
  currentTab=tab;
  document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('act');});
  var map={overview:'tabOverview',pipeline:'tabPipeline',conflicts:'tabConflicts',forecast:'tabForecast'};
  if(map[tab])document.getElementById(map[tab]).classList.add('act');
  renderTab(tab);
}
function renderTab(tab) {
  if(tab==='overview')renderOverview();
  else if(tab==='pipeline')renderPipelineTab();
  else if(tab==='conflicts')renderConflictsTab();
  else if(tab==='forecast')renderForecastTab();
}

// ── OVERVIEW ───────────────────────────────────────────
function renderOverview() {
  var active=allPipeline.filter(function(p){return ACTIVE.indexOf(p.status)!==-1;});
  var won=allPipeline.filter(function(p){return['win','ordered','delivered'].indexOf(p.status)!==-1;});
  var totalAmt=active.reduce(function(s,p){return s+(Number(p.forecastAmount)||0);},0);
  var wonAmt=won.reduce(function(s,p){return s+(Number(p.forecastAmount)||0);},0);

  var ownerMap={};
  allPipeline.forEach(function(p){
    var k=p.ownerName||'?';
    if(!ownerMap[k])ownerMap[k]={name:k,type:p.ownerType,cnt:0,active:0,amt:0,won:0};
    ownerMap[k].cnt++;
    if(ACTIVE.indexOf(p.status)!==-1){ownerMap[k].active++;ownerMap[k].amt+=Number(p.forecastAmount)||0;}
    if(['win','ordered','delivered'].indexOf(p.status)!==-1)ownerMap[k].won+=Number(p.forecastAmount)||0;
  });

  var now=new Date();
  var months=[];
  for(var m=0;m<6;m++){
    var d=new Date(now.getFullYear(),now.getMonth()+m,1);
    months.push({year:d.getFullYear(),month:d.getMonth(),label:MONTHS_TH[d.getMonth()]+' '+(d.getFullYear()%100),amt:0,cnt:0});
  }
  allPipeline.forEach(function(p){
    if(ACTIVE.indexOf(p.status)===-1)return;
    var ds=p.expectedCloseDate||p.biddingDate||'';if(!ds)return;
    var dt=new Date(ds);if(isNaN(dt.getTime()))return;
    months.forEach(function(m){if(dt.getFullYear()===m.year&&dt.getMonth()===m.month){m.amt+=Number(p.forecastAmount)||0;m.cnt++;}});
  });
  var maxAmt=Math.max(1,months.reduce(function(s,m){return Math.max(s,m.amt);},0));

  var h='<div class="stats-row">';
  h+='<div class="stat-card"><div class="stat-num">'+allPipeline.length+'</div><div class="stat-lbl">Pipeline ทั้งหมด</div></div>';
  h+='<div class="stat-card"><div class="stat-num" style="color:#22c55e">'+fmtShort(totalAmt)+'</div><div class="stat-lbl">Active Forecast ฿</div></div>';
  h+='<div class="stat-card"><div class="stat-num" style="color:#a855f7">'+fmtShort(wonAmt)+'</div><div class="stat-lbl">Won ฿</div></div>';
  h+='<div class="stat-card"><div class="stat-num" style="color:#ef4444">'+conflicts.length+'</div><div class="stat-lbl">⚠️ ชนกัน</div></div>';
  h+='</div>';

  h+='<div class="card"><div class="card-h">👥 สรุปแยกตามทีม</div>';
  Object.values(ownerMap).sort(function(a,b){return b.amt-a.amt;}).forEach(function(o){
    var cls=o.type==='main'?'b-main':'b-sales';
    var pct=totalAmt>0?Math.round(o.amt/totalAmt*100):0;
    h+='<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid #334155">';
    h+='<span class="badge '+cls+'" style="min-width:70px;text-align:center">'+esc(o.name)+'</span>';
    h+='<div style="flex:1">';
    h+='<div style="display:flex;justify-content:space-between;font-size:11px;margin-bottom:3px"><span>'+o.active+' active / '+o.cnt+' ทั้งหมด</span><span style="color:#3b82f6">'+fmtShort(o.amt)+' ฿</span></div>';
    h+='<div style="background:#334155;border-radius:3px;height:6px"><div style="background:'+(o.type==='main'?'#3b82f6':'#f97316')+';border-radius:3px;height:6px;width:'+pct+'%"></div></div>';
    h+='</div>';
    h+='<div style="text-align:right;font-size:10px;color:#22c55e;min-width:50px">'+(o.won>0?'Won<br>'+fmtShort(o.won):'')+'</div>';
    h+='</div>';
  });
  h+='</div>';

  h+='<div class="card"><div class="card-h">📅 Timeline 6 เดือน (Expected Close)</div>';
  h+='<div class="month-grid">';
  months.forEach(function(m){
    var isCur=m.year===now.getFullYear()&&m.month===now.getMonth();
    var pct=Math.round(m.amt/maxAmt*100);
    h+='<div class="month-cell'+(isCur?' cur':'')+'" onclick="showMonthDetail('+m.year+','+m.month+')">';
    h+='<div class="month-name">'+m.label+'</div>';
    h+='<div class="month-amt">'+(m.amt>0?fmtShort(m.amt):'—')+'</div>';
    h+='<div class="month-cnt">'+(m.cnt>0?m.cnt+' โครงการ':'')+'</div>';
    h+='<div class="month-bar-wrap"><div class="month-bar" style="width:'+pct+'%"></div></div>';
    h+='</div>';
  });

// ── PIPE DETAIL + EDIT ─────────────────────────────────
function openPipeDetail(pipeId) {
  var tp=allPipeline.find(function(x){return x.id===pipeId;});
  if(!tp)return;
  openModal('🔄 กำลังโหลด...','<div class="loading">กำลังดึงข้อมูลเต็ม...</div>');

  // Load full doc from source
  var srcRef = tp.ownerType==='sales'
    ? db.collection('salesMembers').doc(tp.ownerId).collection('pipeline').doc(pipeId)
    : db.collection('users').doc(tp.ownerId).collection('pipeline').doc(pipeId);

  srcRef.get().then(function(doc){
    var p = doc.exists ? Object.assign({},tp,doc.data()) : tp;
    showPipeDetail(p, tp);
  }).catch(function(){
    showPipeDetail(tp, tp);
  });
}

function pipeItems(p) {
  if(p.items&&p.items.length)return p.items;
  if(p.model)return[{model:p.model,qty:Number(p.modelQty)||1,total:Number(p.forecastAmount)||0}];
  return[];
}
function pipeModelSummary(p) {
  return pipeItems(p).map(function(it){return(it.model||'')+(it.qty>1?' x'+it.qty:'');}).filter(Boolean).join(', ');
}
function fDate(s){if(!s)return'—';var d=new Date(s);return isNaN(d)?s:d.toLocaleDateString('th-TH',{day:'numeric',month:'short',year:'2-digit'});}
function daysLeft(s,done){
  if(!s||done)return'';
  var diff=Math.round((new Date(s)-new Date())/(864e5));
  if(diff<0)return'<span style="color:#ef4444;font-size:9px"> (เกินแล้ว '+(Math.abs(diff))+'วัน)</span>';
  if(diff<=7)return'<span style="color:#f97316;font-size:9px"> (อีก '+diff+' วัน)</span>';
  return'<span style="color:#64748b;font-size:9px"> (อีก '+diff+' วัน)</span>';
}

function savePipeEdit() {
  var pipeId=editingPipeId;
  var tp=allPipeline.find(function(x){return x.id===pipeId;});
  if(!tp||!pipeId)return;

  var upd={
    projectName:document.getElementById('ep_proj').value.trim(),
    endUserTH:document.getElementById('ep_eu').value.trim(),
    endUserEN:document.getElementById('ep_euen').value.trim(),
    status:document.getElementById('ep_status').value,
    forecastAmount:parseNum(document.getElementById('ep_amt').value),
    model:document.getElementById('ep_model').value.trim(),
    expectedCloseDate:document.getElementById('ep_close').value,
    remark:document.getElementById('ep_remark').value.trim(),
    updatedAt:new Date().toISOString()
  };

  // teamPipeline fields
  var tpUpd={
    projectName:upd.projectName, endUserTH:upd.endUserTH, endUserEN:upd.endUserEN,
    status:upd.status, forecastAmount:upd.forecastAmount, updatedAt:upd.updatedAt
  };

  var srcRef=tp.ownerType==='sales'
    ?db.collection('salesMembers').doc(tp.ownerId).collection('pipeline').doc(pipeId)
    :db.collection('users').doc(tp.ownerId).collection('pipeline').doc(pipeId);

  var isActive=ACTIVE.indexOf(upd.status)!==-1;
  var tpRef=db.collection('teamPipeline').doc(pipeId);

  Promise.all([
    srcRef.update(upd),
    isActive ? tpRef.update(tpUpd) : tpRef.delete().catch(function(){})
  ]).then(function(){
    // Update local state
    Object.assign(tp,tpUpd);
    if(!isActive) allPipeline=allPipeline.filter(function(x){return x.id!==pipeId;});
    conflicts=detectConflicts(allPipeline);
    closeModal();
    showToast('✅ บันทึกแล้ว');
  }).catch(function(e){ showToast('❌ '+e.message); });
}

function renderConflictsTab() {
  var h='';
  if(!conflicts.length){h='<div class="empty">✅ ไม่มีโครงการที่อาจชนกัน</div>';}
  else{
    h+='<div style="font-size:11px;color:#64748b;margin-bottom:10px">'+conflicts.length+' คู่ที่อาจชนกัน (bigram similarity ≥ 60%)</div>';
    conflicts.forEach(function(c){
      var sc=c.score;
      var scColor=sc>=80?'#ef4444':sc>=70?'#f97316':'#eab308';
      var aT=c.a.ownerType==='main'?'b-main':'b-sales';
      var bT=c.b.ownerType==='main'?'b-main':'b-sales';
      h+='<div class="conflict-item">';
      h+='<div><div style="font-size:14px;font-weight:800;color:'+scColor+'">'+sc+'%</div><div style="font-size:10px;color:#64748b">คล้าย</div></div>';
      h+='<div style="flex:1;min-width:0">';
      h+='<div style="background:#0f172a;border-radius:6px;padding:8px;margin-bottom:5px;cursor:pointer" onclick="openPipeDetail(\''+c.a.id+'\')">';
      h+='<div style="display:flex;align-items:center;gap:6px"><span class="badge '+aT+'" style="font-size:9px">'+esc(c.a.ownerName||'?')+'</span>';
      h+='<span style="font-size:12px;font-weight:600">'+esc((c.a.projectName||'—').substr(0,40))+'</span></div>';
      h+='<div style="font-size:10px;color:#64748b;margin-top:2px">🏪 '+esc(c.a.dealerName||'—')+(c.a.endUserTH?' · '+esc(c.a.endUserTH.substr(0,25)):'')+'</div>';
      h+='</div>';
      h+='<div style="background:#0f172a;border-radius:6px;padding:8px;cursor:pointer" onclick="openPipeDetail(\''+c.b.id+'\')">';
      h+='<div style="display:flex;align-items:center;gap:6px"><span class="badge '+bT+'" style="font-size:9px">'+esc(c.b.ownerName||'?')+'</span>';
      h+='<span style="font-size:12px;font-weight:600">'+esc((c.b.projectName||'—').substr(0,40))+'</span></div>';
      h+='<div style="font-size:10px;color:#64748b;margin-top:2px">🏪 '+esc(c.b.dealerName||'—')+(c.b.endUserTH?' · '+esc(c.b.endUserTH.substr(0,25)):'')+'</div>';
      h+='</div>';
      h+='</div></div>';
    });
  }
  document.getElementById('mainContent').innerHTML=h;
}

// ── FORECAST TAB ───────────────────────────────────────
function renderForecastTab() {
  var active=allPipeline.filter(function(p){return ACTIVE.indexOf(p.status)!==-1;});
  var totalAmt=active.reduce(function(s,p){return s+(Number(p.forecastAmount)||0);},0);
  var wonAmt=allPipeline.filter(function(p){return['win','ordered'].indexOf(p.status)!==-1;}).reduce(function(s,p){return s+(Number(p.forecastAmount)||0);},0);
  var topDeals=allPipeline.filter(function(p){return p.forecastAmount>0;}).sort(function(a,b){return(Number(b.forecastAmount)||0)-(Number(a.forecastAmount)||0);}).slice(0,10);

  // Funnel by status
  var byStatus={};
  PIPE_STATUSES.forEach(function(s){byStatus[s.id]={cnt:0,amt:0};});
  active.forEach(function(p){if(byStatus[p.status]){byStatus[p.status].cnt++;byStatus[p.status].amt+=Number(p.forecastAmount)||0;}});
  var maxFunnel=Math.max(1,Object.values(byStatus).reduce(function(s,x){return Math.max(s,x.amt);},0));

  // Per-member
  var ownerAmt={};
  active.forEach(function(p){
    var k=p.ownerName||'?';
    if(!ownerAmt[k])ownerAmt[k]={name:k,type:p.ownerType,amt:0,cnt:0,won:0};
    ownerAmt[k].amt+=Number(p.forecastAmount)||0;ownerAmt[k].cnt++;
  });
  allPipeline.filter(function(p){return['win','ordered','delivered'].indexOf(p.status)!==-1;}).forEach(function(p){
    var k=p.ownerName||'?';
    if(ownerAmt[k])ownerAmt[k].won+=Number(p.forecastAmount)||0;
  });
  var maxOwner=Math.max(1,Object.values(ownerAmt).reduce(function(s,o){return Math.max(s,o.amt);},0));

  var h='<div class="stats-row">';
  h+='<div class="stat-card"><div class="stat-num">'+fmtShort(totalAmt)+'</div><div class="stat-lbl">Active Forecast ฿</div></div>';
  h+='<div class="stat-card"><div class="stat-num" style="color:#22c55e">'+fmtShort(wonAmt)+'</div><div class="stat-lbl">Won / Ordered ฿</div></div>';
  h+='<div class="stat-card"><div class="stat-num">'+active.length+'</div><div class="stat-lbl">โครงการ Active</div></div>';
  h+='<div class="stat-card"><div class="stat-num" style="color:#f97316">'+(totalAmt>0?Math.round(wonAmt/totalAmt*100):0)+'%</div><div class="stat-lbl">Win Rate</div></div>';
  h+='</div>';

  // Funnel
  h+='<div class="card"><div class="card-h">📊 Pipeline Funnel</div>';
  ['prospect','tor_review','quotation','bidding','negotiation','win','ordered'].forEach(function(id){
    var st=PIPE_STATUSES.find(function(s){return s.id===id;})||{};
    var d=byStatus[id]||{cnt:0,amt:0};if(!d.cnt)return;
    var pct=Math.round(d.amt/maxFunnel*100);
    h+='<div class="funnel-row"><div class="funnel-label '+( st.cls||'')+'">'+(st.name||id)+'</div>';
    h+='<div class="funnel-bar-wrap"><div class="funnel-bar" style="width:'+pct+'%"></div></div>';
    h+='<div class="funnel-amt">'+fmtShort(d.amt)+'</div><div class="funnel-cnt">'+d.cnt+'</div>';
    h+='</div>';
  });
  h+='</div>';

  // Per-member table
  h+='<div class="card"><div class="card-h">👥 แยกตาม Sales</div>';
  h+='<div style="overflow-x:auto"><table class="mem-table"><thead><tr><th>Sales</th><th>Active งาน</th><th>Forecast ฿</th><th>Won ฿</th><th>% ของทีม</th><th>Win Rate</th></tr></thead><tbody>';
  Object.values(ownerAmt).sort(function(a,b){return b.amt-a.amt;}).forEach(function(o){
    var pct=totalAmt>0?Math.round(o.amt/totalAmt*100):0;
    var winRate=o.amt>0?Math.round(o.won/o.amt*100):0;
    var cls=o.type==='main'?'b-main':'b-sales';
    h+='<tr>';
    h+='<td><span class="badge '+cls+'">'+esc(o.name)+'</span></td>';
    h+='<td style="text-align:center">'+o.cnt+'</td>';
    h+='<td style="color:#3b82f6;font-weight:700">'+fmtShort(o.amt)+'</td>';
    h+='<td style="color:#22c55e">'+fmtShort(o.won)+'</td>';
    h+='<td><div style="display:flex;align-items:center;gap:6px"><div style="background:#334155;border-radius:3px;height:6px;width:60px"><div style="background:'+(o.type==='main'?'#3b82f6':'#f97316')+';border-radius:3px;height:6px;width:'+pct+'%"></div></div><span style="font-size:10px;color:#64748b">'+pct+'%</span></div></td>';
    h+='<td style="color:'+(winRate>=50?'#22c55e':winRate>=30?'#f97316':'#64748b')+'">'+winRate+'%</td>';
    h+='</tr>';
  });
  h+='</tbody></table></div></div>';

  // Top deals
  h+='<div class="card"><div class="card-h">🏆 Top 10 โครงการ (มูลค่าสูงสุด)</div>';
  topDeals.forEach(function(p,i){
    var st=PIPE_STATUSES.find(function(s){return s.id===p.status;})||{};
    var cls=p.ownerType==='main'?'b-main':'b-sales';
    h+='<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid #1e293b;cursor:pointer" onclick="openPipeDetail(\''+p.id+'\')">';
    h+='<span style="font-size:12px;font-weight:700;color:#64748b;width:22px;text-align:right">'+(i+1)+'</span>';
    h+='<div style="flex:1;min-width:0"><div style="font-size:12px;font-weight:600">'+esc((p.projectName||'—').substr(0,40))+'</div>';
    h+='<div style="font-size:10px;color:#64748b">'+esc((p.dealerName||'—').substr(0,25))+(p.endUserTH?' · '+esc(p.endUserTH.substr(0,20)):'')+'</div></div>';
    h+='<span class="'+(st.cls||'')+'" style="font-size:10px;font-weight:600">'+( st.name||p.status)+'</span>';
    h+='<span style="font-size:13px;font-weight:700;color:#3b82f6;min-width:55px;text-align:right">'+fmtShort(p.forecastAmount)+'</span>';
    h+='<span class="badge '+cls+'" style="font-size:9px">'+esc((p.ownerName||'?').split(' ')[0])+'</span>';
    h+='</div>';
  });
  h+='</div>';

  document.getElementById('mainContent').innerHTML=h;
}

// ── MODAL ──────────────────────────────────────────────
function openModal(title,body){
  document.getElementById('modalTitle').textContent=title;
  document.getElementById('modalBody').innerHTML=body;
  document.getElementById('modalBg').classList.add('open');
}
function closeModal(){
  document.getElementById('modalBg').classList.remove('open');
  editingPipeId=null;
}

// ── UTILS ──────────────────────────────────────────────
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function parseNum(v){if(v==null)return 0;var n=parseFloat(String(v).replace(/,/g,''));return isNaN(n)?0:n;}
function nmI(v){if(v===''||v==null)return'';var n=parseFloat(String(v).replace(/,/g,''));if(isNaN(n))return'';return n.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});}
function _moneyLiveFmt(el){var sel=el.selectionStart||0;var db=el.value.slice(0,sel).replace(/[^0-9]/g,'').length;var raw=el.value.replace(/[^0-9.]/g,'');var p=raw.split('.');var ip=p[0]||'';var dc=p.length>1?'.'+p.slice(1).join('').slice(0,2):'';el.value=ip.replace(/\B(?=(\d{3})+(?!\d))/g,',')+dc;var pos=0,c=0;while(pos<el.value.length&&c<db){if(/[0-9]/.test(el.value[pos]))c++;pos++;}try{el.setSelectionRange(pos,pos);}catch(_){}}
function _moneyBlurFmt(el){var raw=el.value.replace(/,/g,'').trim();if(raw===''||raw==='.'){el.value='';return;}var n=parseFloat(raw);el.value=isNaN(n)?'':n.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});}
document.addEventListener('input',function(e){var t=e.target;if(t&&t.classList&&t.classList.contains('js-money'))_moneyLiveFmt(t);});
document.addEventListener('focusout',function(e){var t=e.target;if(t&&t.classList&&t.classList.contains('js-money'))_moneyBlurFmt(t);});
function fmtShort(n){n=Number(n)||0;if(n>=1e6)return(n/1e6).toFixed(1)+'M';if(n>=1e3)return(n/1e3).toFixed(0)+'K';return n.toString();}
function showToast(msg){
  var el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');
  clearTimeout(_toastTimer);_toastTimer=setTimeout(function(){el.classList.remove('show');},2500);
}

init();
</script>
