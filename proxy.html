<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>API Proxy</title>
</head>
<body>
<script>
  (function() {
    var urlParams = new URLSearchParams(window.location.search);
    var targetUrl = urlParams.get('url');
    var method = urlParams.get('method') || 'GET';
    var dataStr = urlParams.get('data');
    
    if (!targetUrl) {
      document.body.innerHTML = JSON.stringify({ error: 'Missing url parameter' });
      return;
    }
    
    // Decode URL
    targetUrl = decodeURIComponent(targetUrl);
    
    var options = {
      method: method,
      mode: 'cors',
      headers: {
        'Content-Type': 'application/json'
      }
    };
    
    if (method === 'POST' && dataStr) {
      options.body = decodeURIComponent(dataStr);
    }
    
    fetch(targetUrl, options)
      .then(function(res) {
        // ตรวจสอบว่า response เป็น JSON หรือ HTML
        var contentType = res.headers.get('content-type');
        if (contentType && contentType.indexOf('application/json') !== -1) {
          return res.json();
        } else {
          return res.text().then(function(text) {
            throw new Error('Server returned HTML instead of JSON. Status: ' + res.status);
          });
        }
      })
      .then(function(data) {
        document.body.innerHTML = JSON.stringify(data);
      })
      .catch(function(err) {
        document.body.innerHTML = JSON.stringify({ error: err.message });
      });
  })();
</script>
</body>
</html>
