<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Sales View — DJI Assistant</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0f172a;--bg2:#1e293b;--bg3:#334155;--border:#334155;--text:#e2e8f0;--text2:#94a3b8;--text3:#64748b;--accent:#3b82f6;--red:#ef4444;--green:#22c55e;--orange:#f97316;--yellow:#eab308;--purple:#a855f7}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);font-size:14px;min-height:100vh}

/* PIN */
#pinScreen{display:flex;align-items:center;justify-content:center;min-height:100vh}
.pin-box{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:32px;max-width:340px;width:90%;text-align:center}
.pin-logo{font-size:48px;margin-bottom:8px}
.pin-title{font-size:18px;font-weight:700;margin-bottom:4px}
.pin-sub{font-size:12px;color:var(--text3);margin-bottom:24px}
.pin-input{width:100%;padding:14px;font-size:22px;letter-spacing:8px;text-align:center;background:var(--bg);border:2px solid var(--border);border-radius:10px;color:var(--text);outline:none;margin-bottom:12px}
.pin-input:focus{border-color:var(--accent)}
.pin-btn{width:100%;padding:12px;background:var(--accent);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer}
.pin-err{color:var(--red);font-size:12px;margin-top:8px;min-height:20px}

/* LAYOUT */
#mainApp{display:none;flex-direction:column;height:100vh;overflow:hidden}

/* TOPBAR */
.topbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:9px 12px;display:flex;align-items:center;gap:8px;flex-shrink:0;min-height:50px}
.tb-back{background:none;border:none;color:var(--text2);font-size:24px;cursor:pointer;padding:0 4px;line-height:1;flex-shrink:0}
.tb-info{flex:1;min-width:0}
.tb-name{font-size:14px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tb-sub{font-size:10px;color:var(--text3)}
.tb-action{background:transparent;border:1px solid var(--border);color:var(--text2);border-radius:6px;padding:5px 10px;font-size:11px;cursor:pointer;flex-shrink:0}

/* DEALER TABS */
.dtab-bar{display:none;overflow-x:auto;background:var(--bg2);border-bottom:1px solid var(--border);scrollbar-width:none;flex-shrink:0}
.dtab-bar::-webkit-scrollbar{display:none}
.dtab-bar-inner{display:flex;padding:0 4px;min-width:max-content}
.dtab{padding:8px 10px;font-size:11px;color:var(--text3);white-space:nowrap;cursor:pointer;border-bottom:2px solid transparent}
.dtab.act{color:var(--accent);border-bottom-color:var(--accent);font-weight:600}

/* CONTENT */
.view-wrap{flex:1;overflow-y:auto;overflow-x:hidden}
.view-inner{padding:10px 12px 80px;max-width:700px;margin:0 auto}

/* BOTTOM NAV */
.bnav{position:fixed;bottom:0;left:0;right:0;background:var(--bg2);border-top:1px solid var(--border);display:flex;z-index:90}
.bni{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:8px 4px 6px;color:var(--text3);font-size:9.5px;cursor:pointer;user-select:none}
.bni.act{color:var(--accent)}
.bni-ic{font-size:18px;line-height:1.2}

/* FAB */
.fab{position:fixed;bottom:68px;right:16px;width:48px;height:48px;border-radius:50%;background:var(--accent);color:#fff;font-size:22px;border:none;cursor:pointer;box-shadow:0 4px 16px #0008;display:flex;align-items:center;justify-content:center;z-index:80}
.fab:active{transform:scale(.92)}

/* CARDS */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:12px;margin-bottom:8px}

/* LIST ITEM */
.li{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:10px 12px;margin-bottom:6px;cursor:pointer}
.li:active{background:var(--bg2)}
.lt{font-weight:600;font-size:13px}
.ls{font-size:11px;color:var(--text3);margin-top:2px}

/* EMPTY */
.empty{text-align:center;padding:36px 16px;color:var(--text3);font-size:13px;line-height:1.8}

/* BADGES */
.badge{display:inline-block;padding:2px 7px;border-radius:5px;font-size:10px;font-weight:700}
.bd-blue{background:#3b82f620;color:#3b82f6;border:1px solid #3b82f640}
.bd-green{background:#22c55e20;color:#22c55e;border:1px solid #22c55e40}
.bd-red{background:#ef444420;color:#ef4444;border:1px solid #ef444440}
.bd-orange{background:#f9731620;color:#f97316;border:1px solid #f9731640}
.bd-yellow{background:#eab30820;color:#eab308;border:1px solid #eab30840}
.bd-grey{background:#33415520;color:#94a3b8;border:1px solid #33415540}
.bd-purple{background:#a855f720;color:#a855f7;border:1px solid #a855f740}
.conflict-tag{display:inline-block;padding:1px 6px;border-radius:4px;font-size:10px;background:#ef444418;color:#ef4444;border:1px solid #ef444430}

/* STATS */
.srow{display:grid;gap:8px;margin-bottom:10px}
.srow-2{grid-template-columns:repeat(2,1fr)}
.srow-3{grid-template-columns:repeat(3,1fr)}
.sc{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:10px 8px;text-align:center}
.sn{font-size:18px;font-weight:700;color:var(--accent)}
.sl{font-size:9.5px;color:var(--text3);margin-top:2px}

/* MODAL */
.modal-bg{display:none;position:fixed;inset:0;background:#0009;z-index:200;align-items:flex-end;justify-content:center}
.modal-bg.open{display:flex}
.modal-box{background:var(--bg2);border:1px solid var(--border);border-radius:16px 16px 0 0;width:100%;max-width:540px;max-height:92vh;overflow-y:auto;padding:16px}
.modal-hd{font-size:15px;font-weight:700;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center}
.modal-x{background:none;border:none;color:var(--text2);font-size:20px;cursor:pointer}

/* FORM */
.fg{margin-bottom:10px}
.fg label{display:block;font-size:11px;color:var(--text2);margin-bottom:3px}
.fi{width:100%;padding:9px 11px;background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:13px;outline:none}
.fi:focus{border-color:var(--accent)}
.fi-row{display:flex;gap:8px}
.fi-row .fg{flex:1}
textarea.fi{resize:vertical;min-height:70px}
select.fi option{background:var(--bg2)}
.fa{display:flex;gap:8px;margin-top:14px}
.btn{padding:9px 14px;border-radius:8px;border:none;font-size:13px;font-weight:600;cursor:pointer}
.btn-p{background:var(--accent);color:#fff}
.btn-o{background:transparent;color:var(--text2);border:1px solid var(--border)}
.btn-d{background:var(--red);color:#fff}
.btn-sm{padding:5px 10px;font-size:11px}

/* PIPE STATUS */
.s-prospect{color:#94a3b8}.s-tor_review{color:#f97316}.s-quotation{color:#eab308}.s-bidding{color:#3b82f6}.s-negotiation{color:#a855f7}.s-win{color:#22c55e}.s-ordered{color:#10b981}.s-delivered{color:#10b981}.s-lost{color:#ef4444}

/* VISIT LOG */
.log-item{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:10px 12px;margin-bottom:6px;cursor:pointer}
.log-meta{font-size:10px;color:var(--text3);margin-bottom:4px;display:flex;gap:8px;flex-wrap:wrap}
.log-body{font-size:12px;color:var(--text2);line-height:1.5}

/* TASKS */
.task-item{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:9px 12px;margin-bottom:5px;display:flex;align-items:flex-start;gap:10px}
.task-chk{width:17px;height:17px;border-radius:4px;border:2px solid var(--border);cursor:pointer;flex-shrink:0;margin-top:2px;display:flex;align-items:center;justify-content:center;font-size:11px}
.task-chk.done{background:var(--green);border-color:var(--green)}
.task-done{text-decoration:line-through;color:var(--text3)}
.task-due{font-size:10px;color:var(--text3)}
.task-due.ov{color:var(--red)}

/* TIMELINE */
.tl-wrap{padding-left:8px}
.tl-item{padding-left:16px;padding-bottom:14px;border-left:2px solid var(--border);margin-left:5px;position:relative}
.tl-item:last-child{border-left-color:transparent}
.tl-dot{width:10px;height:10px;border-radius:50%;background:var(--border);position:absolute;left:-6px;top:3px}
.tl-dot.v{background:var(--accent)}.tl-dot.p{background:var(--purple)}.tl-dot.t{background:var(--green)}.tl-dot.d{background:var(--orange)}
.tl-date{font-size:10px;color:var(--text3)}
.tl-text{font-size:12px;color:var(--text);margin-top:2px}

/* DEMO / FORECAST ITEMS */
.df-item{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:10px 12px;margin-bottom:6px;display:flex;justify-content:space-between;align-items:flex-start;gap:8px;cursor:pointer}
.df-main{flex:1;min-width:0}

/* ONBOARD */
.ob-item{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:10px 12px;margin-bottom:5px;display:flex;align-items:center;gap:10px;cursor:pointer}
.ob-chk{width:18px;height:18px;border-radius:50%;border:2px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px}
.ob-chk.done{background:var(--green);border-color:var(--green)}

/* SECTION LABEL */
.slbl{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin:12px 0 6px}
.slbl:first-child{margin-top:0}

/* DEALER INFO ROWS */
.drow{padding:7px 0;border-bottom:1px solid var(--border);display:flex;gap:10px}
.drow-k{font-size:11px;color:var(--text3);width:80px;flex-shrink:0}
.drow-v{font-size:12px}

/* TOAST */
#toast{position:fixed;bottom:76px;left:50%;transform:translateX(-50%);background:var(--bg2);border:1px solid var(--border);color:var(--text);padding:9px 18px;border-radius:8px;font-size:13px;z-index:999;opacity:0;transition:opacity .2s;pointer-events:none;white-space:nowrap;max-width:90vw;overflow:hidden;text-overflow:ellipsis}
#toast.show{opacity:1}
</style>
</head>
<body>

<div id="pinScreen">
  <div class="pin-box">
    <div class="pin-logo">👤</div>
    <div class="pin-title" id="pinTitle">Sales View</div>
    <div class="pin-sub" id="pinSub">กรุณาใส่ PIN เพื่อเข้าใช้งาน</div>
    <input type="password" class="pin-input" id="pinInput" maxlength="6" placeholder="••••" inputmode="numeric" autocomplete="off" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="pin-btn" onclick="doLogin()">🔓 เข้าสู่ระบบ</button>
    <div class="pin-err" id="pinErr"></div>
  </div>
</div>

<div id="mainApp">
  <div class="topbar">
    <button class="tb-back" id="tbBack" onclick="goBack()" style="display:none">‹</button>
    <div class="tb-info">
      <div class="tb-name" id="tbName">Sales View</div>
      <div class="tb-sub" id="tbSub">DJI Sales Assistant</div>
    </div>
    <div id="tbConflict"></div>
    <button class="tb-action" id="tbEdit" onclick="editCurrentDealer()" style="display:none">แก้ไข</button>
  </div>

  <div class="dtab-bar" id="dtabBar">
    <div class="dtab-bar-inner">
      <div class="dtab act" id="dt-info" onclick="setDtab('info')">📋 ข้อมูล</div>
      <div class="dtab" id="dt-pipeline" onclick="setDtab('pipeline')">📊 Pipeline</div>
      <div class="dtab" id="dt-visit" onclick="setDtab('visit')">🤝 Visit</div>
      <div class="dtab" id="dt-timeline" onclick="setDtab('timeline')">📝 Timeline</div>
      <div class="dtab" id="dt-demo" onclick="setDtab('demo')">🚁 Demo</div>
      <div class="dtab" id="dt-forecast" onclick="setDtab('forecast')">📦 Forecast</div>
      <div class="dtab" id="dt-tasks" onclick="setDtab('tasks')">📋 งาน</div>
      <div class="dtab" id="dt-onboard" onclick="setDtab('onboard')">🔄 Onboard</div>
    </div>
  </div>

  <div class="view-wrap"><div class="view-inner" id="vi"></div></div>

  <button class="fab" id="fabBtn" onclick="handleFab()">＋</button>

  <div class="bnav">
    <div class="bni act" id="bni-home" onclick="goView('home')"><span class="bni-ic">🏠</span>หน้าหลัก</div>
    <div class="bni" id="bni-dealers" onclick="goView('dealers')"><span class="bni-ic">🏪</span>Dealer</div>
    <div class="bni" id="bni-pipeline" onclick="goView('pipeline')"><span class="bni-ic">📊</span>Pipeline</div>
    <div class="bni" id="bni-tasks" onclick="goView('tasks')"><span class="bni-ic">📋</span>งาน</div>
  </div>
</div>

<div class="modal-bg" id="modalBg" onclick="if(event.target===this)closeModal()">
  <div class="modal-box">
    <div class="modal-hd"><span id="modalTitle"></span><button class="modal-x" onclick="closeModal()">✕</button></div>
    <div id="modalBody"></div>
  </div>
</div>

<div id="toast"></div>

<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>
<script>
firebase.initializeApp({
  apiKey:"AIzaSyB_qYvFINwOehVQ1Y6UJW9bHRL1iYcyM7w",
  authDomain:"work-assistant-9e024.firebaseapp.com",
  projectId:"work-assistant-9e024",
  storageBucket:"work-assistant-9e024.firebasestorage.app",
  messagingSenderId:"796607223436",
  appId:"1:796607223436:web:1455abe90b141104678da9"
});
var db = firebase.firestore();

// ── STATE ──────────────────────────────────────────────
var SALES_ID='', SALES_PROFILE=null;
var dealers=[], pipeline=[], visits=[], tasks=[], demoUnits=[], forecastItems=[], teamPipeline=[];
var currentView='home', currentDealer=null, currentDtab='info', editId=null;
var _toastT=null, _snapUnsubs=[], _rPending=false;

var PIPE_STATUSES=[
  {id:'prospect',name:'Prospect',cls:'s-prospect'},
  {id:'tor_review',name:'TOR Review',cls:'s-tor_review'},
  {id:'quotation',name:'Quotation',cls:'s-quotation'},
  {id:'bidding',name:'Bidding',cls:'s-bidding'},
  {id:'negotiation',name:'Negotiation',cls:'s-negotiation'},
  {id:'win',name:'Win',cls:'s-win'},
  {id:'ordered',name:'Ordered',cls:'s-ordered'},
  {id:'delivered',name:'Delivered',cls:'s-delivered'},
  {id:'lost',name:'Lost',cls:'s-lost'}
];
var DEALER_TYPES=['DJI Authorized Dealer','DJI Retail Partner','Corporate Reseller','System Integrator','Education Partner','Other'];
var DEALER_TIERS=['S','A','B','Other'];
var CREDIT_TERMS=['Cash','30 วัน','45 วัน','60 วัน','90 วัน','Other'];
var VISIT_TYPES=['เยี่ยมชม (On-site)','โทรศัพท์','Online / Video Call','งาน Event','อื่นๆ'];
var VISIT_TOPICS=['Product Demo','ติดตามสต็อก','ติดตาม Pipeline','การฝึกอบรม','แก้ปัญหา','ประชุมธุรกิจ','อื่นๆ'];
var PRIORITY=['สูง','กลาง','ต่ำ'];
var DEMO_STATUS=['พร้อมให้ยืม','ให้ยืมแล้ว','คืนแล้ว','ส่งซ่อม'];
var ONBOARD_STEPS=[
  {id:'register',label:'ลงทะเบียน DJI Authorized Dealer'},
  {id:'display',label:'ติดตั้ง Display / ป้ายร้าน'},
  {id:'training',label:'อบรมผลิตภัณฑ์เบื้องต้น'},
  {id:'online',label:'เปิดช่องทางขาย Online'},
  {id:'pricelist',label:'จัดทำ Price List'},
  {id:'firstorder',label:'First Order เสร็จสิ้น'},
  {id:'followup',label:'Follow Up 30 วันหลัง Launch'},
  {id:'review',label:'Review ประจำไตรมาส'}
];

// ── PIN INIT ───────────────────────────────────────────
(function init(){
  var p=new URLSearchParams(location.search);
  SALES_ID=p.get('id')||'';
  if(!SALES_ID){showPinError('❌ ลิงก์ไม่ถูกต้อง — ขอลิงก์ใหม่จาก Admin');return;}
  document.getElementById('pinSub').textContent='🔄 กำลังโหลด...';
  db.collection('salesMembers').doc(SALES_ID).get().then(function(doc){
    if(!doc.exists){showPinError('❌ ไม่พบบัญชีนี้ในระบบ — กรุณาขอลิงก์ใหม่จาก Admin');return;}
    SALES_PROFILE=doc.data();
    if(SALES_PROFILE.active===false){showPinError('⛔ บัญชีนี้ถูกปิดใช้งาน — ติดต่อ Admin');return;}
    document.getElementById('pinTitle').textContent='👤 '+(SALES_PROFILE.name||'Sales');
    document.getElementById('pinSub').textContent='กรุณาใส่ PIN เพื่อเข้าใช้งาน';
    document.getElementById('pinInput').focus();
  }).catch(function(e){
    document.getElementById('pinSub').textContent='⚠️ โหลดข้อมูลไม่ได้ — ตรวจสอบการเชื่อมต่อแล้วรีเฟรช';
    console.error(e);
  });
})();

function showPinError(msg){
  document.querySelector('.pin-box').innerHTML='<div class="pin-logo">⚠️</div>'+
    '<div class="pin-title" style="color:#ef4444">เข้าไม่ได้</div>'+
    '<div class="pin-sub" style="color:#ef4444;margin-top:8px">'+msg+'</div>';
}

function doLogin(){
  var pin=document.getElementById('pinInput').value.trim();
  var err=document.getElementById('pinErr');
  if(!pin){err.textContent='กรุณาใส่ PIN';return;}
  if(!SALES_PROFILE){err.textContent='กำลังโหลด...';return;}
  if(SALES_PROFILE.active===false){err.textContent='⛔ บัญชีนี้ถูกปิดใช้งาน';return;}
  if(pin!==String(SALES_PROFILE.pin)){err.textContent='❌ PIN ไม่ถูกต้อง';return;}
  document.getElementById('pinScreen').style.display='none';
  document.getElementById('mainApp').style.display='flex';
  loadData();
  render();
}

// ── DATA ───────────────────────────────────────────────
function loadData(){
  var base=db.collection('salesMembers').doc(SALES_ID);
  _snapUnsubs.forEach(function(u){try{u();}catch(e){}});
  _snapUnsubs=[];

  function snap(col,arr,sortFn){
    return base.collection(col).onSnapshot(function(s){
      arr.length=0;
      s.forEach(function(d){arr.push(d.data());});
      if(sortFn)arr.sort(sortFn);
      if(col==='dealers'&&currentDealer){
        var up=dealers.find(function(d){return d.id===currentDealer.id;});
        if(up)currentDealer=up;
      }
      safeRender();
    });
  }

  _snapUnsubs.push(snap('dealers',dealers,function(a,b){return(a.name||'').localeCompare(b.name||'');}));
  _snapUnsubs.push(base.collection('pipeline').onSnapshot(function(s){
    pipeline.length=0;
    s.forEach(function(d){pipeline.push(d.data());});
    pipeline.sort(function(a,b){return(b.createdAt||'').localeCompare(a.createdAt||'');});
    loadTeamPipeline();
  }));
  _snapUnsubs.push(snap('visits',visits,function(a,b){return(b.date||'').localeCompare(a.date||'');}));
  _snapUnsubs.push(snap('tasks',tasks,function(a,b){
    if(a.done!==b.done)return a.done?1:-1;
    return(a.dueDate||'').localeCompare(b.dueDate||'');
  }));
  _snapUnsubs.push(snap('demoUnits',demoUnits,function(a,b){return(b.createdAt||'').localeCompare(a.createdAt||'');}));
  _snapUnsubs.push(snap('forecastItems',forecastItems,function(a,b){return(a.expectedDate||'').localeCompare(b.expectedDate||'');}));
}

function loadTeamPipeline(){
  db.collection('teamPipeline').get().then(function(s){
    teamPipeline=[];
    s.forEach(function(d){var x=d.data();if(x.ownerId!==SALES_ID){x._isTeam=true;teamPipeline.push(x);}});
    safeRender();
  }).catch(function(){safeRender();});
}

function safeRender(){
  if(_rPending)return;
  _rPending=true;
  setTimeout(function(){_rPending=false;render();},60);
}

// ── NAVIGATION ─────────────────────────────────────────
function goView(v){currentView=v;currentDealer=null;render();}

function goDealer(id){
  var d=dealers.find(function(x){return x.id===id;});
  if(!d)return;
  currentDealer=d;currentView='dealer';currentDtab='info';render();
}

function goBack(){
  if(currentView==='dealer'){currentView='dealers';currentDealer=null;}
  render();
}

function setDtab(tab){
  currentDtab=tab;
  document.querySelectorAll('.dtab').forEach(function(t){t.classList.remove('act');});
  var el=document.getElementById('dt-'+tab);
  if(el)el.classList.add('act');
  renderDealerTab();
  updateFab();
}

function editCurrentDealer(){if(currentDealer)showEditDealer(currentDealer.id);}

// ── RENDER ─────────────────────────────────────────────
function render(){
  updateTopbar();updateBnav();updateDtabBar();
  var el=document.getElementById('vi');
  if(currentView==='home')renderHome(el);
  else if(currentView==='dealers')renderDealerList(el);
  else if(currentView==='pipeline')renderGlobalPipeline(el);
  else if(currentView==='tasks')renderGlobalTasks(el);
  else if(currentView==='dealer')renderDealerDetail(el);
  updateFab();
}

function updateTopbar(){
  var back=document.getElementById('tbBack'),name=document.getElementById('tbName');
  var sub=document.getElementById('tbSub'),edit=document.getElementById('tbEdit');
  var conf=document.getElementById('tbConflict');
  if(currentView==='dealer'&&currentDealer){
    back.style.display='';name.textContent=currentDealer.name||'—';
    var meta=[currentDealer.tier,currentDealer.type,currentDealer.province].filter(Boolean).join(' · ');
    sub.textContent=meta||'Dealer';edit.style.display='';conf.innerHTML='';
  } else {
    back.style.display='none';
    name.textContent='👤 '+(SALES_PROFILE?SALES_PROFILE.name:'Sales View');
    sub.textContent='DJI Sales Assistant';edit.style.display='none';
    var cnt=Object.keys(buildConflictMap()).length;
    conf.innerHTML=cnt>0?'<span class="conflict-tag">⚠️ '+cnt+' ชน</span>':'';
  }
}

function updateBnav(){
  ['home','dealers','pipeline','tasks'].forEach(function(v){
    var el=document.getElementById('bni-'+v);
    if(el)el.classList.toggle('act',currentView===v||(currentView==='dealer'&&v==='dealers'));
  });
}

function updateDtabBar(){
  var bar=document.getElementById('dtabBar');
  if(currentView==='dealer'){
    bar.style.display='';
    document.querySelectorAll('.dtab').forEach(function(t){t.classList.remove('act');});
    var a=document.getElementById('dt-'+currentDtab);if(a)a.classList.add('act');
  } else {
    bar.style.display='none';
  }
}

// ── HOME ───────────────────────────────────────────────
function renderHome(el){
  var today=new Date().toISOString().slice(0,10);
  var activePipe=pipeline.filter(function(p){return['lost','delivered'].indexOf(p.status)===-1;});
  var totalAmt=activePipe.reduce(function(s,p){return s+(Number(p.forecastAmount)||0);},0);
  var pending=tasks.filter(function(t){return!t.done;});
  var overdue=pending.filter(function(t){return t.dueDate&&t.dueDate<today;});
  var cMap=buildConflictMap();

  var h='<div class="srow srow-2">';
  h+='<div class="sc"><div class="sn">'+dealers.length+'</div><div class="sl">🏪 Dealer</div></div>';
  h+='<div class="sc"><div class="sn">'+activePipe.length+'</div><div class="sl">📊 Active Pipeline</div></div>';
  h+='<div class="sc"><div class="sn" style="color:'+(overdue.length>0?'var(--red)':'var(--green)')+'">'+pending.length+'</div><div class="sl">📋 งานค้าง</div></div>';
  h+='<div class="sc"><div class="sn">'+fmtShort(totalAmt)+'</div><div class="sl">💰 Forecast ฿</div></div>';
  h+='</div>';

  if(Object.keys(cMap).length>0){
    h+='<div class="card" style="border-color:#ef444440;background:#ef444408;margin-bottom:10px">';
    h+='<div style="font-size:12px;font-weight:700;color:var(--red);margin-bottom:6px">⚠️ Pipeline อาจชน</div>';
    pipeline.filter(function(p){return cMap[p.id];}).slice(0,3).forEach(function(p){
      var cc=cMap[p.id][0];
      h+='<div style="font-size:11px;padding:4px 0;border-bottom:1px solid #ef444420;color:var(--text2)">'+esc(p.projectName)+
        ' <span style="color:var(--red)">← ชน '+esc(cc.dealerName)+(cc.ownerName?' ('+esc(cc.ownerName)+')':(cc.isTeam?' (ทีมอื่น)':''))+'</span></div>';
    });
    h+='</div>';
  }

  if(overdue.length){
    h+='<div class="slbl" style="color:var(--red)">งานเกินกำหนด</div>';
    overdue.slice(0,3).forEach(function(t){
      var d=dealers.find(function(x){return x.id===t.dealerId;});
      h+='<div class="task-item" onclick="goDealer(\''+t.dealerId+'\')">';
      h+='<div class="task-chk"></div>';
      h+='<div style="flex:1"><div style="font-size:12px">'+esc(t.title)+'</div>';
      h+='<div class="task-due ov">📅 '+t.dueDate+(d?' · '+esc(d.name):'')+'</div></div></div>';
    });
  }

  var upcoming=pending.filter(function(t){return!t.dueDate||t.dueDate>=today;});
  if(upcoming.length){
    h+='<div class="slbl">งานที่ต้องทำ</div>';
    upcoming.slice(0,4).forEach(function(t){
      var d=dealers.find(function(x){return x.id===t.dealerId;});
      h+='<div class="task-item" onclick="goDealer(\''+t.dealerId+'\')">';
      h+='<div class="task-chk"></div>';
      h+='<div style="flex:1"><div style="font-size:12px">'+esc(t.title)+'</div>';
      if(t.dueDate)h+='<div class="task-due">📅 '+t.dueDate+'</div>';
      if(d)h+='<div class="task-due">'+esc(d.name)+'</div>';
      h+='</div></div>';
    });
  }

  var recentV=visits.slice(0,3);
  if(recentV.length){
    h+='<div class="slbl">Visit ล่าสุด</div>';
    recentV.forEach(function(v){
      var d=dealers.find(function(x){return x.id===v.dealerId;});
      h+='<div class="log-item" onclick="goDealer(\''+v.dealerId+'\')">';
      h+='<div class="log-meta"><span>'+esc(v.date||'—')+'</span><span>'+esc(v.type||'')+'</span>'+(d?'<span>'+esc(d.name)+'</span>':'')+'</div>';
      h+='<div class="log-body">'+esc(v.notes||'(ไม่มีหมายเหตุ)')+'</div></div>';
    });
  }

  if(!dealers.length&&!pipeline.length)
    h='<div class="empty">👋 ยินดีต้อนรับ!<br><small>เริ่มที่แท็บ "Dealer" เพื่อเพิ่ม Dealer แรก</small></div>';

  el.innerHTML=h;
}

// ── DEALER LIST ────────────────────────────────────────
function renderDealerList(el){
  var h='';
  if(!dealers.length){
    h='<div class="empty">🏪 ยังไม่มี Dealer<br><small>กด ＋ เพื่อเพิ่ม</small></div>';
  } else {
    dealers.forEach(function(d){
      var ap=pipeline.filter(function(p){return p.dealerId===d.id&&['lost','delivered'].indexOf(p.status)===-1;});
      var pt=tasks.filter(function(t){return t.dealerId===d.id&&!t.done;});
      var tier=d.tier?'<span class="badge bd-'+tierColor(d.tier)+'" style="margin-right:4px">'+d.tier+'</span>':'';
      h+='<div class="li" onclick="goDealer(\''+d.id+'\')">';
      h+='<div style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px">';
      h+='<div style="flex:1;min-width:0"><div class="lt">'+tier+esc(d.name||'—')+'</div>';
      h+='<div class="ls">'+[d.type,d.province].filter(Boolean).map(esc).join(' · ')+'</div></div>';
      h+='<div style="display:flex;flex-direction:column;align-items:flex-end;gap:3px;flex-shrink:0">';
      if(ap.length)h+='<span class="badge bd-blue">'+ap.length+' งาน</span>';
      if(pt.length)h+='<span class="badge bd-orange">'+pt.length+' task</span>';
      h+='</div></div></div>';
    });
  }
  el.innerHTML=h;
}

function tierColor(t){return t==='S'?'purple':t==='A'?'blue':t==='B'?'green':'grey';}

// ── DEALER FORM ────────────────────────────────────────
function showAddDealer(){editId=null;openModal('➕ เพิ่ม Dealer',buildDealerForm(null));}
function showEditDealer(id){
  var d=dealers.find(function(x){return x.id===id;});
  if(!d)return;editId=id;openModal('✏️ แก้ไข Dealer',buildDealerForm(d));

function buildDealerForm(d){
  function opts(arr,val){return arr.map(function(t){return'<option value="'+t+'"'+(val===t?' selected':'')+'>'+t+'</option>';}).join('');}
  var h='<div class="fg"><label>ชื่อ Dealer *</label><input id="fd_name" class="fi" value="'+esc(d?d.name||'':'')+'" placeholder="ชื่อบริษัท/ร้าน"></div>';
  h+='<div class="fi-row"><div class="fg"><label>ประเภท</label><select id="fd_type" class="fi"><option value="">—</option>'+opts(DEALER_TYPES,d&&d.type)+'</select></div>';
  h+='<div class="fg"><label>Tier</label><select id="fd_tier" class="fi"><option value="">—</option>'+opts(DEALER_TIERS,d&&d.tier)+'</select></div></div>';
  h+='<div class="fi-row"><div class="fg"><label>จังหวัด</label><input id="fd_province" class="fi" value="'+esc(d?d.province||'':'')+'" placeholder="กรุงเทพฯ"></div>';
  h+='<div class="fg"><label>Credit Terms</label><select id="fd_credit" class="fi"><option value="">—</option>'+opts(CREDIT_TERMS,d&&d.creditTerms)+'</select></div></div>';
  h+='<div class="fg"><label>ที่อยู่</label><input id="fd_address" class="fi" value="'+esc(d?d.address||'':'')+'" placeholder="ที่อยู่ร้าน/บริษัท"></div>';
  h+='<div class="fi-row"><div class="fg"><label>ผู้ติดต่อ</label><input id="fd_contact" class="fi" value="'+esc(d?d.contact||'':'')+'" placeholder="ชื่อผู้ติดต่อ"></div>';
  h+='<div class="fg"><label>เบอร์โทร</label><input id="fd_phone" class="fi" value="'+esc(d?d.phone||'':'')+'" placeholder="08x-xxx" inputmode="tel"></div></div>';
  h+='<div class="fg"><label>อีเมล</label><input id="fd_email" class="fi" value="'+esc(d?d.email||'':'')+'" placeholder="contact@dealer.com"></div>';
  h+='<div class="fg"><label>หมายเหตุ</label><textarea id="fd_remark" class="fi" rows="2">'+esc(d?d.remark||'':'')+'</textarea></div>';
  h+='<div class="fg"><label>PIN สำหรับ Client View</label><input id="fd_cpin" class="fi" value="'+esc(d?d.clientPin||'':'')+'" placeholder="4-6 หลัก (เว้นว่างถ้าไม่ต้อง PIN)" inputmode="numeric" maxlength="6"><div style="font-size:10px;color:var(--text3);margin-top:3px">ลิงก์: client-view-sales.html?salesId='+SALES_ID+'&amp;dealerId='+(d?d.id:'[id]')+'</div></div>';
  h+='<div class="fa"><button class="btn btn-p" style="flex:1" onclick="saveDealer()">💾 บันทึก</button>';
  if(editId)h+='<button class="btn btn-d btn-sm" onclick="deleteDealer(\''+editId+'\')">🗑️</button>';
  h+='<button class="btn btn-o" onclick="closeModal()">ยกเลิก</button></div>';
  return h;
}

function saveDealer(){
  var name=document.getElementById('fd_name').value.trim();
  if(!name){showToast('กรุณาใส่ชื่อ Dealer');return;}
  var data={
    id:editId||('dealer_'+Date.now().toString(36)),name:name,
    type:document.getElementById('fd_type').value,
    tier:document.getElementById('fd_tier').value,
    province:document.getElementById('fd_province').value.trim(),
    creditTerms:document.getElementById('fd_credit').value,
    address:document.getElementById('fd_address').value.trim(),
    contact:document.getElementById('fd_contact').value.trim(),
    phone:document.getElementById('fd_phone').value.trim(),
    email:document.getElementById('fd_email').value.trim(),
    remark:document.getElementById('fd_remark').value.trim(),
    clientPin:document.getElementById('fd_cpin').value.trim()||null,
    updatedAt:new Date().toISOString()
  };
  if(!editId)data.createdAt=new Date().toISOString();
  db.collection('salesMembers').doc(SALES_ID).collection('dealers').doc(data.id).set(data,{merge:true}).then(function(){
    closeModal();showToast('✅ บันทึกแล้ว');
  }).catch(function(e){showToast('❌ '+e.message);});
}

function deleteDealer(id){
  if(!confirm('ลบ Dealer นี้?'))return;
  db.collection('salesMembers').doc(SALES_ID).collection('dealers').doc(id).delete().then(function(){
    closeModal();
    if(currentDealer&&currentDealer.id===id){currentView='dealers';currentDealer=null;}
    showToast('🗑️ ลบแล้ว');
  }).catch(function(e){showToast('❌ '+e.message);});
}

function dHero(d){
  var tier=d.tier?'<span class="badge bd-'+tierColor(d.tier)+'" style="margin-right:4px">'+d.tier+'</span>':'';

  h+='<div style="font-size:14px;font-weight:700">'+tier+esc(d.name||'—')+'</div>';
  var meta=[d.type,d.province?'📍 '+d.province:'',d.phone?'📞 '+d.phone:''].filter(Boolean);
  if(meta.length)h+='<div style="font-size:11px;color:var(--text3);margin-top:3px">'+meta.map(esc).join('  ')+'</div>';
  h+='</div>';return h;
}

// TAB: Timeline
function rdTimeline(el){
  var did=currentDealer.id;
  var evs=[];
  visits.filter(function(v){return v.dealerId===did;}).forEach(function(v){
    evs.push({date:v.date||v.createdAt||'',cls:'v',icon:'🤝',text:'Visit: '+esc(v.type||'')+(v.notes?' — '+esc(v.notes.slice(0,60)):'')+''});
  });
  pipeline.filter(function(p){return p.dealerId===did;}).forEach(function(p){
    evs.push({date:p.updatedAt||p.createdAt||'',cls:'p',icon:'📊',text:'Pipeline: '+esc(p.projectName||'—')+' ['+esc(p.status||'')+']'});
  });
  tasks.filter(function(t){return t.dealerId===did&&t.done;}).forEach(function(t){
    evs.push({date:t.doneAt||t.updatedAt||'',cls:'t',icon:'✅',text:'งาน: '+esc(t.title||'—')});
  });
  demoUnits.filter(function(dm){return dm.dealerId===did;}).forEach(function(dm){
    evs.push({date:dm.lendDate||dm.createdAt||'',cls:'d',icon:'🚁',text:'Demo: '+esc(dm.model||'—')+' ['+esc(dm.status||'')+']'});

    h+='<div class="tl-wrap">';

      h+='<div class="tl-item"><div class="tl-dot '+ev.cls+'"></div>';
      h+='<div class="tl-date">'+(ev.date?ev.date.slice(0,10):'—')+'</div>';
      h+='<div class="tl-text">'+ev.icon+' '+ev.text+'</div></div>';
    });
    h+='</div>';
  }
  el.innerHTML=h;
}

// TAB: งาน
function rdTasks(el){
  var today=new Date().toISOString().slice(0,10);
  var dt=tasks.filter(function(t){return t.dealerId===currentDealer.id;});
  var pend=dt.filter(function(t){return!t.done;}),done=dt.filter(function(t){return t.done;});
  var h=dHero(currentDealer);
  if(!dt.length){h+='<div class="empty">📋 ยังไม่มี Task<br><small>กด ＋ เพื่อเพิ่ม</small></div>';}
  else{
    if(pend.length){

      done.forEach(function(t){h+=taskHtml(t,false);});

function taskHtml(t,ov){
  var pc=t.priority==='สูง'?'var(--red)':t.priority==='กลาง'?'var(--orange)':'var(--text3)';
  return '<div class="task-item">'+
    '<div class="task-chk '+(t.done?'done':'')+'" onclick="toggleTask(\''+t.id+'\')">'+
    (t.done?'✓':'')+'</div>'+
    '<div style="flex:1;min-width:0;cursor:pointer" onclick="showEditTask(\''+t.id+'\')">'+
    '<div style="font-size:12px'+(t.done?';text-decoration:line-through;color:var(--text3)':'')+'">'
    +esc(t.title||'—')+'</div>'+
    (t.dueDate?'<div class="task-due'+(ov?' ov':'')+'">📅 '+t.dueDate+'</div>':'')+
    (t.priority?'<span style="font-size:9px;color:'+pc+'">'+t.priority+'</span>':'')+
    '</div></div>';
}

function toggleOnboard(stepId){

    .update({onboardSteps:steps,updatedAt:new Date().toISOString()})

// ── GLOBAL TASKS ───────────────────────────────────────
function renderGlobalTasks(el){
  var today=new Date().toISOString().slice(0,10);
  var pend=tasks.filter(function(t){return!t.done;});
  var done=tasks.filter(function(t){return t.done;});
  var ov=pend.filter(function(t){return t.dueDate&&t.dueDate<today;});
  var up=pend.filter(function(t){return!t.dueDate||t.dueDate>=today;});
  var h='<div class="srow srow-3"><div class="sc"><div class="sn">'+pend.length+'</div><div class="sl">ค้างอยู่</div></div>';
  h+='<div class="sc"><div class="sn" style="color:var(--red)">'+ov.length+'</div><div class="sl">เกินกำหนด</div></div>';
  h+='<div class="sc"><div class="sn" style="color:var(--green)">'+done.length+'</div><div class="sl">เสร็จแล้ว</div></div></div>';
  if(!tasks.length){h+='<div class="empty">📋 ยังไม่มี Task<br><small>เพิ่ม Task ในหน้า Dealer</small></div>';}
  else{
    function taskRow(t){
      var d=dealers.find(function(x){return x.id===t.dealerId;});
      var isov=t.dueDate&&t.dueDate<today&&!t.done;
      return '<div class="task-item"><div class="task-chk '+(t.done?'done':'')+'" onclick="toggleTask(\''+t.id+'\')">'+
        (t.done?'✓':'')+'</div>'+
        '<div style="flex:1;cursor:pointer" onclick="goDealer(\''+t.dealerId+'\')">'+
        '<div style="font-size:12px'+(t.done?';text-decoration:line-through;color:var(--text3)':'')+'">'
        +esc(t.title||'—')+'</div>'+
        (t.dueDate?'<div class="task-due'+(isov?' ov':'')+'">📅 '+t.dueDate+'</div>':'')+
        (d?'<div class="task-due">'+esc(d.name)+'</div>':'')+
        '</div></div>';
    }
    if(ov.length){h+='<div class="slbl" style="color:var(--red)">เกินกำหนด</div>';ov.forEach(function(t){h+=taskRow(t);});}
    if(up.length){h+='<div class="slbl">กำลังดำเนินการ</div>';up.forEach(function(t){h+=taskRow(t);});}
    if(done.length){
      h+='<div class="slbl">เสร็จแล้ว ('+done.length+')</div>';
      done.slice(0,5).forEach(function(t){h+=taskRow(t);});
      if(done.length>5)h+='<div style="text-align:center;font-size:11px;color:var(--text3);padding:8px">... อีก '+(done.length-5)+' รายการ</div>';
    }
  }
  el.innerHTML=h;
}

function savePipe(){
  var proj=document.getElementById('fp_proj').value.trim();
  if(!proj){showToast('กรุณาใส่ชื่อโครงการ');return;}
  var dealerId=document.getElementById('fp_dealer').value;
  var d=dealers.find(function(x){return x.id===dealerId;});
  var data={
    id:editId||('pipe_'+Date.now().toString(36)),
    projectName:proj,dealerId:dealerId,dealerName:d?d.name:'',
    endUserTH:document.getElementById('fp_eu').value.trim(),
    status:document.getElementById('fp_status').value,
    forecastAmount:parseFloat(document.getElementById('fp_amt').value)||0,
    model:document.getElementById('fp_model').value.trim(),
    remark:document.getElementById('fp_remark').value.trim(),
    ownerId:SALES_ID,ownerName:SALES_PROFILE?SALES_PROFILE.name:'',ownerType:'sales',
    updatedAt:new Date().toISOString()
  };
  if(!editId)data.createdAt=new Date().toISOString();
  db.collection('salesMembers').doc(SALES_ID).collection('pipeline').doc(data.id).set(data).then(function(){
    var isActive=['lost','delivered'].indexOf(data.status)===-1;
    var tpRef=db.collection('teamPipeline').doc(data.id);
    if(isActive){
      tpRef.set({id:data.id,dealerId:data.dealerId,dealerName:data.dealerName,
        projectName:data.projectName,endUserTH:data.endUserTH,endUserEN:'',
        forecastAmount:data.forecastAmount,status:data.status,
        ownerName:data.ownerName,ownerId:SALES_ID,ownerType:'sales',updatedAt:data.updatedAt});
    } else {tpRef.delete().catch(function(){});}
    closeModal();showToast('✅ บันทึกแล้ว');
  }).catch(function(e){showToast('❌ '+e.message);});
}

function deletePipe(id){
  if(!confirm('ลบโครงการนี้?'))return;
  db.collection('salesMembers').doc(SALES_ID).collection('pipeline').doc(id).delete().then(function(){
    db.collection('teamPipeline').doc(id).delete().catch(function(){});
    closeModal();showToast('🗑️ ลบแล้ว');
  }).catch(function(e){showToast('❌ '+e.message);});
}

// ── CONFLICT DETECTION ─────────────────────────────────
function bigrams(str){
  var s=(str||'').toLowerCase().replace(/\s+/g,''),set={};
  for(var i=0;i<s.length-1;i++)set[s[i]+s[i+1]]=true;
  return set;
}
function bigramSim(a,b){
  var ba=bigrams(a),bb=bigrams(b),inter=0,ua=Object.keys(ba).length,ub=Object.keys(bb).length;
  Object.keys(ba).forEach(function(k){if(bb[k])inter++;});
  return(ua+ub)===0?0:Math.round((2*inter/(ua+ub))*100);
}
function pipeScore(a,b){
  return Math.round(bigramSim(a.projectName,b.projectName)*0.5+bigramSim(a.endUserTH,b.endUserTH)*0.35+bigramSim(a.endUserEN,b.endUserEN)*0.15);
}
function buildConflictMap(){
  var map={},all=pipeline.concat(teamPipeline);
  var active=all.filter(function(p){return p&&['lost','delivered'].indexOf(p.status)===-1;});
  for(var i=0;i<active.length;i++){
    for(var j=i+1;j<active.length;j++){
      var a=active[i],b=active[j];
      if(a._isTeam&&b._isTeam)continue;
      var sc=pipeScore(a,b);if(sc<60)continue;
      if(!a._isTeam){if(!map[a.id])map[a.id]=[];map[a.id].push({dealerName:b._dealerName||b.dealerName||'?',score:sc,ownerName:b._ownerName||b.ownerName||null,isTeam:!!b._isTeam});}
      if(!b._isTeam){if(!map[b.id])map[b.id]=[];map[b.id].push({dealerName:a._dealerName||a.dealerName||'?',score:sc,ownerName:a._ownerName||a.ownerName||null,isTeam:!!a._isTeam});}
    }
  }
  return map;
}

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function fmtShort(n){n=Number(n)||0;if(n>=1e6)return(n/1e6).toFixed(1)+'M';if(n>=1e3)return(n/1e3).toFixed(0)+'K';return n.toString();}
function showToast(msg){
  var el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');
  clearTimeout(_toastT);_toastT=setTimeout(function(){el.classList.remove('show');},2500);
}
