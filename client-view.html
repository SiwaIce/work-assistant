<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>DJI Enterprise - ติดตามสถานะโครงการ</title>
<script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
<style>
/* ===== CSS VARIABLES ===== */
:root {
  --bg: #0f172a;
  --bg2: #1e293b;
  --card: #1e293b;
  --border: #334155;
  --text: #e2e8f0;
  --text2: #94a3b8;
  --text3: #64748b;
  --accent: #3b82f6;
  --accent-light: rgba(59,130,246,0.1);
  --radius: 12px;
  --input-bg: #0f172a;
  --success: #22c55e;
  --warning: #f59e0b;
  --danger: #ef4444;
}
.theme-light {
  --bg: #f1f5f9;
  --bg2: #ffffff;
  --card: #ffffff;
  --border: #e2e8f0;
  --text: #1e293b;
  --text2: #475569;
  --text3: #64748b;
  --accent: #2563eb;
  --accent-light: #eff6ff;
  --input-bg: #ffffff;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Segoe UI', 'Noto Sans Thai', sans-serif;
  background: var(--bg);
  color: var(--text);
  transition: background 0.2s, color 0.2s;
  padding-bottom: 20px;
}
.theme-toggle {
  position: fixed;
  top: 20px;
  right: 20px;
  width: 40px;
  height: 40px;
  border-radius: 50%;
  background: var(--card);
  border: 1px solid var(--border);
  color: var(--text2);
  cursor: pointer;
  font-size: 18px;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 1000;
  transition: 0.2s;
}
.theme-toggle:hover { transform: scale(1.05); border-color: var(--accent); color: var(--accent); }
.cv-container { max-width: 1200px; margin: 0 auto; padding: 24px; padding-top: 20px; }
.cv-header { text-align: center; padding: 24px 0 32px; margin-bottom: 24px; border-bottom: 2px solid rgba(100,181,246,0.2); }
.cv-logo { font-size: 14px; color: var(--accent); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 8px; }
.cv-dealer-name { font-size: 32px; font-weight: 800; background: linear-gradient(90deg, var(--accent), #60a5fa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 4px; }
.cv-dealer-sub { font-size: 14px; color: var(--text2); }

/* Tabs */
.tab-bar {
  display: flex;
  gap: 4px;
  margin-bottom: 20px;
  border-bottom: 2px solid var(--border);
  padding-bottom: 0;
  overflow-x: auto;
}
.tab-btn {
  padding: 10px 20px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  color: var(--text2);
  border-bottom: 2px solid transparent;
  transition: 0.15s;
  white-space: nowrap;
}
.tab-btn:hover { color: var(--accent); }
.tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }

/* Section */
.section {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
  margin-bottom: 20px;
}
.section-title {
  font-size: 18px;
  font-weight: 700;
  margin-bottom: 16px;
  padding-bottom: 8px;
  border-bottom: 1px solid var(--border);
  color: var(--accent);
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
  gap: 10px;
}

/* Stats Cards */
.stats-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
  gap: 12px;
  margin-bottom: 20px;
}
.stat-card {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 14px;
  text-align: center;
  cursor: pointer;
  transition: 0.15s;
}
.stat-card:hover { border-color: var(--accent); transform: translateY(-2px); }
.stat-card.active { border-color: var(--accent); background: var(--accent-light); }
.stat-month { font-size: 14px; font-weight: 700; color: var(--accent); }
.stat-qty { font-size: 28px; font-weight: 800; margin: 4px 0; }
.stat-detail { font-size: 10px; color: var(--text2); }
.stat-breakdown { font-size: 10px; color: var(--text3); margin-top: 4px; }

/* Table */
.data-table {
  width: 100%;
  border-collapse: collapse;
}
.data-table th {
  text-align: left;
  padding: 10px 8px;
  font-size: 11px;
  color: var(--text2);
  text-transform: uppercase;
  border-bottom: 2px solid var(--border);
}
.data-table td {
  padding: 8px;
  border-bottom: 1px solid var(--border);
  font-size: 13px;
  vertical-align: middle;
}

/* Status Badge */
.status-badge {
  padding: 3px 10px;
  border-radius: 12px;
  font-size: 11px;
  font-weight: 600;
  display: inline-block;
}
.status-prospect { background: rgba(100,181,246,0.12); color: #64b5f6; }
.status-tor { background: rgba(186,104,200,0.12); color: #ba68c8; }
.status-quote { background: rgba(255,183,77,0.12); color: #ffb74d; }
.status-bidding { background: rgba(255,235,59,0.12); color: #fdd835; }
.status-nego { background: rgba(77,208,225,0.12); color: #4dd0e1; }
.status-win { background: rgba(129,199,132,0.12); color: #81c784; }
.status-ordered { background: rgba(76,175,80,0.12); color: #4caf50; }
.status-delivered { background: rgba(76,175,80,0.15); color: #66bb6a; }

/* Buttons */
.btn { padding: 6px 12px; border-radius: 6px; border: 1px solid var(--border); background: transparent; color: var(--text2); cursor: pointer; font-size: 12px; transition: 0.15s; }
.btn-primary { background: var(--accent); border-color: var(--accent); color: #fff; }
.btn-primary:hover { opacity: 0.9; }
.btn-sm { padding: 4px 8px; font-size: 11px; }
.btn-danger { border-color: var(--danger); color: var(--danger); }
.btn-danger:hover { background: rgba(239,68,68,0.1); }
.btn-success { background: var(--success); border-color: var(--success); color: #fff; }
.btn-warning { background: var(--warning); border-color: var(--warning); color: #fff; }

/* Form */
.form-group { margin-bottom: 16px; }
.form-group label { display: block; font-size: 12px; font-weight: 600; color: var(--text2); margin-bottom: 5px; }
.form-group input, .form-group select, .form-group textarea {
  width: 100%;
  padding: 8px 12px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--input-bg);
  color: var(--text);
  font-size: 13px;
}
.form-group input:focus, .form-group select:focus, .form-group textarea:focus { outline: none; border-color: var(--accent); }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.hint { font-size: 11px; color: var(--text2); margin-top: 4px; }

/* Modal */
.modal-overlay {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background: rgba(0,0,0,0.7);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 2000;
}
.modal-container {
  background: var(--card);
  border-radius: 16px;
  max-width: 550px;
  width: 90%;
  max-height: 85vh;
  overflow-y: auto;
}
.modal-header {
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
  display: flex;
  justify-content: space-between;
  align-items: center;
  position: sticky;
  top: 0;
  background: var(--card);
}
.modal-header h3 { font-size: 18px; color: var(--accent); }
.modal-close { background: none; border: none; color: var(--text2); font-size: 24px; cursor: pointer; }
.modal-body { padding: 20px; }
.modal-footer {
  padding: 16px 20px;
  border-top: 1px solid var(--border);
  display: flex;
  justify-content: flex-end;
  gap: 12px;
  position: sticky;
  bottom: 0;
  background: var(--card);
}

/* Forecast Items */
.forecast-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px;
  background: var(--bg);
  border-radius: 8px;
  margin-bottom: 6px;
  flex-wrap: wrap;
}
.project-item {
  background: var(--bg);
  border-radius: 10px;
  padding: 12px;
  margin-bottom: 8px;
  border: 1px solid var(--border);
  cursor: pointer;
  transition: 0.15s;
}
.project-item:hover { border-color: var(--accent); background: var(--accent-light); }
.project-name { font-weight: 700; font-size: 15px; color: var(--accent); display: flex; justify-content: space-between; align-items: center; }
.project-items { font-size: 12px; color: var(--text2); margin-top: 4px; }
.project-detail { margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border); display: none; }
.project-detail.show { display: block; }

/* Toast */
.success-toast {
  position: fixed;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--success);
  color: #fff;
  padding: 12px 24px;
  border-radius: 40px;
  font-size: 14px;
  font-weight: 600;
  z-index: 2001;
  animation: fadeInUp 0.3s ease, fadeOut 0.3s ease 2.7s forwards;
}
@keyframes fadeInUp {
  from { opacity: 0; transform: translateX(-50%) translateY(20px); }
  to { opacity: 1; transform: translateX(-50%) translateY(0); }
}
@keyframes fadeOut { to { opacity: 0; visibility: hidden; } }

.loading { text-align: center; padding: 40px; color: var(--text2); }
.cv-back {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 8px 16px;
  margin-bottom: 20px;
  cursor: pointer;
  color: var(--accent);
  font-size: 14px;
  border-radius: 8px;
  background: var(--bg);
  border: 1px solid var(--border);
}
.cv-back:hover { background: var(--accent-light); }

@media (max-width: 768px) {
  .cv-container { padding: 12px; }
  .cv-dealer-name { font-size: 24px; }
  .stats-grid { grid-template-columns: repeat(2, 1fr); }
  .form-row { grid-template-columns: 1fr; }
}
</style>
</head>
<body>
<div class="cv-container" id="cvContainer">
  <div class="cv-header">
    <div class="cv-logo">🚁 DJI Enterprise</div>
    <div class="cv-dealer-name" id="dealerName">กำลังโหลด...</div>
    <div class="cv-dealer-sub">DJI Authorized Dealer</div>
  </div>

  <div class="tab-bar" id="tabBar">
    <div class="tab-btn active" data-tab="pipeline">📋 โครงการของฉัน</div>
    <div class="tab-btn" data-tab="forecast">📦 แผนการสั่งซื้อ</div>
    <div class="tab-btn" data-tab="timeline">📝 ประวัติการอัพเดท</div>
  </div>

  <div id="tabContent"></div>

  <div class="cv-footer" style="text-align:center; padding:24px 0; margin-top:32px; border-top:1px solid var(--border); font-size:12px; color:var(--text2)">
    <div>Powered by SIS Distribution (Thailand) PLC — DJI Authorized Distributor</div>
    <div id="footerDate"></div>
  </div>
</div>
<button class="theme-toggle" onclick="toggleTheme()" title="เปลี่ยนธีม">🌙</button>

<script>
// ===== THEME =====
function getSavedTheme() { return localStorage.getItem('cv_theme') || 'dark'; }
function applyTheme(theme) {
  if (theme === 'light') { document.body.classList.add('theme-light'); document.querySelector('.theme-toggle').textContent = '☀️'; }
  else { document.body.classList.remove('theme-light'); document.querySelector('.theme-toggle').textContent = '🌙'; }
}
function toggleTheme() { var current = getSavedTheme(); var next = current === 'dark' ? 'light' : 'dark'; localStorage.setItem('cv_theme', next); applyTheme(next); }
applyTheme(getSavedTheme());

// ===== PIN VERIFICATION =====
var DEALER_PINS = {};

function getDealerPin(dealerId) {
  var pins = JSON.parse(localStorage.getItem('v7_dealer_pins') || '{}');
  return pins[dealerId] || null;
}

function verifyPin(dealerId, enteredPin) {
  var correctPin = getDealerPin(dealerId);
  if (!correctPin) return true;
  return enteredPin === correctPin;
}

function showPinScreen(dealerId) {
  var dealer = null;
  var dealers = JSON.parse(localStorage.getItem('v7_dealers') || '[]');
  for (var i = 0; i < dealers.length; i++) {
    if (dealers[i].id === dealerId) { dealer = dealers[i]; break; }
  }
  var dealerName = dealer ? dealer.name : dealerId;
  
  var html = '<div class="pin-screen" style="position:fixed;top:0;left:0;right:0;bottom:0;background:var(--bg);z-index:10000;display:flex;align-items:center;justify-content:center">';
  html += '<div style="background:var(--card);border-radius:20px;padding:30px;text-align:center;max-width:350px;width:90%">';
  html += '<div style="font-size:48px;margin-bottom:16px">🔒</div>';
  html += '<h2 style="margin-bottom:8px">' + esc(dealerName) + '</h2>';
  html += '<p style="color:var(--text2);margin-bottom:20px">กรุณากรอกรหัสผ่านเพื่อดูข้อมูล</p>';
  html += '<input type="password" id="pinInput" placeholder="รหัส 4-6 หลัก" style="width:100%;padding:12px;border-radius:10px;border:1px solid var(--border);background:var(--input-bg);color:var(--text);font-size:18px;text-align:center;margin-bottom:20px" maxlength="6">';
  html += '<div style="display:flex;gap:10px">';
  html += '<button class="btn btn-primary" style="flex:1" onclick="checkPinAndLoad(\'' + dealerId + '\')">ยืนยัน</button>';
  html += '<button class="btn" style="flex:1" onclick="window.close()">ปิด</button>';
  html += '</div>';
  html += '<div id="pinError" style="color:var(--danger);margin-top:12px;font-size:12px"></div>';
  html += '</div></div>';
  
  document.body.insertAdjacentHTML('beforeend', html);
}

function checkPinAndLoad(dealerId) {
  var pinInput = document.getElementById('pinInput');
  var enteredPin = pinInput ? pinInput.value : '';
  
  if (verifyPin(dealerId, enteredPin)) {
    var pinScreen = document.querySelector('.pin-screen');
    if (pinScreen) pinScreen.remove();
    sessionStorage.setItem('cv_pin_verified_' + dealerId, 'true');
    loadAllData();
  } else {
    var errorEl = document.getElementById('pinError');
    if (errorEl) errorEl.textContent = '❌ รหัสผ่านไม่ถูกต้อง กรุณาลองอีกครั้ง';
  }
}

// ===== HELPER =====
function esc(s) { if (!s) return ''; return String(s).replace(/</g, '&lt;').replace(/>/g, '&gt;'); }
function formatThaiDate(iso) { if (!iso) return ''; var d = new Date(iso); if (isNaN(d)) return iso; return d.getDate().toString().padStart(2,'0')+'/'+(d.getMonth()+1).toString().padStart(2,'0')+'/'+d.getFullYear(); }
function showSuccessToast(msg) { var t = document.createElement('div'); t.className = 'success-toast'; t.textContent = msg || '✅ บันทึกเรียบร้อยแล้ว!'; document.body.appendChild(t); setTimeout(function() { if(t.remove) t.remove(); }, 3000); }
function closeModal() { var modal = document.querySelector('.modal-overlay'); if (modal) modal.remove(); }

// ===== STATUS =====
var STATUS_LIST = [
  { id: 'prospect', name: '🔵 Prospect' }, { id: 'tor_review', name: '🟣 TOR Review' },
  { id: 'quotation', name: '🟠 Quotation' }, { id: 'bidding', name: '🟡 Bidding' },
  { id: 'negotiation', name: '🔵 Negotiation' }, { id: 'win', name: '🟢 Win' },
  { id: 'ordered', name: '🟢 Ordered' }, { id: 'delivered', name: '✅ Delivered' }
];
function getStatusLabel(status) { var s = STATUS_LIST.find(x => x.id === status); return '<span class="status-badge status-'+status+'">'+(s ? s.name : status)+'</span>'; }
function getStatusName(statusId) { var s = STATUS_LIST.find(x => x.id === statusId); return s ? s.name : statusId; }

// ===== DATA =====
var dealerId = new URLSearchParams(window.location.search).get('dealerId');
var currentTab = 'pipeline';
var allModels = [];
var pipelinesData = [];
var forecastData = { runrate: [], projects: [] };
var timelineLogs = [];
var dealerName = '';
var selectedMonth = null;

// Months list
var MONTHS = ['มิ.ย. 69', 'ก.ค. 69', 'ส.ค. 69', 'ก.ย. 69', 'ต.ค. 69', 'พ.ย. 69', 'ธ.ค. 69', 'ม.ค. 70', 'ก.พ. 70', 'มี.ค. 70', 'เม.ย. 70', 'พ.ค. 70'];

// ===== LOAD MODELS =====
function loadModels() {
  var cfg = localStorage.getItem('v7_config');
  if (cfg) {
    try {
      var config = JSON.parse(cfg);
      if (config.models && config.models.length) {
        allModels = config.models.map(function(m) { return typeof m === 'object' ? m.name : m; }).filter(function(m) { return m; });
      }
    } catch(e) {}
  }
  if (!allModels.length) {
    allModels = ['DJI Matrice 4E', 'DJI Matrice 4T', 'DJI Matrice 4TD', 'DJI Matrice 400', 'DJI Matrice 30', 'DJI Matrice 30T',
      'Zenmuse L2', 'Zenmuse L3', 'Zenmuse H30', 'Zenmuse H30T', 'Zenmuse P1', 'DJI Dock 2', 'DJI Dock 3',
      'DJI FlightHub 2', 'DJI Terra', 'Mavic 3 Enterprise', 'Mavic 3 Multispectral'];
  }
}

// ===== LOAD CLIENT FORECAST =====
function loadClientForecast() {
  var key = 'v7_client_forecast_' + dealerId;
  var saved = localStorage.getItem(key);
  if (saved) {
    try { 
      var data = JSON.parse(saved);
      forecastData.runrate = data.runrate || [];
      forecastData.projects = data.projects || [];
    } catch(e) {}
  }
  if (!selectedMonth && forecastData.runrate.length > 0) {
    selectedMonth = forecastData.runrate[0].month;
  }
  if (!selectedMonth && forecastData.projects.length > 0) {
    selectedMonth = forecastData.projects[0].month;
  }
  if (!selectedMonth) selectedMonth = 'มิ.ย. 69';
}

function saveClientForecast() {
  var key = 'v7_client_forecast_' + dealerId;
  localStorage.setItem(key, JSON.stringify({
    runrate: forecastData.runrate,
    projects: forecastData.projects,
    updatedAt: new Date().toISOString()
  }));
  showSuccessToast('✅ บันทึกแผนการสั่งซื้อเรียบร้อยแล้ว');
  if (currentTab === 'forecast') renderForecastTab();
}

// ===== LOAD PIPELINE =====
function loadPipeline() {
  var allPipes = JSON.parse(localStorage.getItem('v7_pipeline') || '[]');
  var pipeLogs = JSON.parse(localStorage.getItem('v7_pipelog') || '[]');
  var pipeActions = JSON.parse(localStorage.getItem('v7_pipeActions') || '[]');
  var activePipes = allPipes.filter(function(p) { return p.dealerId === dealerId && ['lost','on_hold'].indexOf(p.status) === -1; });
  
  pipelinesData = [];
  for (var i = 0; i < activePipes.length; i++) {
    var p = activePipes[i];
    var items = [];
    if (p.items && p.items.length) items = p.items;
    else if (p.model) items = [{ model: p.model, qty: p.modelQty || 1 }];
    
    var actions = pipeActions.filter(function(a) { return a.pipeId === p.id && a.status === 'pending'; });
    var logs = pipeLogs.filter(function(l) { return l.pipeId === p.id; }).sort(function(a,b) { return (b.date||'').localeCompare(a.date||''); });
    var lastUpdateDays = null;
    if (logs.length && logs[0].date) {
      var d = new Date(logs[0].date);
      var now = new Date(); now.setHours(0,0,0,0);
      lastUpdateDays = Math.floor((now - d) / 86400000);
    }
    
    pipelinesData.push({
      id: p.id,
      projectName: p.projectName || '-',
      endUserTH: p.endUserTH || '-',
      status: p.status,
      biddingDate: p.biddingDate || '-',
      shipmentDate: p.shipmentDate || '-',
      forecastAmount: p.forecastAmount || 0,
      items: items,
      actions: actions,
      logs: logs.slice(0, 10),
      lastUpdateDays: lastUpdateDays
    });
  }
}

// ===== LOAD TIMELINE =====
function loadTimeline() {
  var allLogs = JSON.parse(localStorage.getItem('v7_pipelog') || '[]');
  timelineLogs = allLogs.filter(function(l) {
    var pipe = pipelinesData.find(function(p) { return p.id === l.pipeId; });
    return pipe;
  }).sort(function(a,b) { return (b.date||'').localeCompare(a.date||''); }).slice(0, 50);
}

// ===== RENDER PIPELINE TAB =====
function renderPipelineTab() {
  if (!pipelinesData.length) {
    return '<div class="section"><div class="section-title">📊 โครงการของท่าน</div><div style="text-align:center;padding:40px">📭 ไม่มีโครงการที่กำลังดำเนินการ</div></div>';
  }
  
  var html = '<div class="section"><div class="section-title">📊 โครงการของท่าน (' + pipelinesData.length + ' โครงการ)</div>';
  html += '<div style="overflow-x:auto"><table class="data-table">';
  html += '<thead><tr><th>#</th><th>โครงการ</th><th>End User</th><th>สถานะ</th><th>อัพเดทล่าสุด</th><th>สินค้า</th><th></th></tr></thead><tbody>';
  
  for (var i = 0; i < pipelinesData.length; i++) {
    var p = pipelinesData[i];
    var updateBadge = p.lastUpdateDays === null ? '🆕 ยังไม่มี' : (p.lastUpdateDays <= 3 ? '✅ ' + p.lastUpdateDays + ' วัน' : '⚠️ ' + p.lastUpdateDays + ' วัน');
    var itemsText = '';
    for (var j = 0; j < p.items.length; j++) {
      itemsText += p.items[j].model + (p.items[j].qty > 1 ? ' x' + p.items[j].qty : '');
      if (j < p.items.length - 1) itemsText += ', ';
    }
    html += '<tr>';
    html += '<td class="cv-num">' + (i+1) + '</td>';
    html += '<td><strong>' + esc(p.projectName) + '</strong></td>';
    html += '<td>' + esc(p.endUserTH) + '</td>';
    html += '<td>' + getStatusLabel(p.status) + '</td>';

function submitFullUpdate(pipeId) {
  var newProjectName = document.getElementById('editProjectName').value.trim();
  var newEndUser = document.getElementById('editEndUser').value.trim();
  var newStatus = document.getElementById('editStatus').value;
  var biddingDateInput = document.getElementById('editBidding').value;
  var shipmentDateInput = document.getElementById('editShipment').value;
  var content = document.getElementById('updateContent').value.trim();
  
  var biddingDate = biddingDateInput ? biddingDateInput.split('-').reverse().join('/') : '';
  var shipmentDate = shipmentDateInput ? shipmentDateInput.split('-').reverse().join('/') : '';
  
  if (!newProjectName) { alert('กรุณากรอกชื่อโครงการ'); return; }
  
  var items = [];
  var itemRows = document.querySelectorAll('#editItemsContainer .form-row');
  for (var i = 0; i < itemRows.length; i++) {
    var modelInput = itemRows[i].querySelector('.editItemModel');
    var qtyInput = itemRows[i].querySelector('.editItemQty');
    if (modelInput && modelInput.value && qtyInput && parseInt(qtyInput.value) > 0) {
      items.push({ model: modelInput.value, qty: parseInt(qtyInput.value) });
    }
  }
  if (items.length === 0) { alert('กรุณาเพิ่มสินค้าอย่างน้อย 1 รายการ'); return; }
  
  var allPipes = JSON.parse(localStorage.getItem('v7_pipeline') || '[]');
  for (var i = 0; i < allPipes.length; i++) {
    if (allPipes[i].id === pipeId) {
      allPipes[i].projectName = newProjectName;
      allPipes[i].endUserTH = newEndUser;
      allPipes[i].status = newStatus;
      if (biddingDate) allPipes[i].biddingDate = biddingDate;
      if (shipmentDate) allPipes[i].shipmentDate = shipmentDate;
      allPipes[i].items = items;
      allPipes[i].model = items[0].model;
      allPipes[i].modelQty = items.reduce(function(s, it) { return s + it.qty; }, 0);
      break;
    }
  }
  localStorage.setItem('v7_pipeline', JSON.stringify(allPipes));
  
  var logMsg = content || 'แก้ไขข้อมูลโครงการ';
  var pipeLogs = JSON.parse(localStorage.getItem('v7_pipelog') || '[]');
  pipeLogs.unshift({ id: 'log_' + Date.now(), pipeId: pipeId, type: 'update', content: logMsg, date: new Date().toISOString() });
  localStorage.setItem('v7_pipelog', JSON.stringify(pipeLogs));
  
  showSuccessToast('✅ บันทึกการเปลี่ยนแปลงเรียบร้อยแล้ว!');
  closeModal();
  setTimeout(function() { loadPipeline(); loadTimeline(); renderCurrentTab(); }, 500);
}

// ===== RENDER FORECAST TAB =====
function renderForecastTab() {
  // Calculate summary by month
  var monthSummary = {};
  for (var i = 0; i < MONTHS.length; i++) {
    monthSummary[MONTHS[i]] = { runrate: 0, project: 0, total: 0, projects: [] };
  }
  
  for (var i = 0; i < forecastData.runrate.length; i++) {
    var r = forecastData.runrate[i];
    if (monthSummary[r.month]) {
      monthSummary[r.month].runrate += r.qty;
      monthSummary[r.month].total += r.qty;
    }
  }
  
  for (var i = 0; i < forecastData.projects.length; i++) {
    var p = forecastData.projects[i];
    if (monthSummary[p.month]) {
      monthSummary[p.month].project += p.totalQty;
      monthSummary[p.month].total += p.totalQty;
      monthSummary[p.month].projects.push(p);
    }
  }
  
  // Stats cards
  var statsHtml = '<div class="stats-grid">';
  for (var i = 0; i < Math.min(6, MONTHS.length); i++) {
    var m = MONTHS[i];
    var data = monthSummary[m];
    var activeClass = (selectedMonth === m) ? 'active' : '';
    statsHtml += '<div class="stat-card ' + activeClass + '" onclick="selectMonth(\'' + m + '\')">';
    statsHtml += '<div class="stat-month">' + m + '</div>';
    statsHtml += '<div class="stat-qty">' + data.total + '</div>';
    statsHtml += '<div class="stat-detail">ชิ้น</div>';

    statsHtml += '</div>';
  }
  statsHtml += '</div>';
  
  // Filter data for selected month
  var monthRunrate = forecastData.runrate.filter(function(r) { return r.month === selectedMonth; });
  var monthProjects = forecastData.projects.filter(function(p) { return p.month === selectedMonth; });
  
  var totalRunrate = 0;
  for (var i = 0; i < monthRunrate.length; i++) totalRunrate += monthRunrate[i].qty;

    runrateHtml += '</div>';

      itemsText += proj.items[j].model + ' x' + proj.items[j].qty;

    projectsHtml += '<div class="project-item" onclick="toggleProjectDetail(' + i + ')">';

function loadProjectToForm() {
  var select = document.getElementById('existingProjectSelect');
  var idx = parseInt(select.value);
  if (isNaN(idx)) return;
  
  var proj = pipelinesData[idx];
  if (!proj) return;
  
  document.getElementById('newProjectName').value = proj.projectName;
  document.getElementById('newProjectEndUser').value = proj.endUserTH;
  
  window.newProjectItems = [];
  for (var i = 0; i < proj.items.length; i++) {
    window.newProjectItems.push({ model: proj.items[i].model, qty: proj.items[i].qty || 1 });
  }
  renderNewProjectItemsList();
  
  select.value = '';
}

function addProjectItem() {
  var model = document.getElementById('newProjectItemModel').value.trim();
  var qty = parseInt(document.getElementById('newProjectItemQty').value);
  if (!model) { alert('กรุณาเลือกสินค้า'); return; }
  if (!qty || qty <= 0) { alert('กรุณากรอกจำนวน'); return; }
  
  if (!window.newProjectItems) window.newProjectItems = [];
  window.newProjectItems.push({ model: model, qty: qty });
  document.getElementById('newProjectItemModel').value = '';
  document.getElementById('newProjectItemQty').value = '1';
  renderNewProjectItemsList();
}

function removeNewProjectItem(idx) {
  if (!window.newProjectItems) return;
  window.newProjectItems.splice(idx, 1);
  renderNewProjectItemsList();
}

function renderNewProjectItemsList() {
  var container = document.getElementById('newProjectItemsContainer');
  if (!container) return;
  if (!window.newProjectItems) window.newProjectItems = [];
  
  var html = '';
  for (var i = 0; i < window.newProjectItems.length; i++) {
    html += '<div style="display:flex;justify-content:space-between;align-items:center;padding:6px;border-bottom:1px solid var(--border)">';
    html += '<span>' + esc(window.newProjectItems[i].model) + ' x' + window.newProjectItems[i].qty + '</span>';
    html += '<button class="btn btn-sm btn-danger" onclick="removeNewProjectItem(' + i + ')">🗑️</button>';
    html += '</div>';
  }
  container.innerHTML = html || '<div class="hint" style="padding:8px">ยังไม่มีสินค้า</div>';
}

function addNewProject() {
  var projectName = document.getElementById('newProjectName').value.trim();
  var endUser = document.getElementById('newProjectEndUser').value.trim();
  
  if (!projectName) { alert('กรุณากรอกชื่อโครงการ'); return; }
  if (!window.newProjectItems || window.newProjectItems.length === 0) { alert('กรุณาเพิ่มสินค้าอย่างน้อย 1 รายการ'); return; }
  
  var totalQty = 0;
  for (var i = 0; i < window.newProjectItems.length; i++) {
    totalQty += window.newProjectItems[i].qty;
  }
  
  forecastData.projects.push({
    id: 'proj_' + Date.now(),
    projectName: projectName,
    endUser: endUser || '-',
    month: selectedMonth,
    items: JSON.parse(JSON.stringify(window.newProjectItems)),
    totalQty: totalQty,
    createdAt: new Date().toISOString()
  });
  
  // Clear form
  document.getElementById('newProjectName').value = '';
  document.getElementById('newProjectEndUser').value = '';
  window.newProjectItems = [];
  if (document.getElementById('newProjectItemsContainer')) {
    document.getElementById('newProjectItemsContainer').innerHTML = '';
  }
  
  saveClientForecast();
}

function editProjectItem(projIdx) {
  var proj = forecastData.projects[projIdx];
  var newName = prompt('แก้ไขชื่อโครงการ', proj.projectName);
  if (newName) proj.projectName = newName;
  saveClientForecast();
}

function downloadForecastExcel() {
  var wsData = [['ประเภท', 'ชื่อ', 'Model', 'จำนวน', 'End User', 'เดือน']];
  for (var i = 0; i < forecastData.runrate.length; i++) {
    var r = forecastData.runrate[i];
    wsData.push(['Run Rate', '', r.model, r.qty, '', r.month]);
  }
  for (var i = 0; i < forecastData.projects.length; i++) {
    var p = forecastData.projects[i];
    for (var j = 0; j < p.items.length; j++) {
      wsData.push(['Project', p.projectName, p.items[j].model, p.items[j].qty, p.endUser || '', p.month]);
    }
  }
  var ws = XLSX.utils.aoa_to_sheet(wsData);
  var wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Forecast');
  XLSX.writeFile(wb, 'Forecast_' + dealerName + '.xlsx');
}

function uploadForecastExcel(input) {
  var file = input.files[0];
  if (!file) return;
  var reader = new FileReader();
  reader.onload = function(e) {
    var data = new Uint8Array(e.target.result);
    var workbook = XLSX.read(data, { type: 'array' });
    var sheet = workbook.Sheets[workbook.SheetNames[0]];
    var rows = XLSX.utils.sheet_to_json(sheet, { header: 1, defval: '' });
    if (!rows || rows.length < 2) { alert('ไม่พบข้อมูล'); return; }
    
    for (var i = 1; i < rows.length; i++) {
      var row = rows[i];
      if (!row || !row[0]) continue;
      var type = row[0];
      var name = row[1];
      var model = row[2];
      var qty = parseInt(row[3]) || 0;
      var endUser = row[4] || '';
      var month = row[5];
      
      if (!month || MONTHS.indexOf(month) === -1) continue;
      
      if (type === 'Run Rate' && model && qty > 0) {
        var exists = false;
        for (var j = 0; j < forecastData.runrate.length; j++) {
          if (forecastData.runrate[j].model === model && forecastData.runrate[j].month === month) {
            forecastData.runrate[j].qty += qty;
            exists = true;
            break;
          }
        }
        if (!exists) {
          forecastData.runrate.push({ id: 'rr_' + Date.now() + '_' + i, model: model, qty: qty, month: month });
        }
      } else if (type === 'Project' && name && model && qty > 0) {
        var existingProj = null;
        for (var j = 0; j < forecastData.projects.length; j++) {
          if (forecastData.projects[j].projectName === name && forecastData.projects[j].month === month) {
            existingProj = forecastData.projects[j];
            break;
          }
        }
        if (existingProj) {
          var itemExists = false;
          for (var k = 0; k < existingProj.items.length; k++) {
            if (existingProj.items[k].model === model) {
              existingProj.items[k].qty += qty;
              existingProj.totalQty += qty;
              itemExists = true;
              break;
            }
          }
          if (!itemExists) {
            existingProj.items.push({ model: model, qty: qty });
            existingProj.totalQty += qty;
          }
        } else {
          forecastData.projects.push({
            id: 'proj_' + Date.now() + '_' + i,
            projectName: name,
            endUser: endUser || '-',
            month: month,
            items: [{ model: model, qty: qty }],
            totalQty: qty,
            createdAt: new Date().toISOString()
          });
        }
      }
    }
    saveClientForecast();
    input.value = '';
  };
  reader.readAsArrayBuffer(file);
}

// ===== RENDER TIMELINE TAB =====
function renderTimelineTab() {
  if (!timelineLogs.length) return '<div class="section"><div style="text-align:center;padding:40px">📭 ยังไม่มีประวัติการอัพเดท</div></div>';
  var html = '<div class="section"><div class="section-title">📝 ประวัติการอัพเดททั้งหมด</div><div style="max-height:500px;overflow-y:auto">';
  for (var i = 0; i < timelineLogs.length; i++) {
    var l = timelineLogs[i];
    var icon = l.type === 'progress' ? '🟢' : l.type === 'win' ? '✅' : l.type === 'status_change' ? '🔄' : '📝';
    var dateStr = l.date ? formatThaiDate(l.date) : '-';
    html += '<div style="padding:12px;border-bottom:1px solid var(--border)">';
    html += '<div style="font-size:11px;color:var(--text2)">' + dateStr + ' ' + icon + '</div>';
    html += '<div style="font-size:13px;margin-top:4px">' + esc(l.content || '') + '</div>';
    html += '</div>';
  }
  html += '</div></div>';
  return html;
}

// ===== RENDER CURRENT TAB =====
function renderCurrentTab() {
  var content = '';
  if (currentTab === 'pipeline') {
    var tableHtml = renderPipelineTab();
    var tempDiv = document.createElement('div');
    tempDiv.innerHTML = tableHtml;
    var rows = tempDiv.querySelectorAll('.data-table tbody tr');
    for (var i = 0; i < rows.length; i++) {
      var row = rows[i];
      var btn = row.querySelector('.btn-primary');
      var pipeId = btn ? btn.getAttribute('onclick').match(/'([^']+)'/)?.[1] : null;
      if (pipeId) {
        row.setAttribute('onclick', 'showDetailPage(\'' + pipeId + '\')');
        row.style.cursor = 'pointer';
      }
    }
    content = tempDiv.innerHTML;
  } else if (currentTab === 'forecast') {
    content = renderForecastTab();
  } else {
    content = renderTimelineTab();
  }
  document.getElementById('tabContent').innerHTML = content;
}

// ===== LOAD ALL DATA =====
function loadAllData() {
  if (!dealerId) {
    document.getElementById('tabContent').innerHTML = '<div class="section" style="text-align:center"><p>❌ ไม่พบข้อมูล Dealer</p></div>';
    return;
  }
  
  // ✅ เพิ่มโค้ดนี้ตรงนี้ (หลัง if(!dealerId) และก่อนโหลดข้อมูล)
  var isVerified = sessionStorage.getItem('cv_pin_verified_' + dealerId);
  if (!isVerified && getDealerPin(dealerId)) {
    showPinScreen(dealerId);
    return;
  }
  // ✅ สิ้นสุดโค้ดที่เพิ่ม
  var dealers = JSON.parse(localStorage.getItem('v7_dealers') || '[]');
  var dealer = dealers.find(function(d) { return d.id === dealerId; });
  if (!dealer) {
    document.getElementById('tabContent').innerHTML = '<div class="section" style="text-align:center"><p>❌ ไม่พบข้อมูล Dealer</p></div>';
    return;
  }
  dealerName = dealer.name || '-';
  document.getElementById('dealerName').innerHTML = esc(dealerName);
  document.getElementById('footerDate').innerHTML = new Date().toISOString().split('T')[0].replace(/-/g, '/');
  loadModels();
  loadPipeline();
  loadClientForecast();
  loadTimeline();
  renderCurrentTab();
}

// ===== TAB EVENT =====
document.getElementById('tabBar').addEventListener('click', function(e) {
  var btn = e.target.closest('.tab-btn');
  if (!btn) return;
  var tab = btn.dataset.tab;
  if (!tab) return;
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach(function(b) { b.classList.remove('active'); });
  btn.classList.add('active');
  renderCurrentTab();
});
