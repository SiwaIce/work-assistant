<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DJI Enterprise - ติดตามสถานะโครงการ</title>
<script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
<style>
/* ===== CSS VARIABLES ===== */
:root {
  --bg: #0f172a;
  --bg2: #1e293b;
  --card: #1e293b;
  --border: #334155;
  --text: #e2e8f0;
  --text2: #94a3b8;
  --text3: #64748b;
  --accent: #3b82f6;
  --accent-light: rgba(59,130,246,0.1);
  --radius: 12px;
  --input-bg: #0f172a;
  --success: #22c55e;
  --warning: #f59e0b;
  --danger: #ef4444;
}
.theme-light {
  --bg: #f1f5f9;
  --bg2: #ffffff;
  --card: #ffffff;
  --border: #e2e8f0;
  --text: #1e293b;
  --text2: #475569;
  --text3: #64748b;
  --accent: #2563eb;
  --accent-light: #eff6ff;
  --input-bg: #ffffff;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Segoe UI', 'Noto Sans Thai', sans-serif;
  background: var(--bg);
  color: var(--text);
  transition: background 0.2s, color 0.2s;
}
.theme-toggle {
  position: fixed;
  top: 20px;
  right: 20px;
  width: 40px;
  height: 40px;
  border-radius: 50%;
  background: var(--card);
  border: 1px solid var(--border);
  color: var(--text2);
  cursor: pointer;
  font-size: 18px;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 1000;
  transition: 0.2s;
}
.theme-toggle:hover { transform: scale(1.05); border-color: var(--accent); color: var(--accent); }
.cv-container { max-width: 1200px; margin: 0 auto; padding: 24px; padding-top: 20px; }
.cv-header { text-align: center; padding: 24px 0 32px; margin-bottom: 24px; border-bottom: 2px solid rgba(100,181,246,0.2); }
.cv-logo { font-size: 14px; color: var(--accent); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 8px; }
.cv-dealer-name { font-size: 32px; font-weight: 800; background: linear-gradient(90deg, var(--accent), #60a5fa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 4px; }
.cv-dealer-sub { font-size: 14px; color: var(--text2); }

/* Tabs */
.tab-bar {
  display: flex;
  gap: 4px;
  margin-bottom: 20px;
  border-bottom: 2px solid var(--border);
  padding-bottom: 0;
  overflow-x: auto;
}
.tab-btn {
  padding: 10px 20px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  color: var(--text2);
  border-bottom: 2px solid transparent;
  transition: 0.15s;
  white-space: nowrap;
}
.tab-btn:hover { color: var(--accent); }
.tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }

/* Section */
.section {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
  margin-bottom: 20px;
}
.section-title {
  font-size: 18px;
  font-weight: 700;
  margin-bottom: 16px;
  padding-bottom: 8px;
  border-bottom: 1px solid var(--border);
  color: var(--accent);
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
  gap: 10px;
}

/* Table */
.data-table {
  width: 100%;
  border-collapse: collapse;
}
.data-table th {
  text-align: left;
  padding: 10px 8px;
  font-size: 11px;
  color: var(--text2);
  text-transform: uppercase;
  border-bottom: 2px solid var(--border);
}
.data-table td {
  padding: 8px;
  border-bottom: 1px solid var(--border);
  font-size: 13px;
  vertical-align: middle;
}
.data-table input, .data-table select {
  width: 100%;
  padding: 6px 8px;
  border-radius: 6px;
  border: 1px solid var(--border);
  background: var(--input-bg);
  color: var(--text);
  font-size: 12px;
}
.data-table input:focus, .data-table select:focus { outline: none; border-color: var(--accent); }

/* Status Badge */
.status-badge {
  padding: 3px 10px;
  border-radius: 12px;
  font-size: 11px;
  font-weight: 600;
  display: inline-block;
}
.status-prospect { background: rgba(100,181,246,0.12); color: #64b5f6; }
.status-tor { background: rgba(186,104,200,0.12); color: #ba68c8; }
.status-quote { background: rgba(255,183,77,0.12); color: #ffb74d; }
.status-bidding { background: rgba(255,235,59,0.12); color: #fdd835; }
.status-nego { background: rgba(77,208,225,0.12); color: #4dd0e1; }
.status-win { background: rgba(129,199,132,0.12); color: #81c784; }
.status-ordered { background: rgba(76,175,80,0.12); color: #4caf50; }
.status-delivered { background: rgba(76,175,80,0.15); color: #66bb6a; }

/* Buttons */
.btn { padding: 6px 12px; border-radius: 6px; border: 1px solid var(--border); background: transparent; color: var(--text2); cursor: pointer; font-size: 12px; transition: 0.15s; }
.btn-primary { background: var(--accent); border-color: var(--accent); color: #fff; }
.btn-primary:hover { opacity: 0.9; }
.btn-sm { padding: 4px 8px; font-size: 11px; }
.btn-danger { border-color: var(--danger); color: var(--danger); }
.btn-danger:hover { background: rgba(239,68,68,0.1); }
.btn-success { background: var(--success); border-color: var(--success); color: #fff; }

/* Form */
.form-group { margin-bottom: 16px; }
.form-group label { display: block; font-size: 12px; font-weight: 600; color: var(--text2); margin-bottom: 5px; }
.form-group input, .form-group select, .form-group textarea {
  width: 100%;
  padding: 8px 12px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--input-bg);
  color: var(--text);
  font-size: 13px;
}
.form-group input:focus, .form-group select:focus, .form-group textarea:focus { outline: none; border-color: var(--accent); }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.hint { font-size: 11px; color: var(--text2); margin-top: 4px; }

/* Modal */
.modal-overlay {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background: rgba(0,0,0,0.7);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 2000;
}
.modal-container {
  background: var(--card);
  border-radius: 16px;
  max-width: 500px;
  width: 90%;
  max-height: 85vh;
  overflow-y: auto;
}
.modal-header {
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
  display: flex;
  justify-content: space-between;
  align-items: center;
  position: sticky;
  top: 0;
  background: var(--card);
}
.modal-header h3 { font-size: 18px; color: var(--accent); }
.modal-close { background: none; border: none; color: var(--text2); font-size: 24px; cursor: pointer; }
.modal-body { padding: 20px; }
.modal-footer {
  padding: 16px 20px;
  border-top: 1px solid var(--border);
  display: flex;
  justify-content: flex-end;
  gap: 12px;
  position: sticky;
  bottom: 0;
  background: var(--card);
}

/* Toast */
.success-toast {
  position: fixed;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--success);
  color: #fff;
  padding: 12px 24px;
  border-radius: 40px;
  font-size: 14px;
  font-weight: 600;
  z-index: 2001;
  animation: fadeInUp 0.3s ease, fadeOut 0.3s ease 2.7s forwards;
}
@keyframes fadeInUp {
  from { opacity: 0; transform: translateX(-50%) translateY(20px); }
  to { opacity: 1; transform: translateX(-50%) translateY(0); }
}
@keyframes fadeOut { to { opacity: 0; visibility: hidden; } }

.loading { text-align: center; padding: 40px; color: var(--text2); }

/* Forecast Items */
.forecast-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px;
  background: var(--bg);
  border-radius: 8px;
  margin-bottom: 6px;
  flex-wrap: wrap;
}
.summary-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(80px, 1fr));
  gap: 8px;
  margin-top: 12px;
}
.summary-card {
  text-align: center;
  padding: 6px;
  background: var(--bg);
  border-radius: 8px;
}

@media (max-width: 768px) {
  .cv-container { padding: 12px; }
  .cv-dealer-name { font-size: 24px; }
  .form-row { grid-template-columns: 1fr; }
  .data-table { font-size: 11px; }
  .data-table th, .data-table td { padding: 4px; }
}
</style>
</head>
<body>
<div class="cv-container" id="cvContainer">
  <div class="cv-header">
    <div class="cv-logo">🚁 DJI Enterprise</div>
    <div class="cv-dealer-name" id="dealerName">กำลังโหลด...</div>
    <div class="cv-dealer-sub">DJI Authorized Dealer</div>
  </div>
  <div class="tab-bar" id="tabBar">
    <div class="tab-btn active" data-tab="pipeline">📋 โครงการของฉัน</div>
    <div class="tab-btn" data-tab="forecast">📦 แผนการสั่งซื้อ</div>
    <div class="tab-btn" data-tab="timeline">📝 ประวัติการอัพเดท</div>
  </div>
  <div id="tabContent"></div>
  <div class="cv-footer" style="text-align:center; padding:24px 0; margin-top:32px; border-top:1px solid var(--border); font-size:12px; color:var(--text2)">
    <div>Powered by SIS Distribution (Thailand) PLC — DJI Authorized Distributor</div>
    <div id="footerDate"></div>
  </div>
</div>
<button class="theme-toggle" onclick="toggleTheme()" title="เปลี่ยนธีม">🌙</button>

<script>
// ===== THEME =====
function getSavedTheme() { return localStorage.getItem('cv_theme') || 'dark'; }
function applyTheme(theme) {
  if (theme === 'light') { document.body.classList.add('theme-light'); document.querySelector('.theme-toggle').textContent = '☀️'; }
  else { document.body.classList.remove('theme-light'); document.querySelector('.theme-toggle').textContent = '🌙'; }
}
function toggleTheme() { var current = getSavedTheme(); var next = current === 'dark' ? 'light' : 'dark'; localStorage.setItem('cv_theme', next); applyTheme(next); }
applyTheme(getSavedTheme());

// ===== HELPER =====
function esc(s) { if (!s) return ''; return String(s).replace(/</g, '&lt;').replace(/>/g, '&gt;'); }
function formatThaiDate(iso) { if (!iso) return ''; var d = new Date(iso); if (isNaN(d)) return iso; return d.getDate().toString().padStart(2,'0')+'/'+(d.getMonth()+1).toString().padStart(2,'0')+'/'+d.getFullYear(); }
function showSuccessToast(msg) { var t = document.createElement('div'); t.className = 'success-toast'; t.textContent = msg || '✅ บันทึกเรียบร้อยแล้ว!'; document.body.appendChild(t); setTimeout(function() { if(t.remove) t.remove(); }, 3000); }
function closeModal() { var modal = document.querySelector('.modal-overlay'); if (modal) modal.remove(); }

// ===== STATUS =====
var STATUS_LIST = [
  { id: 'prospect', name: '🔵 Prospect' }, { id: 'tor_review', name: '🟣 TOR Review' },
  { id: 'quotation', name: '🟠 Quotation' }, { id: 'bidding', name: '🟡 Bidding' },
  { id: 'negotiation', name: '🔵 Negotiation' }, { id: 'win', name: '🟢 Win' },
  { id: 'ordered', name: '🟢 Ordered' }, { id: 'delivered', name: '✅ Delivered' }
];
function getStatusLabel(status) { var s = STATUS_LIST.find(x => x.id === status); return '<span class="status-badge status-'+status+'">'+(s ? s.name : status)+'</span>'; }
function getStatusNameFromId(statusId) { var s = STATUS_LIST.find(function(x) { return x.id === statusId; }); return s ? s.name : statusId; }

// ===== DATA =====
var dealerId = new URLSearchParams(window.location.search).get('dealerId');
var currentTab = 'pipeline';
var allModels = [];
var pipelinesData = [];
var forecastData = { items: [] };
var timelineLogs = [];
var dealerName = '';

// ===== LOAD MODELS =====
function loadModels() {
  var cfg = localStorage.getItem('v7_config');
  if (cfg) {
    try {
      var config = JSON.parse(cfg);
      if (config.models && config.models.length) {
        allModels = config.models.map(function(m) { return typeof m === 'object' ? m.name : m; }).filter(function(m) { return m; });
      }
    } catch(e) {}
  }
  if (!allModels.length) {
    allModels = ['DJI Matrice 4E', 'DJI Matrice 4T', 'DJI Matrice 4TD', 'DJI Matrice 400', 'DJI Matrice 30', 'DJI Matrice 30T',
      'Zenmuse L2', 'Zenmuse L3', 'Zenmuse H30', 'Zenmuse H30T', 'Zenmuse P1', 'DJI Dock 2', 'DJI Dock 3',
      'DJI FlightHub 2', 'DJI Terra', 'Mavic 3 Enterprise', 'Mavic 3 Multispectral', 'อื่นๆ'];
  }
}

// ===== LOAD CLIENT FORECAST =====
function loadClientForecast() {
  var key = 'v7_client_forecast_' + dealerId;
  var saved = localStorage.getItem(key);
  if (saved) {
    try { forecastData = JSON.parse(saved); } catch(e) {}
  }
  if (!forecastData.items) forecastData.items = [];
}

function saveClientForecast() {
  var key = 'v7_client_forecast_' + dealerId;
  forecastData.updatedAt = new Date().toISOString();
  localStorage.setItem(key, JSON.stringify(forecastData));
  showSuccessToast('✅ บันทึกแผนการสั่งซื้อเรียบร้อยแล้ว');
  if (currentTab === 'forecast') renderCurrentTab();
}

// ===== LOAD PIPELINE =====
function loadPipeline() {
  var allPipes = JSON.parse(localStorage.getItem('v7_pipeline') || '[]');
  var pipeLogs = JSON.parse(localStorage.getItem('v7_pipelog') || '[]');
  var activePipes = allPipes.filter(function(p) { return p.dealerId === dealerId && ['lost','on_hold'].indexOf(p.status) === -1; });
  
  pipelinesData = [];
  for (var i = 0; i < activePipes.length; i++) {
    var p = activePipes[i];
    var items = [];
    if (p.items && p.items.length) items = p.items;
    else if (p.model) items = [{ model: p.model, qty: p.modelQty || 1 }];
    
    var logs = pipeLogs.filter(function(l) { return l.pipeId === p.id; }).sort(function(a,b) { return (b.date||'').localeCompare(a.date||''); });
    var lastUpdateDays = null;
    if (logs.length && logs[0].date) {
      var d = new Date(logs[0].date);
      var now = new Date(); now.setHours(0,0,0,0);
      lastUpdateDays = Math.floor((now - d) / 86400000);
    }
    
    pipelinesData.push({
      id: p.id,
      projectName: p.projectName || '-',
      endUserTH: p.endUserTH || '-',
      status: p.status,
      biddingDate: p.biddingDate || '-',
      shipmentDate: p.shipmentDate || '-',
      items: items,
      lastUpdateDays: lastUpdateDays,
      logs: logs.slice(0, 5)
    });
  }
}

// ===== LOAD TIMELINE =====
function loadTimeline() {
  var allLogs = JSON.parse(localStorage.getItem('v7_pipelog') || '[]');
  timelineLogs = allLogs.filter(function(l) {
    var pipe = pipelinesData.find(function(p) { return p.id === l.pipeId; });
    return pipe;
  }).sort(function(a,b) { return (b.date||'').localeCompare(a.date||''); }).slice(0, 50);
}

// ===== RENDER PIPELINE TAB =====
function renderPipelineTab() {
  if (!pipelinesData.length) {
    return '<div class="section">' +
      '<div class="section-title">📊 โครงการของท่าน</div>' +
      '<div style="text-align:center;padding:30px">📭 ไม่มีโครงการที่กำลังดำเนินการ</div>' +
      '<div style="text-align:center;padding:10px"><button class="btn btn-primary" onclick="showAddProjectModal()">➕ เพิ่มโครงการใหม่</button></div>' +
      '</div>';
  }
  
  var html = '<div class="section">' +
    '<div class="section-title" style="display:flex;justify-content:space-between;align-items:center">' +
    '<span>📊 โครงการของท่าน (' + pipelinesData.length + ' โครงการ)</span>' +
    '<button class="btn btn-primary btn-sm" onclick="showAddProjectModal()">➕ เพิ่มโครงการ</button>' +
    '</div>';
  html += '<div style="overflow-x:auto"><table class="data-table">';
  html += '<thead><tr><th>#</th><th>โครงการ</th><th>End User</th><th>สถานะ</th><th>อัพเดทล่าสุด</th><th>สินค้า</th><th></th></tr></thead><tbody>';
  
  for (var i = 0; i < pipelinesData.length; i++) {
    var p = pipelinesData[i];
    var updateBadge = p.lastUpdateDays === null ? '🆕 ยังไม่มี' : (p.lastUpdateDays <= 3 ? '✅ ' + p.lastUpdateDays + ' วัน' : '⚠️ ' + p.lastUpdateDays + ' วัน');
    var itemsText = '';
    for (var j = 0; j < p.items.length; j++) {
      itemsText += p.items[j].model + (p.items[j].qty > 1 ? ' x' + p.items[j].qty : '');
      if (j < p.items.length - 1) itemsText += ', ';
    }
    html += '<tr>';
    html += '<td class="cv-num">' + (i+1) + '</td>';
    html += '<td><strong>' + esc(p.projectName) + '</strong></td>';
    html += '<td>' + esc(p.endUserTH) + '</td>';
    html += '<td>' + getStatusLabel(p.status) + '</td>';
    html += '<td><span style="font-size:11px">' + updateBadge + '</span></td>';
    html += '<td>' + (itemsText || '-') + '</td>';
    html += '<td><button class="btn btn-sm btn-primary" onclick="showUpdatePipelineModal(\'' + p.id + '\')">📝 อัพเดท</button></td>';
    html += '</tr>';
  }
  html += '</tbody></table></div></div>';
  return html;
}

// ===== UPDATE PIPELINE MODAL (แบบเต็ม เหมือนเก่า) =====
function showUpdatePipelineModal(pipeId) {
  var p = pipelinesData.find(function(x) { return x.id === pipeId; });
  if (!p) return;
  
  var lastLog = p.logs && p.logs.length > 0 ? p.logs[0] : null;
  var lastUpdateText = lastLog ? lastLog.content : '';
  
  var statusOptions = '';
  for (var i = 0; i < STATUS_LIST.length; i++) {
    var selected = (p.status === STATUS_LIST[i].id) ? 'selected' : '';
    statusOptions += '<option value="' + STATUS_LIST[i].id + '" ' + selected + '>' + STATUS_LIST[i].name + '</option>';
  }
  
  var itemsText = '';
  for (var i = 0; i < p.items.length; i++) {
    itemsText += '• ' + p.items[i].model + (p.items[i].qty > 1 ? ' x' + p.items[i].qty : '') + '<br>';
  }
  
  var modalHtml = '<div class="modal-overlay" onclick="if(event.target===this)closeModal()">';
  modalHtml += '<div class="modal-container" style="max-width:500px;width:90%">';
  
  modalHtml += '<div class="modal-header">';
  modalHtml += '<h3>📝 อัพเดทโครงการ</h3>';
  modalHtml += '<button class="modal-close" onclick="closeModal()">✕</button>';
  modalHtml += '</div>';
  
  modalHtml += '<div class="modal-body">';
  
  modalHtml += '<div style="background:var(--bg);padding:12px;border-radius:8px;margin-bottom:16px">';
  modalHtml += '<div style="font-weight:700;margin-bottom:4px">' + esc(p.projectName) + '</div>';
  modalHtml += '<div style="font-size:12px;color:var(--text2)">' + esc(p.endUserTH) + '</div>';
  modalHtml += '<div style="font-size:12px;margin-top:4px">' + itemsText + '</div>';
  modalHtml += '</div>';
  
  modalHtml += '<div class="form-group">';
  modalHtml += '<label>📊 สถานะปัจจุบัน</label>';
  modalHtml += '<select id="updateStatus" class="form-control" style="width:100%;padding:8px;border-radius:8px;border:1px solid var(--border);background:var(--input-bg);color:var(--text)">' + statusOptions + '</select>';
  modalHtml += '</div>';
  
  modalHtml += '<div class="form-group">';
  modalHtml += '<label>📝 รายละเอียดอัพเดท *</label>';
  modalHtml += '<textarea id="updateContent" rows="4" style="width:100%;padding:8px;border-radius:8px;border:1px solid var(--border);background:var(--input-bg);color:var(--text)" placeholder="เช่น ได้รับ PO แล้ว, กำลังรอส่งมอบ, เอกสารเรียบร้อย..."></textarea>';
  modalHtml += '</div>';
  
  modalHtml += '<div class="form-row">';
  modalHtml += '<div class="form-group">';
  modalHtml += '<label>📅 Bidding Date</label>';
  modalHtml += '<input type="date" id="updateBidding" style="width:100%;padding:8px;border-radius:8px;border:1px solid var(--border);background:var(--input-bg);color:var(--text)" value="' + (p.biddingDate !== '-' && p.biddingDate ? p.biddingDate.split('/').reverse().join('-') : '') + '">';
  modalHtml += '</div>';
  modalHtml += '<div class="form-group">';
  modalHtml += '<label>📅 Shipment Date</label>';
  modalHtml += '<input type="date" id="updateShipment" style="width:100%;padding:8px;border-radius:8px;border:1px solid var(--border);background:var(--input-bg);color:var(--text)" value="' + (p.shipmentDate !== '-' && p.shipmentDate ? p.shipmentDate.split('/').reverse().join('-') : '') + '">';
  modalHtml += '</div>';
  modalHtml += '</div>';
  
  if (lastUpdateText) {
    modalHtml += '<div class="form-group">';
    modalHtml += '<label>📝 อัพเดทล่าสุด</label>';
    modalHtml += '<div style="padding:8px;background:var(--bg);border-radius:8px;font-size:12px;color:var(--text2)">' + esc(lastUpdateText) + '</div>';
    modalHtml += '</div>';
  }
  
  modalHtml += '</div>';
  
  modalHtml += '<div class="modal-footer">';
  modalHtml += '<button class="btn" onclick="closeModal()">ยกเลิก</button>';
  modalHtml += '<button class="btn btn-primary" onclick="submitPipelineUpdate(\'' + pipeId + '\')">💾 บันทึกอัพเดท</button>';

function submitPipelineUpdate(pipeId) {
  var newStatus = document.getElementById('updateStatus').value;
  var content = document.getElementById('updateContent').value.trim();
  var biddingDateInput = document.getElementById('updateBidding').value;
  var shipmentDateInput = document.getElementById('updateShipment').value;
  
  var biddingDate = biddingDateInput ? biddingDateInput.split('-').reverse().join('/') : '';
  var shipmentDate = shipmentDateInput ? shipmentDateInput.split('-').reverse().join('/') : '';
  
  if (!content) {
    alert('กรุณาใส่รายละเอียดอัพเดท');
    return;
  }
  
  var allPipes = JSON.parse(localStorage.getItem('v7_pipeline') || '[]');
  var oldStatus = '';
  var oldBidding = '';
  var oldShipment = '';
  
  for (var i = 0; i < allPipes.length; i++) {
    if (allPipes[i].id === pipeId) {
      oldStatus = allPipes[i].status || 'prospect';
      oldBidding = allPipes[i].biddingDate || '';
      oldShipment = allPipes[i].shipmentDate || '';
      allPipes[i].status = newStatus;
      if (biddingDate) allPipes[i].biddingDate = biddingDate;
      if (shipmentDate) allPipes[i].shipmentDate = shipmentDate;
      break;
    }
  }
  localStorage.setItem('v7_pipeline', JSON.stringify(allPipes));
  
  var logMsg = content;
  var oldStatusName = getStatusNameFromId(oldStatus);
  var newStatusName = getStatusNameFromId(newStatus);
  
  if (oldStatusName !== newStatusName) {
    logMsg = '🔄 เปลี่ยนสถานะ: ' + oldStatusName + ' → ' + newStatusName + '\n' + content;
  }
  if (biddingDate && biddingDate !== oldBidding) {
    logMsg += '\n📅 Bidding: ' + biddingDate;
  }
  if (shipmentDate && shipmentDate !== oldShipment) {
    logMsg += '\n🚚 Shipment: ' + shipmentDate;
  }
  
  var pipeLogs = JSON.parse(localStorage.getItem('v7_pipelog') || '[]');
  pipeLogs.unshift({
    id: 'log_' + Date.now(),
    pipeId: pipeId,
    type: 'update',
    content: logMsg,
    date: new Date().toISOString()
  });
  localStorage.setItem('v7_pipelog', JSON.stringify(pipeLogs));
  
  var tasks = JSON.parse(localStorage.getItem('v7_tasks') || '[]');
  var project = pipelinesData.find(function(p) { return p.id === pipeId; });
  tasks.unshift({
    id: 'task_' + Date.now(),
    title: '📋 ลูกค้าอัพเดทโครงการ: ' + (project ? project.projectName : ''),
    description: 'ลูกค้า ' + dealerName + ' อัพเดทโครงการ\n\n' + logMsg,
    pipeId: pipeId,
    dealerId: dealerId,
    dueDate: new Date(Date.now() + 2 * 86400000).toISOString().split('T')[0],
    priority: 'high',
    status: 'active',
    category: 'Client Update'
  });
  localStorage.setItem('v7_tasks', JSON.stringify(tasks));
  
  showSuccessToast('✅ อัพเดทเรียบร้อยแล้ว!');
  closeModal();
  
  setTimeout(function() { 
    loadPipeline(); 
    loadTimeline(); 
    renderCurrentTab(); 
  }, 500);
}

var newProjectItems = [];
function addNewProjectItem() {
  var model = document.getElementById('newModel').value;
  var qty = parseInt(document.getElementById('newQty').value);
  if (!model) { alert('เลือกสินค้า'); return; }
  if (!qty || qty <= 0) { alert('กรุณากรอกจำนวน'); return; }
  newProjectItems.push({ model: model, qty: qty });
  document.getElementById('newModel').value = '';
  document.getElementById('newQty').value = '1';
  renderNewProjectItemsList();
}

function renderNewProjectItemsList() {
  var container = document.getElementById('newProjectItemsList');
  if (!container) return;
  var html = '';
  for (var i = 0; i < newProjectItems.length; i++) {
    html += '<div style="display:flex;justify-content:space-between;align-items:center;padding:4px 0;border-bottom:1px solid var(--border)">';
    html += '<span>' + esc(newProjectItems[i].model) + ' x' + newProjectItems[i].qty + '</span>';
    html += '<button class="btn btn-sm btn-danger" onclick="removeNewProjectItem(' + i + ')">✕</button>';
    html += '</div>';
  }
  container.innerHTML = html || '<div class="hint" style="padding:8px">ยังไม่มีสินค้า</div>';
}

function removeNewProjectItem(idx) {
  newProjectItems.splice(idx, 1);
  renderNewProjectItemsList();
}

function submitNewProject() {
  var projectName = document.getElementById('newProjectName').value.trim();
  if (!projectName) { alert('กรุณากรอกชื่อโครงการ'); return; }
  if (newProjectItems.length === 0) { alert('กรุณาเพิ่มสินค้าอย่างน้อย 1 รายการ'); return; }
  
  var endUser = document.getElementById('newEndUser').value.trim() || '-';

    projectName: projectName,

    unitType: unitType,
    dealerId: dealerId,
    status: 'prospect',
    registerDate: new Date().toISOString().split('T')[0],
    shipmentDate: month,
    items: newProjectItems,
    model: newProjectItems[0].model,

    forecastAmount: 0,

    pipeId: newPipe.id,
    type: 'update',
    content: '✅ ลูกค้าเพิ่มโครงการใหม่: ' + projectName,
    date: new Date().toISOString()
  });

  var tasks = JSON.parse(localStorage.getItem('v7_tasks') || '[]');
  tasks.unshift({
    id: 'task_' + Date.now(),

    description: 'ลูกค้า ' + dealerName + ' เพิ่มโครงการใหม่ กรุณาตรวจสอบ\n\nโครงการ: ' + projectName + '\nEnd User: ' + endUser + '\nสินค้า: ' + newProjectItems.map(function(it) { return it.model + ' x' + it.qty; }).join(', '),

// ===== FORECAST FUNCTIONS =====
function addForecastItem() {
  var model = document.getElementById('forecastModelInput').value.trim();
  var qty = parseInt(document.getElementById('forecastQty').value);
  var month = document.getElementById('forecastMonth').value;
  var projectName = document.getElementById('forecastProject').value.trim();
  
  if (!model) { alert('กรุณาเลือกสินค้า'); return; }
  if (!qty || qty <= 0) { alert('กรุณากรอกจำนวน'); return; }
  
  forecastData.items.push({
    id: 'fc_' + Date.now() + '_' + Math.random().toString(36).substr(2, 4),
    model: model,
    qty: qty,
    month: month,
    projectName: projectName || '',
    createdAt: new Date().toISOString()
  });
  
  document.getElementById('forecastModelInput').value = '';
  document.getElementById('forecastQty').value = '1';
  document.getElementById('forecastProject').value = '';
  
  saveClientForecast();
}

function deleteForecastItem(idx) {
  if (!confirm('ลบรายการนี้?')) return;
  forecastData.items.splice(idx, 1);
  saveClientForecast();
}

// ===== EXCEL FUNCTIONS =====
function downloadForecastTemplate() {
  var wsData = [['Model / สินค้า', 'จำนวน', 'เดือน', 'โครงการ (ถ้ามี)']];
  wsData.push(['', '', 'มิ.ย. 69', '']);
  wsData.push(['', '', 'ก.ค. 69', '']);
  var ws = XLSX.utils.aoa_to_sheet(wsData);
  var wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Forecast');
  XLSX.writeFile(wb, 'Forecast_Template_' + new Date().toISOString().split('T')[0] + '.xlsx');
}

function uploadExcelFile(input) {
  var file = input.files[0];
  if (!file) return;
  var reader = new FileReader();
  reader.onload = function(e) {
    var data = new Uint8Array(e.target.result);
    var workbook = XLSX.read(data, { type: 'array' });
    var sheet = workbook.Sheets[workbook.SheetNames[0]];
    var rows = XLSX.utils.sheet_to_json(sheet, { header: 1, defval: '' });
    if (!rows || rows.length < 2) { alert('ไม่พบข้อมูล'); return; }
    
    var newItems = [];
    for (var i = 1; i < rows.length; i++) {
      var row = rows[i];
      if (!row || !row[0]) continue;
      var model = row[0];
      var qty = parseInt(row[1]) || 0;
      var month = row[2];
      var project = row[3] || '';
      if (model && qty > 0 && month) {
        newItems.push({ model: model, qty: qty, month: month, projectName: project });
      }
    }
    
    for (var i = 0; i < newItems.length; i++) {
      forecastData.items.push({
        id: 'fc_' + Date.now() + '_' + i + '_' + Math.random().toString(36).substr(2, 4),
        model: newItems[i].model,
        qty: newItems[i].qty,
        month: newItems[i].month,
        projectName: newItems[i].projectName,
        createdAt: new Date().toISOString()
      });
    }
    saveClientForecast();
    input.value = '';
  };
  reader.readAsArrayBuffer(file);
}

// ===== RENDER TIMELINE TAB =====
function renderTimelineTab() {
  if (!timelineLogs.length) {
    return '<div class="section"><div style="text-align:center;padding:40px">📭 ยังไม่มีประวัติการอัพเดท</div></div>';
  }
  var html = '<div class="section"><div class="section-title">📝 ประวัติการอัพเดททั้งหมด</div><div class="timeline" style="max-height:500px;overflow-y:auto">';
  for (var i = 0; i < timelineLogs.length; i++) {
    var l = timelineLogs[i];
    var icon = l.type === 'progress' ? '🟢' : l.type === 'win' ? '✅' : l.type === 'status_change' ? '🔄' : '📝';
    var dateStr = l.date ? formatThaiDate(l.date) : '-';
    html += '<div style="padding:12px;border-bottom:1px solid var(--border)">';
    html += '<div style="font-size:11px;color:var(--text2)">' + dateStr + ' ' + icon + '</div>';
    html += '<div style="font-size:13px;margin-top:4px">' + esc(l.content || '') + '</div>';
    html += '</div>';
  }
  html += '</div></div>';
  return html;
}

function renderCurrentTab() {
  var content = '';
  if (currentTab === 'pipeline') content = renderPipelineTab();
  else if (currentTab === 'forecast') content = renderForecastTab();
  else content = renderTimelineTab();
  document.getElementById('tabContent').innerHTML = content;
}

// ===== LOAD ALL DATA =====
function loadAllData() {
  if (!dealerId) {
    document.getElementById('tabContent').innerHTML = '<div class="section" style="text-align:center"><p>❌ ไม่พบข้อมูล Dealer</p></div>';

  }
  var dealers = JSON.parse(localStorage.getItem('v7_dealers') || '[]');

    document.getElementById('tabContent').innerHTML = '<div class="section" style="text-align:center"><p>❌ ไม่พบข้อมูล Dealer</p></div>';

  loadClientForecast();
  loadTimeline();
  renderCurrentTab();
}
