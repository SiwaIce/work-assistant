<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DJI Enterprise - Client View</title>
<style>
/* ===== CSS VARIABLES ===== */
:root {
  --bg: #0f172a;
  --bg2: #1e293b;
  --card: #1e293b;
  --border: #334155;
  --text: #e2e8f0;
  --text2: #94a3b8;
  --text3: #64748b;
  --accent: #3b82f6;
  --accent-light: rgba(59,130,246,0.1);
  --radius: 12px;
  --input-bg: #0f172a;
}

/* ===== LIGHT THEME ===== */
.theme-light {
  --bg: #f1f5f9;
  --bg2: #ffffff;
  --card: #ffffff;
  --border: #e2e8f0;
  --text: #1e293b;
  --text2: #475569;
  --text3: #64748b;
  --accent: #2563eb;
  --accent-light: #eff6ff;
  --input-bg: #ffffff;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Segoe UI', 'Noto Sans Thai', sans-serif;
  background: var(--bg);
  color: var(--text);
  transition: background 0.2s, color 0.2s;
}

/* ===== THEME TOGGLE - TOP RIGHT ===== */
.theme-toggle {
  position: fixed;
  top: 20px;
  right: 20px;
  width: 40px;
  height: 40px;
  border-radius: 50%;
  background: var(--card);
  border: 1px solid var(--border);
  color: var(--text2);
  cursor: pointer;
  font-size: 18px;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 1000;
  transition: 0.2s;
  box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}
.theme-toggle:hover {
  transform: scale(1.05);
  border-color: var(--accent);
  color: var(--accent);
}

.cv-container {
  max-width: 1000px;
  margin: 0 auto;
  padding: 24px;
  padding-top: 20px;
}

/* Header */
.cv-header {
  text-align: center;
  padding: 24px 0 32px;
  margin-bottom: 24px;
  border-bottom: 2px solid rgba(100, 181, 246, 0.2);
}
.cv-logo {
  font-size: 14px;
  color: var(--accent);
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-bottom: 8px;
}
.cv-dealer-name {
  font-size: 32px;
  font-weight: 800;
  background: linear-gradient(90deg, var(--accent), #60a5fa);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 4px;
}
.cv-dealer-sub {
  font-size: 14px;
  color: var(--text2);
}

/* Stats */
.cv-stats {
  display: flex;
  gap: 16px;
  justify-content: center;
  margin-bottom: 24px;
}
.cv-stat {
  text-align: center;
  padding: 16px 24px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  min-width: 100px;
}
.cv-stat-val {
  font-size: 28px;
  font-weight: 800;
  color: var(--accent);
}
.cv-stat-label {
  font-size: 12px;
  color: var(--text2);
  margin-top: 2px;
}

/* Section */
.cv-section {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
  margin-bottom: 16px;
}
.cv-section-title {
  font-size: 18px;
  font-weight: 700;
  margin-bottom: 14px;
  padding-bottom: 8px;
  border-bottom: 1px solid var(--border);
  color: var(--accent);
}

/* Table */
.cv-table {
  width: 100%;
  border-collapse: collapse;
}
.cv-table th {
  text-align: left;
  padding: 10px 12px;
  font-size: 11px;
  color: var(--text2);
  text-transform: uppercase;
  border-bottom: 2px solid var(--border);
}
.cv-table td {
  padding: 12px;
  border-bottom: 1px solid var(--border);
  font-size: 13px;
}
.cv-row {
  cursor: pointer;
  transition: 0.15s;
}
.cv-row:hover td {
  background: var(--accent-light);
}
.cv-num {
  color: var(--text2);
  font-weight: 700;
  font-size: 12px;
  width: 32px;
}
.cv-project {
  font-weight: 600;
}

/* Status */
.cv-status {
  padding: 3px 10px;
  border-radius: 12px;
  font-size: 11px;
  font-weight: 600;
  display: inline-block;
}
.cv-st-prospect { background: rgba(100,181,246,0.12); color: #64b5f6; }
.cv-st-tor { background: rgba(186,104,200,0.12); color: #ba68c8; }
.cv-st-quote { background: rgba(255,183,77,0.12); color: #ffb74d; }
.cv-st-bidding { background: rgba(255,235,59,0.12); color: #fdd835; }
.cv-st-nego { background: rgba(77,208,225,0.12); color: #4dd0e1; }
.cv-st-win { background: rgba(129,199,132,0.12); color: #81c784; }
.cv-st-ordered { background: rgba(76,175,80,0.12); color: #4caf50; }
.cv-st-delivered { background: rgba(76,175,80,0.15); color: #66bb6a; }

/* Back button */
.cv-back {
  display: inline-block;
  padding: 8px 16px;
  margin-bottom: 16px;
  cursor: pointer;
  color: var(--accent);
  font-size: 14px;
  border-radius: 8px;
}
.cv-back:hover {
  background: var(--accent-light);
}

/* Detail Grid */
.cv-detail-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px;
}
.cv-detail-item {
  background: var(--bg);
  padding: 10px;
  border-radius: 8px;
}
.cv-detail-label {
  font-size: 10px;
  color: var(--text2);
  margin-bottom: 2px;
}
.cv-detail-val {
  font-size: 14px;
  font-weight: 600;
}

/* Logs */
.cv-log {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  padding: 8px 0;
  border-bottom: 1px solid var(--border);
  font-size: 13px;
}
.cv-log-date {
  color: var(--text2);
  font-size: 11px;
  min-width: 70px;
}
.cv-log-icon { font-size: 14px; }
.cv-log-text { flex: 1; line-height: 1.5; }

/* Action */
.cv-action {
  padding: 10px 14px;
  border-radius: 8px;
  margin-bottom: 6px;
  border-left: 3px solid var(--accent);
  background: rgba(255,255,255,0.02);
}

/* Buttons */
.cv-toggle-btn {
  padding: 6px 14px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text2);
  cursor: pointer;
  font-size: 12px;
}
.cv-toggle-btn:hover {
  background: var(--accent-light);
  color: var(--accent);
  border-color: var(--accent);
}
.btn-send {
  padding: 8px 16px;
  border-radius: 8px;
  border: none;
  background: var(--accent);
  color: #fff;
  cursor: pointer;
  font-size: 13px;
  width: 100%;
}
.btn-send:hover {
  opacity: 0.9;
}

/* Modal (Popup) */
.modal-overlay {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background: rgba(0,0,0,0.7);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 2000;
  backdrop-filter: blur(4px);
}
.modal-container {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 16px;
  width: 90%;
  max-width: 500px;
  max-height: 85vh;
  overflow-y: auto;
  box-shadow: 0 20px 60px rgba(0,0,0,0.3);
}
.modal-header {
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.modal-header h3 {
  font-size: 18px;
  color: var(--accent);
}
.modal-close {
  background: none;
  border: none;
  color: var(--text2);
  font-size: 24px;
  cursor: pointer;
}
.modal-close:hover { color: var(--accent); }
.modal-body {
  padding: 20px;
}
.modal-footer {
  padding: 16px 20px;
  border-top: 1px solid var(--border);
  display: flex;
  gap: 12px;
  justify-content: flex-end;
}
.form-group {
  margin-bottom: 16px;
}
.form-group label {
  display: block;
  font-size: 12px;
  font-weight: 600;
  color: var(--text2);
  margin-bottom: 5px;
}
.form-group input, .form-group select, .form-group textarea {
  width: 100%;
  padding: 8px 12px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--input-bg);
  color: var(--text);
  font-size: 13px;
}
.form-group input:focus, .form-group select:focus, .form-group textarea:focus {
  outline: none;
  border-color: var(--accent);
}
.form-group textarea {
  resize: vertical;
  min-height: 80px;
}
.form-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}
.hint {
  font-size: 11px;
  color: var(--text2);
  margin-top: 4px;
}
.btn-cancel {
  padding: 8px 20px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text2);
  cursor: pointer;
}
.btn-submit {
  padding: 8px 20px;
  border-radius: 8px;
  border: none;
  background: var(--accent);
  color: #fff;
  cursor: pointer;
}
.btn-submit:hover { opacity: 0.9; }

/* Success Toast */
.success-toast {
  position: fixed;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%);
  background: #22c55e;
  color: #fff;
  padding: 12px 24px;
  border-radius: 40px;
  font-size: 14px;
  font-weight: 600;
  z-index: 2001;
  animation: fadeInUp 0.3s ease, fadeOut 0.3s ease 2.7s forwards;
  box-shadow: 0 4px 16px rgba(34,197,94,0.3);
}
@keyframes fadeInUp {
  from { opacity: 0; transform: translateX(-50%) translateY(20px); }
  to { opacity: 1; transform: translateX(-50%) translateY(0); }
}
@keyframes fadeOut {
  to { opacity: 0; visibility: hidden; }
}

/* Footer */
.cv-footer {
  text-align: center;
  padding: 24px 0;
  margin-top: 32px;
  border-top: 1px solid var(--border);
  font-size: 12px;
  color: var(--text2);
}

.loading {
  text-align: center;
  padding: 40px;
  color: var(--text2);
}

@media (max-width: 768px) {
  .cv-container { padding: 12px; padding-top: 16px; }
  .cv-dealer-name { font-size: 24px; }
  .cv-stats { flex-wrap: wrap; }
  .cv-detail-grid { grid-template-columns: repeat(2, 1fr); }
  .cv-table th, .cv-table td { padding: 6px 8px; font-size: 11px; }
  .form-row { grid-template-columns: 1fr; }
  .theme-toggle { top: 12px; right: 12px; width: 36px; height: 36px; }
}
</style>
</head>
<body>
<div class="cv-container" id="cvContainer">
  <div class="cv-header">
    <div class="cv-logo">🚁 DJI Enterprise</div>
    <div class="cv-dealer-name" id="dealerName">กำลังโหลด...</div>
    <div class="cv-dealer-sub">DJI Authorized Dealer</div>
  </div>
  <div id="mainContent">
    <div class="loading">🔄 กำลังโหลดข้อมูล...</div>
  </div>
  <div class="cv-footer">
    <div>Powered by SIS Distribution (Thailand) PLC — DJI Authorized Distributor</div>
    <div id="footerDate"></div>
  </div>
</div>
<button class="theme-toggle" onclick="toggleTheme()" title="เปลี่ยนธีม">🌙</button>

<script>
// ===== THEME =====
function getSavedTheme() {
  return localStorage.getItem('cv_theme') || 'dark';
}
function applyTheme(theme) {
  if (theme === 'light') {
    document.body.classList.add('theme-light');
    document.querySelector('.theme-toggle').textContent = '☀️';
  } else {
    document.body.classList.remove('theme-light');
    document.querySelector('.theme-toggle').textContent = '🌙';
  }
}
function toggleTheme() {
  var current = getSavedTheme();
  var next = current === 'dark' ? 'light' : 'dark';
  localStorage.setItem('cv_theme', next);
  applyTheme(next);
}
applyTheme(getSavedTheme());

// ===== HELPER FUNCTIONS =====
var currentPipeName = '';  // Store current pipe name for modal

function showSuccessToast(message) {
  var toast = document.createElement('div');
  toast.className = 'success-toast';
  toast.textContent = message || '✅ อัพเดทเรียบร้อยแล้ว! ขอบคุณครับ';
  document.body.appendChild(toast);
  setTimeout(function() {
    if (toast && toast.remove) toast.remove();
  }, 3000);
}

function closeModal() {
  var modal = document.getElementById('updateModal');
  if (modal && modal.remove) modal.remove();
}

function showModal(pipeId, pipeName) {
  currentPipeName = pipeName;
  // Remove existing modal if any
  var existing = document.getElementById('updateModal');
  if (existing) existing.remove();
  
  var modalHtml = '<div class="modal-overlay" id="updateModal" onclick="if(event.target===this)closeModal()">';
  modalHtml += '<div class="modal-container">';
  modalHtml += '<div class="modal-header">';
  modalHtml += '<h3>✏️ อัพเดทความคืบหน้า</h3>';
  modalHtml += '<button class="modal-close" onclick="closeModal()">✕</button>';
  modalHtml += '</div>';
  modalHtml += '<div class="modal-body">';
  modalHtml += '<div class="form-group">';
  modalHtml += '<label>📋 โครงการ</label>';
  modalHtml += '<input type="text" value="' + esc(pipeName) + '" readonly style="background:var(--border);">';
  modalHtml += '</div>';
  
  modalHtml += '<div class="form-group">';
  modalHtml += '<label>📝 ชื่อผู้แจ้ง / ผู้ติดต่อ *</label>';
  modalHtml += '<input type="text" id="updateName" placeholder="เช่น คุณสมชาย, บริษัท XXX">';
  modalHtml += '<div class="hint">💡 เพื่อให้พนักงานทราบว่าเป็นใครและติดต่อกลับ</div>';
  modalHtml += '</div>';
  
  modalHtml += '<div class="form-group">';
  modalHtml += '<label>📝 สถานะปัจจุบัน / ความคืบหน้า *</label>';
  modalHtml += '<textarea id="updateProgress" rows="3" placeholder="เช่น: ได้รับ PO แล้ว, กำลังรอส่งมอบ, เอกสารเรียบร้อย..."></textarea>';
  modalHtml += '</div>';
  
  modalHtml += '<div class="form-row">';
  modalHtml += '<div class="form-group">';
  modalHtml += '<label>📅 Bidding Date (ถ้ามี)</label>';
  modalHtml += '<input type="text" id="updateBidding" placeholder="DD/MM/YYYY">';
  modalHtml += '</div>';
  modalHtml += '<div class="form-group">';
  modalHtml += '<label>📅 Shipment Date (ถ้ามี)</label>';
  modalHtml += '<input type="text" id="updateShipment" placeholder="DD/MM/YYYY">';
  modalHtml += '</div>';
  modalHtml += '</div>';
  
  modalHtml += '<div class="form-group">';
  modalHtml += '<label>🔧 ข้อมูลที่ต้องการให้แก้ไข (เช่น ชื่อโครงการ, Model, QTY)</label>';
  modalHtml += '<textarea id="updateCorrection" rows="2" placeholder="เช่น: ชื่อโครงการควรเป็น..., Model ควรเป็น M4T x3..."></textarea>';
  modalHtml += '<div class="hint">💡 แจ้งข้อมูลที่ผิดพลาดหรือต้องการแก้ไขได้ที่นี่</div>';
  modalHtml += '</div>';
  
  modalHtml += '</div>';
  modalHtml += '<div class="modal-footer">';
  modalHtml += '<button class="btn-cancel" onclick="closeModal()">ยกเลิก</button>';
  modalHtml += '<button class="btn-submit" onclick="submitUpdate(\'' + pipeId + '\')">📩 ส่งอัพเดท</button>';
  modalHtml += '</div>';
  modalHtml += '</div>';
  modalHtml += '</div>';
  
  document.body.insertAdjacentHTML('beforeend', modalHtml);
}

function submitUpdate(pipeId) {
  var userName = document.getElementById('updateName').value.trim();
  var progressText = document.getElementById('updateProgress').value.trim();
  
  if (!userName) {
    alert('กรุณากรอกชื่อผู้แจ้ง / ผู้ติดต่อ');
    return;
  }
  if (!progressText) {
    alert('กรุณากรอกสถานะ/ความคืบหน้า');
    return;
  }
  
  var biddingDate = document.getElementById('updateBidding').value.trim();
  var shipmentDate = document.getElementById('updateShipment').value.trim();
  var correctionText = document.getElementById('updateCorrection').value.trim();
  
  // Build log message
  var logMessage = '📞 ' + userName + ' อัพเดท: ' + progressText;
  if (biddingDate) logMessage += ' | Bidding: ' + biddingDate;
  if (shipmentDate) logMessage += ' | Shipment: ' + shipmentDate;
  if (correctionText) logMessage += ' | แจ้งแก้ไข: ' + correctionText;
  
  // Save to pipeLog
  var pipeLogs = JSON.parse(localStorage.getItem('v7_pipelog') || '[]');
  pipeLogs.unshift({
    id: Date.now().toString(36) + Math.random().toString(36).substr(2, 6),
    pipeId: pipeId,
    type: 'update',
    content: logMessage,
    date: new Date().toISOString(),
    details: {
      userName: userName,
      progress: progressText,
      biddingDate: biddingDate,
      shipmentDate: shipmentDate,
      correction: correctionText
    }
  });
  localStorage.setItem('v7_pipelog', JSON.stringify(pipeLogs));
  
  // Update pipeline if dates provided
  if (biddingDate || shipmentDate) {
    var allPipes = JSON.parse(localStorage.getItem('v7_pipeline') || '[]');
    for (var i = 0; i < allPipes.length; i++) {
      if (allPipes[i].id === pipeId) {
        if (biddingDate) allPipes[i].biddingDate = biddingDate;
        if (shipmentDate) allPipes[i].shipmentDate = shipmentDate;
        break;
      }
    }
    localStorage.setItem('v7_pipeline', JSON.stringify(allPipes));
  }
  
  // Create task for salesperson
  var tasks = JSON.parse(localStorage.getItem('v7_tasks') || '[]');
  var taskTitle = '📋 ลูกค้าแจ้งข้อมูล - ' + (currentPipeName || '');
  var taskDesc = '👤 ผู้แจ้ง: ' + userName + '\n';
  taskDesc += '📝 ความคืบหน้า: ' + progressText + '\n';
  if (biddingDate) taskDesc += '📅 Bidding: ' + biddingDate + '\n';
  if (shipmentDate) taskDesc += '📅 Shipment: ' + shipmentDate + '\n';
  if (correctionText) taskDesc += '🔧 ต้องการแก้ไข: ' + correctionText + '\n';
  
  tasks.unshift({
    id: Date.now().toString(36) + Math.random().toString(36).substr(2, 6),
    title: taskTitle,
    description: taskDesc,
    pipeId: pipeId,
    dueDate: new Date(Date.now() + 2 * 86400000).toISOString().split('T')[0],
    priority: 'high',
    status: 'active',
    category: 'Client',
    created: new Date().toISOString()
  });
  localStorage.setItem('v7_tasks', JSON.stringify(tasks));
  
  closeModal();
  showSuccessToast('✅ อัพเดทเรียบร้อยแล้ว! ขอบคุณคุณ ' + userName);
  
  // Refresh data to show new log
  setTimeout(function() { loadData(); }, 1000);
}

// ===== DATA FUNCTIONS =====
var dealerId = new URLSearchParams(window.location.search).get('dealerId');
var pipesData = [];
var dealerName = '';

function fmtMoneyFull(n) {
  if (!n) return '0';
  n = Number(n);
  return n.toLocaleString('th-TH');
}

function esc(s) {
  if (!s) return '';
  return String(s).replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function getStatusLabel(status) {
  var labels = {
    prospect: '<span class="cv-status cv-st-prospect">🔵 Prospect</span>',
    tor_review: '<span class="cv-status cv-st-tor">🟣 TOR Review</span>',
    quotation: '<span class="cv-status cv-st-quote">🟠 Quotation</span>',
    bidding: '<span class="cv-status cv-st-bidding">🟡 Bidding</span>',
    negotiation: '<span class="cv-status cv-st-nego">🔵 Negotiation</span>',
    win: '<span class="cv-status cv-st-win">🟢 Win</span>',
    ordered: '<span class="cv-status cv-st-ordered">🟢 Ordered</span>',
    delivered: '<span class="cv-status cv-st-delivered">✅ Delivered</span>'
  };
  return labels[status] || '<span class="cv-status">' + status + '</span>';
}

function showDetail(pipeId) {
  var p = null;
  for (var i = 0; i < pipesData.length; i++) {
    if (pipesData[i].id === pipeId) { p = pipesData[i]; break; }
  }
  if (!p) return;
  
  var html = '<div class="cv-back" onclick="showOverview()">← กลับ</div>';
  
  html += '<div class="cv-section"><div class="cv-section-title">📊 ' + esc(p.projectName) + '</div>';
  html += '<div class="cv-detail-grid">';
  html += '<div class="cv-detail-item"><div class="cv-detail-label">Status</div><div class="cv-detail-val">' + getStatusLabel(p.status) + '</div></div>';
  html += '<div class="cv-detail-item"><div class="cv-detail-label">End User</div><div class="cv-detail-val">' + esc(p.endUserTH) + '</div></div>';
  html += '<div class="cv-detail-item"><div class="cv-detail-label">Unit Type</div><div class="cv-detail-val">' + esc(p.unitType) + '</div></div>';
  html += '<div class="cv-detail-item"><div class="cv-detail-label">มูลค่า</div><div class="cv-detail-val">' + fmtMoneyFull(p.forecastAmount) + ' ฿</div></div>';
  html += '<div class="cv-detail-item"><div class="cv-detail-label">Bidding</div><div class="cv-detail-val">' + (p.biddingDate || '-') + '</div></div>';
  html += '<div class="cv-detail-item"><div class="cv-detail-label">Shipment</div><div class="cv-detail-val">' + (p.shipmentDate || '-') + '</div></div>';
  html += '<div class="cv-detail-item"><div class="cv-detail-label">TOR</div><div class="cv-detail-val">' + esc(p.tor) + '</div></div>';
  html += '</div></div>';
  
  if (p.items && p.items.length) {
    html += '<div class="cv-section"><div class="cv-section-title">📦 Products (' + p.items.length + ')</div>';
    html += '<table class="cv-table"><thead><tr><th>#</th><th>Model</th><th>QTY</th></tr></thead><tbody>';
    for (var i = 0; i < p.items.length; i++) {
      var it = p.items[i];
      html += '<tr><td class="cv-num">' + (i + 1) + '</td>';
      html += '<td>' + esc(it.model || '-') + '</td>';
      html += '<td>' + (it.qty || 1) + '</td>';
      html += '</tr>';
    }
    html += '</tbody></table></div>';
  }
  
  if (p.actions && p.actions.length) {
    html += '<div class="cv-section"><div class="cv-section-title">🎯 Action Items (' + p.actions.length + ')</div>';
    for (var i = 0; i < p.actions.length; i++) {
      var a = p.actions[i];
      html += '<div class="cv-action"><div class="cv-action-text">⏳ ' + esc(a.text) + '</div>';
      if (a.dueDate) html += '<div class="cv-action-meta">📅 กำหนด: ' + a.dueDate + '</div></div>';
    }
    html += '</div>';
  }
  
  if (p.logs && p.logs.length) {
    html += '<div class="cv-section"><div class="cv-section-title">📝 Updates</div>';
    for (var i = 0; i < p.logs.length; i++) {
      var l = p.logs[i];
      var icon = l.type === 'progress' ? '🟢' : l.type === 'win' ? '✅' : '📝';
      var dateStr = l.date ? l.date.split('T')[0] : '-';
      html += '<div class="cv-log"><span class="cv-log-date">' + dateStr + '</span>';
      html += '<span class="cv-log-icon">' + icon + '</span>';
      html += '<span class="cv-log-text">' + esc((l.content || '').substr(0, 80)) + '</span></div>';
    }
    html += '</div>';
  }
  
  // Update button - opens modal
  html += '<div class="cv-section"><div class="cv-section-title">✏️ สอบถามเพิ่มเติม / อัพเดท</div>';
  html += '<button class="btn-send" onclick="showModal(\'' + p.id + '\', \'' + esc(p.projectName) + '\')">📩 คลิกเพื่ออัพเดทความคืบหน้า</button>';
  html += '<div style="font-size:11px;color:var(--text2);margin-top:8px">💡 กดเพื่อแจ้งความคืบหน้า แก้ไขข้อมูล หรือสอบถามเพิ่มเติม</div>';
  html += '</div>';
  
  document.getElementById('mainContent').innerHTML = html;
}

function showOverview() {
  if (!pipesData.length) return;
  
  var totalQty = 0;
  for (var i = 0; i < pipesData.length; i++) {
    var items = pipesData[i].items;
    for (var j = 0; j < items.length; j++) {
      totalQty += (Number(items[j].qty) || 1);
    }
  }
  
  var html = '<div class="cv-stats">';
  html += '<div class="cv-stat"><div class="cv-stat-val">' + pipesData.length + '</div><div class="cv-stat-label">Projects</div></div>';
  html += '<div class="cv-stat"><div class="cv-stat-val">' + totalQty + '</div><div class="cv-stat-label">Units</div></div>';
  html += '</div>';
  
  html += '<div class="cv-section">';
  html += '<div class="cv-section-title">📊 Projects Overview</div>';
  html += '<table class="cv-table">';
  html += '<thead><tr><th>#</th><th>Project</th><th>End User</th><th>Status</th><th>Bidding</th><th>Shipment</th><th></th></tr></thead>';
  html += '<tbody>';
  
  for (var i = 0; i < pipesData.length; i++) {
    var p = pipesData[i];
    html += '<tr class="cv-row" onclick="showDetail(\'' + p.id + '\')">';
    html += '<td class="cv-num">' + (i + 1) + '</td>';
    html += '<td class="cv-project">' + esc(p.projectName) + '</td>';
    html += '<td>' + esc(p.endUserTH) + '</td>';
    html += '<td>' + getStatusLabel(p.status) + '</td>';
    html += '<td>' + (p.biddingDate || '-') + '</td>';
    html += '<td>' + (p.shipmentDate || '-') + '</td>';
    html += '<td><button class="cv-toggle-btn" onclick="event.stopPropagation();showDetail(\'' + p.id + '\')">ดูรายละเอียด</button></td>';
    html += '</tr>';
  }
  
  html += '</tbody></table></div>';
  
  document.getElementById('mainContent').innerHTML = html;
}

function loadData() {
  if (!dealerId) {
    document.getElementById('mainContent').innerHTML = '<div class="cv-section" style="text-align:center"><p>❌ ไม่พบข้อมูล Dealer</p></div>';
    return;
  }
  
  var dealers = JSON.parse(localStorage.getItem('v7_dealers') || '[]');
  var dealer = null;
  for (var i = 0; i < dealers.length; i++) {
    if (dealers[i].id === dealerId) { dealer = dealers[i]; break; }
  }
  
  if (!dealer) {
    document.getElementById('mainContent').innerHTML = '<div class="cv-section" style="text-align:center"><p>❌ ไม่พบข้อมูล Dealer</p></div>';
    return;
  }
  
  dealerName = dealer.name || '-';
  document.getElementById('dealerName').innerHTML = esc(dealerName);
  document.getElementById('footerDate').innerHTML = new Date().toISOString().split('T')[0].replace(/-/g, '/');
  
  var allPipes = JSON.parse(localStorage.getItem('v7_pipeline') || '[]');
  var pipeActions = JSON.parse(localStorage.getItem('v7_pipeActions') || '[]');
  var pipeLogs = JSON.parse(localStorage.getItem('v7_pipelog') || '[]');
  
  var activePipes = allPipes.filter(function(p) {
    return p.dealerId === dealerId && ['lost', 'on_hold'].indexOf(p.status) === -1;
  });
  
  pipesData = [];
  for (var i = 0; i < activePipes.length; i++) {
    var p = activePipes[i];
    var items = [];
    if (p.items && p.items.length) {
      items = p.items;
    } else if (p.model) {
      items = [{ model: p.model, qty: p.modelQty || 1, price: 0 }];
    }
    
    var actions = pipeActions.filter(function(a) {
      return a.pipeId === p.id && a.status === 'pending';
    });
    
    var logs = pipeLogs.filter(function(l) {
      return l.pipeId === p.id;
    }).sort(function(a, b) { return (b.date || '').localeCompare(a.date || ''); }).slice(0, 10);
    
    pipesData.push({
      id: p.id,
      projectName: p.projectName || '-',
      endUserTH: p.endUserTH || '-',
      endUserEN: p.endUserEN || '-',
      unitType: p.unitType || '-',
      status: p.status,
      biddingDate: p.biddingDate || '-',
      shipmentDate: p.shipmentDate || '-',
      tor: p.tor || '-',
      forecastAmount: p.forecastAmount || 0,
      items: items,
      actions: actions,
      logs: logs
    });
  }
  
  showOverview();
}

loadData();
</script>
</body>
</html>
