<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DJI Enterprise - ติดตามโครงการ</title>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',sans-serif;background:#0f172a;color:#e2e8f0;padding:20px}
.header{text-align:center;padding:20px 0 30px;border-bottom:2px solid #334155;margin-bottom:20px}
.logo{font-size:14px;color:#3b82f6}
.name{font-size:32px;font-weight:800;background:linear-gradient(90deg,#3b82f6,#60a5fa);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.sub{font-size:14px;color:#94a3b8}
.tab-bar{display:flex;gap:4px;margin-bottom:20px;border-bottom:2px solid #334155}
.tab-btn{padding:10px 20px;font-size:14px;font-weight:600;cursor:pointer;color:#94a3b8;border-bottom:2px solid transparent}
.tab-btn.active{color:#3b82f6;border-bottom-color:#3b82f6}
.card{background:#1e293b;border:1px solid #334155;border-radius:12px;padding:20px;margin-bottom:20px}
.card h2{font-size:16px;color:#3b82f6;margin-bottom:16px;padding-bottom:8px;border-bottom:1px solid #334155}
table{width:100%;border-collapse:collapse}
th,td{padding:10px 8px;text-align:left;border-bottom:1px solid #334155}
th{color:#94a3b8;font-size:12px}
tr:hover td{background:rgba(59,130,246,0.05)}
.status{padding:3px 10px;border-radius:12px;font-size:11px;display:inline-block}
.status-win{background:rgba(34,197,94,0.12);color:#86efac}
.status-prospect{background:rgba(100,181,246,0.12);color:#64b5f6}
.btn{padding:6px 12px;border-radius:6px;border:1px solid #334155;background:transparent;color:#94a3b8;cursor:pointer;font-size:12px}
.btn-primary{background:#3b82f6;border-color:#3b82f6;color:#fff}
.btn-sm{padding:4px 8px;font-size:11px}
.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:#22c55e;color:#fff;padding:10px 20px;border-radius:40px;z-index:2000;animation:fadeOut 3s forwards}
@keyframes fadeOut{0%{opacity:1}70%{opacity:1}100%{opacity:0;visibility:hidden}}
.modal{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.7);display:flex;align-items:center;justify-content:center;z-index:2000}
.modal-content{background:#1e293b;border-radius:16px;max-width:500px;width:90%;max-height:85vh;overflow-y:auto}
.modal-header{padding:16px;border-bottom:1px solid #334155;display:flex;justify-content:space-between}
.modal-body{padding:16px}
.modal-footer{padding:16px;border-top:1px solid #334155;display:flex;justify-content:flex-end;gap:10px}
.close{background:none;border:none;color:#94a3b8;font-size:20px;cursor:pointer}
input,select,textarea{width:100%;padding:8px;border-radius:8px;border:1px solid #334155;background:#0f172a;color:#e2e8f0}
.form-group{margin-bottom:12px}
.form-group label{display:block;font-size:12px;color:#94a3b8;margin-bottom:4px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:768px){.name{font-size:24px}.form-row{grid-template-columns:1fr}}
</style>
</head>
<body>
<div style="max-width:1200px;margin:0 auto">
  <div class="header">
    <div class="logo">🚁 DJI Enterprise</div>
    <div class="name" id="dealerName">กำลังโหลด...</div>
    <div class="sub">DJI Authorized Dealer</div>
  </div>
  <div class="tab-bar">
    <div class="tab-btn active" data-tab="pipeline">📋 โครงการของฉัน</div>
    <div class="tab-btn" data-tab="forecast">📦 แผนการสั่งซื้อ</div>
  </div>
  <div id="content"></div>
  <div style="text-align:center;padding:24px 0;font-size:12px;color:#94a3b8">
    Powered by SIS Distribution (Thailand) PLC
  </div>
</div>

<script>
var firebaseConfig = {
  apiKey: "AIzaSyB_qYvFINwOehVQ1Y6UJW9bHRL1iYcyM7w",
  authDomain: "work-assistant-9e024.firebaseapp.com",
  projectId: "work-assistant-9e024",
  storageBucket: "work-assistant-9e024.firebasestorage.app",
  messagingSenderId: "796607223436",
  appId: "1:796607223436:web:1455abe90b141104678da9"
};
firebase.initializeApp(firebaseConfig);
var db = firebase.firestore();

function showToast(msg){
  var t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(function(){ if(t.remove) t.remove(); }, 3000);
}

var dealerId = new URLSearchParams(location.search).get('dealerId');
var currentTab = 'pipeline';
var pipelines = [];

function loadDealer(){
  if(!dealerId) return;
  db.collection('dealers').doc(dealerId).get().then(function(doc){
    var name = doc.exists ? (doc.data().name || dealerId) : dealerId;
    document.getElementById('dealerName').innerHTML = name;
  }).catch(function(){
    document.getElementById('dealerName').innerHTML = dealerId;
  });
}

function loadPipeline(){
  if(!dealerId) return;
  showToast('กำลังโหลดข้อมูล...');
  db.collection('pipeline').where('dealerId', '==', dealerId).get().then(function(qs){
    pipelines = [];
    qs.forEach(function(doc){
      var data = doc.data();
      data.id = doc.id;
      pipelines.push(data);
    });
    renderPipeline();
  }).catch(function(err){
    console.error(err);
    renderPipeline();
  });
}

function renderPipeline(){
  var container = document.getElementById('content');
  if(pipelines.length === 0){
    container.innerHTML = '<div class="card"><h2>📊 โครงการของท่าน</h2><div style="text-align:center;padding:40px">📭 ยังไม่มีโครงการ</div></div>';
    return;
  }
  var html = '<div class="card"><h2>📊 โครงการของท่าน (' + pipelines.length + ' โครงการ)</h2>';
  html += '<div style="text-align:right;margin-bottom:10px"><button class="btn btn-sm" onclick="refresh()">🔄 รีเฟรช</button></div>';
  html += '<div style="overflow-x:auto"><table>';
  html += '<thead><tr><th>#</th><th>โครงการ</th><th>End User</th><th>สถานะ</th><th>สินค้า</th><th>มูลค่า</th><th></th></tr></thead><tbody>';
  for(var i=0; i<pipelines.length; i++){
    var p = pipelines[i];
    var items = '';
    if(p.items && p.items.length){
      for(var j=0; j<p.items.length; j++){
        items += p.items[j].model;
        if(p.items[j].qty > 1) items += ' x' + p.items[j].qty;
        if(j < p.items.length-1) items += ', ';
      }
    } else if(p.model){
      items = p.model + (p.modelQty > 1 ? ' x' + p.modelQty : '');
    }
    var statusClass = (p.status === 'win') ? 'status-win' : 'status-prospect';
    var statusText = (p.status === 'win') ? '✅ Win' : '🔍 Prospect';
    var amount = (p.forecastAmount || 0).toLocaleString('th-TH');
    html += '<tr onclick="showDetail(\'' + p.id + '\')" style="cursor:pointer">';
    html += '<td>' + (i+1) + '</td>';
    html += '<td><strong>' + escapeHtml(p.projectName) + '</strong></td>';
    html += '<td>' + escapeHtml(p.endUserTH || p.endUser || '-') + '</td>';
    html += '<td><span class="status ' + statusClass + '">' + statusText + '</span></td>';
    html += '<td>' + escapeHtml(items) + '</td>';
    html += '<td>' + amount + ' ฿</td>';
    html += '<td><button class="btn btn-sm" onclick="event.stopPropagation();openEditModal(\'' + p.id + '\')">📝 อัพเดท</button></td>';
    html += '</tr>';
  }
  html += '</tbody></table></div></div>';
  container.innerHTML = html;
}

function showDetail(pipeId){
  var p = pipelines.find(function(x){ return x.id === pipeId; });
  if(!p) return;
  var itemsHtml = '<table><thead><tr><th>#</th><th>Model</th><th>จำนวน</th></tr></thead><tbody>';
  if(p.items && p.items.length){
    for(var i=0; i<p.items.length; i++){
      itemsHtml += '<tr><td>' + (i+1) + '</td><td>' + escapeHtml(p.items[i].model) + '</td><td>' + (p.items[i].qty||1) + '</td></tr>';
    }
  } else if(p.model){
    itemsHtml += '<tr><td>1</td><td>' + escapeHtml(p.model) + '</td><td>' + (p.modelQty||1) + '</td></tr>';
  }
  itemsHtml += '</tbody></table>';
  var statusText = (p.status === 'win') ? '✅ Win' : '🔍 Prospect';
  var amount = (p.forecastAmount || 0).toLocaleString('th-TH');
  var html = '<div class="card">';
  html += '<div style="margin-bottom:16px"><a href="#" onclick="refresh(); return false;" style="color:#3b82f6">← กลับ</a></div>';
  html += '<h2>' + escapeHtml(p.projectName) + '</h2>';
  html += '<div><strong>👤 End User:</strong> ' + escapeHtml(p.endUserTH || p.endUser || '-') + '</div>';
  html += '<div><strong>📊 สถานะ:</strong> ' + statusText + '</div>';
  html += '<div><strong>💰 มูลค่า:</strong> ' + amount + ' ฿</div>';
  html += '<div style="margin-top:12px"><strong>📦 รายการสินค้า:</strong></div>';
  html += itemsHtml;
  html += '<div style="margin-top:12px"><button class="btn btn-primary" onclick="openEditModal(\'' + pipeId + '\')">✏️ แก้ไขข้อมูล</button></div>';
  html += '</div>';
  document.getElementById('content').innerHTML = html;
}

function openEditModal(pipeId){
  var p = pipelines.find(function(x){ return x.id === pipeId; });
  if(!p) return;
  var statusOpts = '<option value="prospect"' + (p.status==='prospect'?' selected':'') + '>🔍 Prospect</option>';
  statusOpts += '<option value="win"' + (p.status==='win'?' selected':'') + '>✅ Win</option>';
  var itemsHtml = '<div id="editItemsContainer">';
  if(p.items && p.items.length){
    for(var i=0; i<p.items.length; i++){
      itemsHtml += '<div class="form-row" style="margin-bottom:8px">';
      itemsHtml += '<input type="text" class="editItemModel" value="' + escapeHtml(p.items[i].model) + '" placeholder="Model" style="flex:2">';
      itemsHtml += '<input type="number" class="editItemQty" value="' + (p.items[i].qty||1) + '" min="1" style="width:80px">';
      itemsHtml += '<button type="button" class="btn btn-sm" onclick="this.parentElement.remove()">🗑️</button>';
      itemsHtml += '</div>';
    }
  } else if(p.model){
    itemsHtml += '<div class="form-row" style="margin-bottom:8px">';
    itemsHtml += '<input type="text" class="editItemModel" value="' + escapeHtml(p.model) + '" placeholder="Model" style="flex:2">';
    itemsHtml += '<input type="number" class="editItemQty" value="' + (p.modelQty||1) + '" min="1" style="width:80px">';
    itemsHtml += '<button type="button" class="btn btn-sm" onclick="this.parentElement.remove()">🗑️</button>';
    itemsHtml += '</div>';
  }
  itemsHtml += '</div><button type="button" class="btn btn-sm" onclick="addEditItemRow()">➕ เพิ่มสินค้า</button>';
  var modalHtml = '<div class="modal" id="editModal">';
  modalHtml += '<div class="modal-content">';
  modalHtml += '<div class="modal-header"><h3>✏️ แก้ไขโครงการ</h3><button class="close" onclick="closeModal()">✕</button></div>';
  modalHtml += '<div class="modal-body">';
  modalHtml += '<div class="form-group"><label>📋 ชื่อโครงการ</label><input type="text" id="editProjectName" value="' + escapeHtml(p.projectName) + '"></div>';
  modalHtml += '<div class="form-group"><label>👤 End User</label><input type="text" id="editEndUser" value="' + escapeHtml(p.endUserTH||p.endUser||'') + '"></div>';
  modalHtml += '<div class="form-group"><label>📊 สถานะ</label><select id="editStatus">' + statusOpts + '</select></div>';
  modalHtml += '<div class="form-group"><label>📦 สินค้า</label>' + itemsHtml + '</div>';
  modalHtml += '<div class="form-group"><label>📝 รายละเอียดอัพเดท</label><textarea id="updateContent" rows="3" placeholder="เช่น ได้รับ PO แล้ว..."></textarea></div>';
  modalHtml += '</div><div class="modal-footer">';
  modalHtml += '<button class="btn" onclick="closeModal()">ยกเลิก</button>';
  modalHtml += '<button class="btn btn-primary" onclick="saveUpdate(\'' + pipeId + '\')">💾 บันทึก</button>';
  modalHtml += '</div></div></div>';
  document.body.insertAdjacentHTML('beforeend', modalHtml);
}

function addEditItemRow(){
  var container = document.getElementById('editItemsContainer');
  if(!container) return;
  var html = '<div class="form-row" style="margin-bottom:8px">';
  html += '<input type="text" class="editItemModel" placeholder="Model" style="flex:2">';
  html += '<input type="number" class="editItemQty" value="1" min="1" style="width:80px">';
  html += '<button type="button" class="btn btn-sm" onclick="this.parentElement.remove()">🗑️</button>';
  html += '</div>';
  container.insertAdjacentHTML('beforeend', html);
}

function saveUpdate(pipeId){
  var newName = document.getElementById('editProjectName').value.trim();
  var newEndUser = document.getElementById('editEndUser').value.trim();
  var newStatus = document.getElementById('editStatus').value;
  var content = document.getElementById('updateContent').value.trim();
  if(!newName){ alert('กรุณากรอกชื่อโครงการ'); return; }
  var items = [];
  var rows = document.querySelectorAll('#editItemsContainer .form-row');
  for(var i=0; i<rows.length; i++){
    var modelInput = rows[i].querySelector('.editItemModel');
    var qtyInput = rows[i].querySelector('.editItemQty');
    if(modelInput && modelInput.value && qtyInput && parseInt(qtyInput.value)>0){
      items.push({ model: modelInput.value, qty: parseInt(qtyInput.value) });
    }
  }
  if(items.length === 0){ alert('กรุณาเพิ่มสินค้าอย่างน้อย 1 รายการ'); return; }
  var updatedData = null;
  for(var i=0; i<pipelines.length; i++){
    if(pipelines[i].id === pipeId){
      pipelines[i].projectName = newName;
      pipelines[i].endUserTH = newEndUser;
      pipelines[i].status = newStatus;
      pipelines[i].items = items;
      pipelines[i].model = items[0].model;
      pipelines[i].modelQty = 0;
      for(var j=0; j<items.length; j++) pipelines[i].modelQty += items[j].qty;
      updatedData = pipelines[i];
      break;
    }
  }
  if(updatedData){
    db.collection('pipeline').doc(pipeId).set(updatedData).catch(function(e){ console.warn(e); });
    var logData = {
      id: 'log_' + Date.now(),
      pipeId: pipeId,
      type: 'update',
      content: content || 'แก้ไขข้อมูลโครงการ',
      date: new Date().toISOString(),
      dealerId: dealerId
    };
    db.collection('pipeLog').doc(logData.id).set(logData).catch(function(e){});
    showToast('✅ บันทึกการเปลี่ยนแปลงเรียบร้อยแล้ว!');
  }
  closeModal();
  refresh();
}

function closeModal(){
  var modal = document.querySelector('.modal');
  if(modal) modal.remove();
}

function renderForecast(){
  document.getElementById('content').innerHTML = '<div class="card"><h2>📦 แผนการสั่งซื้อ</h2><div style="text-align:center;padding:40px">🚧 กำลังพัฒนา</div></div>';
}

function refresh(){
  loadPipeline();
}

function escapeHtml(str){
  if(!str) return '';
  return str.replace(/[&<>]/g, function(m){
    if(m === '&') return '&amp;';
    if(m === '<') return '&lt;';
    if(m === '>') return '&gt;';
    return m;
  });
}

// Tab switching
document.querySelectorAll('.tab-btn').forEach(function(btn){
  btn.addEventListener('click', function(){
    var tab = this.dataset.tab;
    currentTab = tab;
    document.querySelectorAll('.tab-btn').forEach(function(b){ b.classList.remove('active'); });
    this.classList.add('active');
    if(tab === 'pipeline') refresh();
    else renderForecast();
  });
});

// Export functions to global
window.refresh = refresh;
window.showDetail = showDetail;
window.openEditModal = openEditModal;
window.closeModal = closeModal;
window.saveUpdate = saveUpdate;
window.addEditItemRow = addEditItemRow;

loadDealer();
loadPipeline();
</script>
</body>
</html>
