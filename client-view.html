<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>DJI Enterprise - ติดตามสถานะโครงการ</title>
<script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>
<style>
/* [ใส่ CSS เหมือนเดิม - ขอไม่ใส่ซ้ำเพื่อความกระชับ] */
:root {
  --bg: #0a0c10;
  --bg2: #15171c;
  --card: #15171c;
  --border: rgba(255,255,255,0.06);
  --text: #e4e6eb;
  --text2: #787c85;
  --accent: #3b82f6;
  --success: #22c55e;
  --warning: #f59e0b;
  --danger: #ef4444;
  --radius: 12px;
}
.theme-light {
  --bg: #f8fafc;
  --bg2: #ffffff;
  --card: #ffffff;
  --border: #e9ecef;
  --text: #1e293b;
  --text2: #64748b;
  --accent: #2563eb;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans Thai', sans-serif;
  background: var(--bg);
  color: var(--text);
  transition: all 0.2s;
  padding-bottom: 20px;
}
.theme-toggle {
  position: fixed;
  top: 20px;
  right: 20px;
  width: 40px;
  height: 40px;
  border-radius: 10px;
  background: var(--card);
  border: 1px solid var(--border);
  color: var(--text2);
  cursor: pointer;
  font-size: 18px;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 1000;
  transition: all 0.2s;
}
.theme-toggle:hover { border-color: var(--accent); color: var(--accent); transform: scale(1.05); }
.cv-container { max-width: 1400px; margin: 0 auto; padding: 24px; }
.cv-header {
  text-align: center;
  padding: 32px 0 40px;
  margin-bottom: 24px;
  border-bottom: 1px solid var(--border);
  background: linear-gradient(135deg, var(--card) 0%, rgba(59,130,246,0.03) 100%);
  border-radius: 20px;
}
.cv-logo { font-size: 14px; color: var(--accent); letter-spacing: 2px; margin-bottom: 8px; }
.cv-dealer-name {
  font-size: 32px;
  font-weight: 800;
  background: linear-gradient(90deg, var(--accent), #60a5fa);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  margin-bottom: 4px;
}
.cv-dealer-sub { font-size: 14px; color: var(--text2); }
.cv-notice {
  background: rgba(34,197,94,0.1);
  border: 1px solid rgba(34,197,94,0.3);
  border-radius: 12px;
  padding: 12px 16px;
  margin-bottom: 20px;
  text-align: center;
  font-size: 13px;
}
.cv-notice.success { background: rgba(34,197,94,0.15); border-color: #22c55e; color: #22c55e; }
.tab-bar {
  display: flex;
  gap: 4px;
  margin-bottom: 24px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 6px;
  overflow-x: auto;
}
.tab-btn {
  padding: 10px 24px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  color: var(--text2);
  border-radius: 10px;
  transition: all 0.2s;
  white-space: nowrap;
}
.tab-btn:hover { color: var(--accent); background: var(--accent-light); }
.tab-btn.active { background: var(--accent); color: #fff; }
.section {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 20px;
  margin-bottom: 20px;
}
.section-title {
  font-size: 16px;
  font-weight: 700;
  margin-bottom: 16px;
  padding-bottom: 10px;
  border-bottom: 1px solid var(--border);
  color: var(--accent);
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
  gap: 10px;
}
.stats-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
  gap: 12px;
  margin-bottom: 20px;
}
.stat-card {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 14px;
  text-align: center;
  cursor: pointer;
  transition: all 0.2s;
}
.stat-card:hover { border-color: var(--accent); transform: translateY(-2px); }
.stat-card.active { border-color: var(--accent); background: var(--accent-light); }
.stat-month { font-size: 13px; font-weight: 700; color: var(--accent); text-transform: uppercase; }
.stat-qty { font-size: 28px; font-weight: 800; margin: 6px 0; }
.stat-detail { font-size: 11px; color: var(--text2); }
.data-table {
  width: 100%;
  border-collapse: collapse;
}
.data-table th {
  text-align: left;
  padding: 12px 10px;
  font-size: 11px;
  font-weight: 700;
  color: var(--text2);
  border-bottom: 2px solid var(--border);
}
.data-table td {
  padding: 14px 10px;
  border-bottom: 1px solid var(--border);
  vertical-align: middle;
  font-size: 13px;
}
.data-table tr:hover td { background: rgba(59,130,246,0.04); cursor: pointer; }
.status-badge {
  padding: 4px 12px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 600;
  display: inline-block;
}
.status-prospect { background: rgba(100,181,246,0.12); color: #64b5f6; }
.status-tor_review { background: rgba(186,104,200,0.12); color: #ba68c8; }
.status-quotation { background: rgba(255,183,77,0.12); color: #ffb74d; }
.status-bidding { background: rgba(255,235,59,0.12); color: #fdd835; }
.status-negotiation { background: rgba(77,208,225,0.12); color: #4dd0e1; }
.status-win { background: rgba(129,199,132,0.12); color: #81c784; }
.status-ordered { background: rgba(76,175,80,0.12); color: #4caf50; }
.status-delivered { background: rgba(76,175,80,0.15); color: #66bb6a; }
.btn {
  padding: 8px 16px;
  border-radius: 10px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text2);
  cursor: pointer;
  font-size: 12px;
  font-weight: 500;
  transition: all 0.2s;
}
.btn-primary { background: var(--accent); border-color: var(--accent); color: #fff; }
.btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
.btn-sm { padding: 5px 12px; font-size: 11px; }
.btn-danger { border-color: var(--danger); color: var(--danger); }
.btn-danger:hover { background: rgba(239,68,68,0.1); }
.btn-success { background: var(--success); border-color: var(--success); color: #fff; }
.btn-warning { background: var(--warning); border-color: var(--warning); color: #fff; }
.form-group { margin-bottom: 16px; }
.form-group label { display: block; font-size: 12px; font-weight: 600; color: var(--text2); margin-bottom: 6px; }
.form-group input, .form-group select, .form-group textarea {
  width: 100%;
  padding: 10px 14px;
  border-radius: 10px;
  border: 1px solid var(--border);
  background: var(--bg);
  color: var(--text);
  font-size: 13px;
  transition: all 0.2s;
}
.form-group input:focus, .form-group select:focus, .form-group textarea:focus {
  outline: none;
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(59,130,246,0.1);
}
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
.hint { font-size: 11px; color: var(--text2); margin-top: 4px; }
.modal-overlay {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background: rgba(0,0,0,0.7);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 2000;
  backdrop-filter: blur(4px);
}
.modal-container {
  background: var(--card);
  border-radius: 20px;
  max-width: 550px;
  width: 90%;
  max-height: 85vh;
  overflow-y: auto;
  border: 1px solid var(--border);
}
.modal-header {
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
  display: flex;
  justify-content: space-between;
  align-items: center;
  position: sticky;
  top: 0;
  background: var(--card);
}
.modal-header h3 { font-size: 18px; color: var(--accent); font-weight: 700; }
.modal-close { background: none; border: none; color: var(--text2); font-size: 24px; cursor: pointer; }
.modal-body { padding: 20px; }
.modal-footer {
  padding: 16px 20px;
  border-top: 1px solid var(--border);
  display: flex;
  justify-content: flex-end;
  gap: 12px;
  position: sticky;
  bottom: 0;
  background: var(--card);
}
.month-carousel {
  background: var(--bg);
  border-radius: 16px;
  padding: 16px;
  margin-bottom: 24px;
  border: 1px solid var(--border);
}
.month-scroll {
  display: flex;
  gap: 12px;
  overflow-x: auto;
  padding: 4px 0 8px;
  scroll-behavior: smooth;
}
.month-card {
  flex: 0 0 auto;
  min-width: 100px;
  padding: 12px 10px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 14px;
  text-align: center;
  cursor: pointer;
  transition: all 0.2s;
}
.month-card:hover { border-color: var(--accent); transform: translateY(-2px); }
.month-card.active { background: var(--accent); border-color: var(--accent); }
.month-card.active .month-name, .month-card.active .month-total, .month-card.active .month-detail { color: white; }
.month-name { font-size: 14px; font-weight: 700; margin-bottom: 4px; }
.month-total { font-size: 18px; font-weight: 800; color: var(--accent); }
.month-detail { font-size: 10px; color: var(--text2); margin-top: 4px; }
.forecast-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px;
  background: var(--bg);
  border-radius: 12px;
  margin-bottom: 8px;
  flex-wrap: wrap;
}
.project-item {
  background: var(--bg);
  border-radius: 12px;
  padding: 14px;
  margin-bottom: 8px;
  border: 1px solid var(--border);
  cursor: pointer;
  transition: all 0.2s;
}
.project-item:hover { border-color: var(--accent); background: var(--accent-light); }
.project-name { font-weight: 700; font-size: 15px; color: var(--accent); display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px; }
.project-items { font-size: 12px; color: var(--text2); margin-top: 6px; }
.project-detail { margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border); display: none; }
.project-detail.show { display: block; }
.success-toast {
  position: fixed;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--success);
  color: #fff;
  padding: 12px 24px;
  border-radius: 40px;
  font-size: 14px;
  font-weight: 600;
  z-index: 2001;
  animation: fadeInUp 0.3s ease, fadeOut 0.3s ease 2.7s forwards;
}
@keyframes fadeInUp {
  from { opacity: 0; transform: translateX(-50%) translateY(20px); }
  to { opacity: 1; transform: translateX(-50%) translateY(0); }
}
@keyframes fadeOut { to { opacity: 0; visibility: hidden; } }
.loading { text-align: center; padding: 60px; color: var(--text2); }
.loading-spinner { display: inline-block; width: 40px; height: 40px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.cv-back {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 8px 16px;
  margin-bottom: 20px;
  cursor: pointer;
  color: var(--accent);
  font-size: 13px;
  font-weight: 500;
  border-radius: 10px;
  background: var(--bg);
  border: 1px solid var(--border);
}
.cv-back:hover { background: var(--accent-light); }
.empty-state {
  text-align: center;
  padding: 60px 20px;
  color: var(--text2);
}
.empty-state-icon { font-size: 48px; margin-bottom: 16px; opacity: 0.5; }
.pending-badge {
  background: #f59e0b;
  color: #000;
  padding: 2px 8px;
  border-radius: 12px;
  font-size: 10px;
  font-weight: 600;
  margin-left: 8px;
}
@media (max-width: 768px) {
  .cv-container { padding: 12px; }
  .cv-dealer-name { font-size: 24px; }
  .stats-grid { grid-template-columns: repeat(2, 1fr); }
  .form-row { grid-template-columns: 1fr; }
  .month-card { min-width: 85px; }
  .data-table th, .data-table td { padding: 10px 6px; font-size: 11px; }
  .tab-btn { padding: 8px 16px; font-size: 13px; }
  .section { padding: 14px; }
}
</style>
</head>
<body>
<div class="cv-container">
  <div class="cv-header">
    <div class="cv-logo">🚁 DJI Enterprise</div>
    <div class="cv-dealer-name" id="dealerName">กำลังโหลด...</div>
    <div class="cv-dealer-sub">DJI Authorized Dealer</div>
  </div>
  <div id="noticeArea"></div>
  <div class="tab-bar" id="tabBar">
    <div class="tab-btn active" data-tab="pipeline">📋 โครงการของฉัน</div>
    <div class="tab-btn" data-tab="forecast">📦 แผนการสั่งซื้อ</div>
    <div class="tab-btn" data-tab="timeline">📝 ประวัติการอัพเดท</div>
  </div>
  <div id="tabContent"><div class="loading"><div class="loading-spinner"></div><div>กำลังโหลดข้อมูล...</div></div></div>
  <div class="cv-footer" style="text-align:center; padding:32px 0 16px; margin-top:32px; border-top:1px solid var(--border); font-size:12px; color:var(--text2)">
    <div>Powered by SIS Distribution (Thailand) PLC — DJI Authorized Distributor</div>
    <div id="footerDate"></div>
  </div>
</div>
<button class="theme-toggle" onclick="toggleTheme()">🌙</button>

<script>
// Firebase Config
var firebaseConfig = {
  apiKey: "AIzaSyB_qYvFINwOehVQ1Y6UJW9bHRL1iYcyM7w",
  authDomain: "work-assistant-9e024.firebaseapp.com",
  projectId: "work-assistant-9e024",
  storageBucket: "work-assistant-9e024.firebasestorage.app",
  messagingSenderId: "796607223436",
  appId: "1:796607223436:web:1455abe90b141104678da9"
};
firebase.initializeApp(firebaseConfig);
var db = firebase.firestore();

// Global variables
var dealerId = null;
var currentTab = 'pipeline';
var pipelinesData = [];
var forecastData = { runrate: [], projects: [] };
var timelineLogs = [];
var dealerName = '';
var allModels = [];
var selectedMonth = null;
var allMonths = [];
var newProjectItems = [];

// Helper functions
function getSavedTheme() { return localStorage.getItem('cv_theme') || 'dark'; }
function applyTheme(theme) {
  if (theme === 'light') { document.body.classList.add('theme-light'); document.querySelector('.theme-toggle').textContent = '☀️'; }
  else { document.body.classList.remove('theme-light'); document.querySelector('.theme-toggle').textContent = '🌙'; }
}
function toggleTheme() { var current = getSavedTheme(); var next = current === 'dark' ? 'light' : 'dark'; localStorage.setItem('cv_theme', next); applyTheme(next); }
applyTheme(getSavedTheme());

function esc(s) { if (!s) return ''; return String(s).replace(/</g, '&lt;').replace(/>/g, '&gt;'); }
function formatThaiDate(iso) { if (!iso) return ''; var d = new Date(iso); if (isNaN(d)) return iso; return d.getDate()+'/'+(d.getMonth()+1)+'/'+d.getFullYear(); }
function showToast(msg) { var t = document.createElement('div'); t.className = 'success-toast'; t.textContent = msg || 'สำเร็จ!'; document.body.appendChild(t); setTimeout(function() { if(t.remove) t.remove(); }, 3000); }
function closeModal() { var modal = document.querySelector('.modal-overlay'); if (modal) modal.remove(); }
function _nw() { return new Date().toISOString(); }

var STATUS_LIST = [
  { id: 'prospect', name: '🔍 Prospect' }, { id: 'tor_review', name: '📋 TOR Review' },
  { id: 'quotation', name: '💰 Quotation' }, { id: 'bidding', name: '⏳ Bidding' },
  { id: 'negotiation', name: '📋 Negotiation' }, { id: 'win', name: '✅ Win' },
  { id: 'ordered', name: '📦 Ordered' }, { id: 'delivered', name: '🚚 Delivered' },
  { id: 'on_hold', name: '⏸️ On Hold' }, { id: 'lost', name: '❌ Lost' }
];
function getStatusLabel(status) { var s = STATUS_LIST.find(function(x) { return x.id === status; }); return '<span class="status-badge status-'+status+'">'+(s ? s.name : status)+'</span>'; }

function generateMonths() {
  var months = [];
  var now = new Date();
  for (var i = 0; i < 12; i++) {
    var d = new Date(now.getFullYear(), now.getMonth() + i, 1);
    var m = d.getMonth() + 1;
    var y = d.getFullYear() + 543;
    months.push((m < 10 ? '0' + m : m) + '/' + y);
  }
  return months;
}

function loadModels() {
  var cfg = localStorage.getItem('v7_config');
  if (cfg) {
    try {
      var config = JSON.parse(cfg);
      if (config.models && config.models.length) {
        allModels = config.models.map(function(m) { return typeof m === 'object' ? m.name : m; }).filter(function(m) { return m; });
      }
    } catch(e) {}
  }
  if (!allModels.length) {
    allModels = ['DJI Matrice 4E', 'DJI Matrice 4T', 'DJI Matrice 4TD', 'DJI Matrice 400', 'DJI Matrice 30', 'DJI Matrice 30T',
      'Zenmuse L2', 'Zenmuse L3', 'Zenmuse H30', 'Zenmuse H30T', 'Zenmuse P1', 'DJI Dock 2', 'DJI Dock 3',
      'DJI FlightHub 2', 'DJI Terra', 'Mavic 3 Enterprise', 'Mavic 3 Multispectral'];
  }
}

// ================================================================
// FIRESTORE: เขียนไปที่ dealerUpdates (ไม่ต้อง login)
// ================================================================

function getCustomerPipelineRef(dealerId, pipeId) {
  if (pipeId) {
    return db.collection('dealerUpdates').doc(dealerId).collection('pipeline').doc(pipeId);
  }
  return db.collection('dealerUpdates').doc(dealerId).collection('pipeline');
}

function getCustomerForecastRef(dealerId, forecastId) {
  if (forecastId) {
    return db.collection('dealerUpdates').doc(dealerId).collection('forecast').doc(forecastId);
  }
  return db.collection('dealerUpdates').doc(dealerId).collection('forecast');
}

function getCustomerTimelineRef(dealerId) {
  return db.collection('dealerUpdates').doc(dealerId).collection('timeline');
}

// บันทึก pipeline update
function saveCustomerPipelineUpdate(dealerId, pipeId, data) {
  var updateData = JSON.parse(JSON.stringify(data));
  updateData._customerUpdate = true;
  updateData._updatedAt = firebase.firestore.FieldValue.serverTimestamp();
  updateData._status = 'pending';
  updateData._originalDealerId = dealerId;
  updateData._originalPipeId = pipeId;
  updateData._updateType = 'pipeline';
  
  return db.collection('dealerUpdates').doc(dealerId).collection('pipeline').doc(pipeId)
    .set(updateData, { merge: true });
}
function saveCustomerForecastUpdate(dealerId, forecastId, data, type) {
  var updateData = JSON.parse(JSON.stringify(data));
  updateData._customerUpdate = true;
  updateData._updatedAt = firebase.firestore.FieldValue.serverTimestamp();
  updateData._status = 'pending';
  updateData._originalDealerId = dealerId;
  updateData._updateType = type;
  
  return getCustomerForecastRef(dealerId, forecastId).set(updateData, { merge: true }).then(function() {
    var timelineRef = getCustomerTimelineRef(dealerId);
    var timelineEntry = {
      id: 'tl_' + Date.now() + '_' + Math.random().toString(36).substr(2, 4),
      type: type === 'runrate' ? 'runrate_update' : 'project_update',
      content: type === 'runrate' ? 'อัพเดทแผนสั่งซื้อ (Run Rate)' : 'อัพเดทแผนสั่งซื้อ (โครงการ)',
      timestamp: firebase.firestore.FieldValue.serverTimestamp(),
      status: 'pending'
    };
    return timelineRef.doc(timelineEntry.id).set(timelineEntry);
  });
}

// โหลดข้อมูล
function loadPipeline() {
  if (!dealerId) return Promise.resolve([]);
  
  // อ่านจาก public_pipeline (ไม่ต้องใช้ uid แล้ว)
  return db.collection('public_pipeline')
    .where('dealerId', '==', dealerId).get()
    .then(function(querySnapshot) {
      pipelinesData = [];
      querySnapshot.forEach(function(doc) {
        var data = doc.data();
        data.id = doc.id;
        pipelinesData.push(data);
      });
      return pipelinesData;
    }).catch(function(err) { 
      console.warn('Load pipeline error:', err); 
      return [];
    });
}
function loadForecast() {
  if (!dealerId) return Promise.resolve();
  
  var uid = 'UX5W0i60eOaQqxeA2X2c6KXlDp73';
  
  return db.collection('users').doc(uid).collection('forecast')
    .where('dealerId', '==', dealerId).get()
    .then(function(querySnapshot) {
      forecastData.runrate = [];
      forecastData.projects = [];
      querySnapshot.forEach(function(doc) {
        var item = doc.data();
        item.id = doc.id;
        if (item.type === 'runrate') forecastData.runrate.push(item);
        else if (item.type === 'project') forecastData.projects.push(item);
      });
      return Promise.resolve();
    }).catch(function(err) { 
      console.warn('Load forecast error:', err); 
      return Promise.resolve();
    });
}
function loadTimeline() {
  if (!dealerId) return Promise.resolve([]);
  return getCustomerTimelineRef(dealerId).orderBy('timestamp', 'desc').limit(50).get().then(function(querySnapshot) {
    timelineLogs = [];
    querySnapshot.forEach(function(doc) {
      timelineLogs.push(doc.data());
    });
    return timelineLogs;
  }).catch(function(err) { 
    console.warn('Load timeline error:', err); 
    return Promise.resolve([]);
  });
}

function loadDealerName() {

function submitPipelineUpdate(pipeId) {
  var newProjectName = document.getElementById('editProjectName').value.trim();
  var newEndUser = document.getElementById('editEndUser').value.trim();
  var newStatus = document.getElementById('editStatus').value;
  var updateContent = document.getElementById('updateContent').value.trim();
  
  if (!newProjectName) { alert('กรุณากรอกชื่อโครงการ'); return; }
  
  var items = [];
  var itemRows = document.querySelectorAll('#editItemsContainer .edit-item-row');
  for (var i = 0; i < itemRows.length; i++) {
    var modelInput = itemRows[i].querySelector('.editItemModel');
    var qtyInput = itemRows[i].querySelector('.editItemQty');
    if (modelInput && modelInput.value && qtyInput && parseInt(qtyInput.value) > 0) {
      items.push({ model: modelInput.value, qty: parseInt(qtyInput.value) });
    }
  }
  if (items.length === 0) { alert('กรุณาเพิ่มสินค้าอย่างน้อย 1 รายการ'); return; }
  
  var totalQty = items.reduce(function(s, it) { return s + it.qty; }, 0);
  
  var updatedPipeline = {
    id: pipeId,
    projectName: newProjectName,
    endUserTH: newEndUser,
    status: newStatus,
    items: items,
    model: items[0].model,
    modelQty: totalQty,
    forecastAmount: 0,
    dealerId: dealerId,
    updateNote: updateContent || 'อัพเดทข้อมูลทั่วไป',
    updatedBy: 'customer',
    updatedAt: new Date().toISOString()
  };
  
  saveCustomerPipelineUpdate(dealerId, pipeId, updatedPipeline).then(function() {
    showToast('✅ ส่งข้อมูลอัพเดทให้พนักงานขายเรียบร้อยแล้ว!');
    showNotice('📨 ข้อมูลถูกส่งให้พนักงานขายเรียบร้อยแล้ว จะได้รับการติดต่อกลับ', true);
    closeModal();
    loadAllData();
  }).catch(function(err) { 
    alert('เกิดข้อผิดพลาด: ' + err.message);
  });
}

function getMonthSummary() {
  var summary = {};
  for (var i = 0; i < allMonths.length; i++) summary[allMonths[i]] = { runrate: 0, project: 0, total: 0 };
  for (var i = 0; i < forecastData.runrate.length; i++) {
    var r = forecastData.runrate[i];
    if (summary[r.month]) { summary[r.month].runrate += r.qty; summary[r.month].total += r.qty; }
  }
  for (var i = 0; i < forecastData.projects.length; i++) {
    var p = forecastData.projects[i];
    if (summary[p.month]) { summary[p.month].project += p.totalQty; summary[p.month].total += p.totalQty; }
  }
  return summary;
}

function downloadForecastExcel() {
  var wsData = [['ประเภท', 'ชื่อ', 'Model', 'จำนวน', 'End User', 'เดือน']];
  for (var i = 0; i < forecastData.runrate.length; i++) {
    var r = forecastData.runrate[i];
    wsData.push(['Run Rate', '', r.model, r.qty, '', r.month]);
  }
  for (var i = 0; i < forecastData.projects.length; i++) {
    var p = forecastData.projects[i];
    for (var j = 0; j < p.items.length; j++) {
      wsData.push(['Project', p.projectName, p.items[j].model, p.items[j].qty, p.endUser || '', p.month]);
    }
  }
  var ws = XLSX.utils.aoa_to_sheet(wsData);
  var wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Forecast');
  XLSX.writeFile(wb, 'Forecast_' + dealerName + '.xlsx');
  showToast('📎 ดาวน์โหลด Excel แล้ว');
}

function uploadForecastExcel(input) {
  var file = input.files[0];
  if (!file) return;
  var reader = new FileReader();
  reader.onload = function(e) {
    var data = new Uint8Array(e.target.result);
    var workbook = XLSX.read(data, { type: 'array' });
    var sheet = workbook.Sheets[workbook.SheetNames[0]];
    var rows = XLSX.utils.sheet_to_json(sheet, { header: 1, defval: '' });
    if (!rows || rows.length < 2) { alert('ไม่พบข้อมูล'); input.value = ''; return; }
    for (var i = 1; i < rows.length; i++) {
      var row = rows[i];
      if (!row || !row[0]) continue;
      var type = row[0], name = row[1], model = row[2], qty = parseInt(row[3]) || 0, endUser = row[4] || '', month = row[5];
      if (!month || allMonths.indexOf(month) === -1) continue;
      if (type === 'Run Rate' && model && qty > 0) {
        var newRunrate = { id: 'rr_' + Date.now() + '_' + i + '_' + Math.random().toString(36).substr(2, 4), model: model, qty: qty, month: month, dealerId: dealerId, type: 'runrate' };
        forecastData.runrate.push(newRunrate);
        saveCustomerForecastUpdate(dealerId, newRunrate.id, newRunrate, 'runrate');
      } else if (type === 'Project' && name && model && qty > 0) {
        var newProject = { id: 'proj_' + Date.now() + '_' + i + '_' + Math.random().toString(36).substr(2, 4), projectName: name, endUser: endUser || '-', month: month, items: [{ model: model, qty: qty }], totalQty: qty, dealerId: dealerId, type: 'project' };
        forecastData.projects.push(newProject);
        saveCustomerForecastUpdate(dealerId, newProject.id, newProject, 'project');
      }
    }
    saveClientForecast();
    input.value = '';
  };
  reader.readAsArrayBuffer(file);
}

function renderForecastTab() {
  allMonths = generateMonths();
  if (!selectedMonth && allMonths.length) selectedMonth = allMonths[0];
  var monthSummary = getMonthSummary();
  var monthRunrate = forecastData.runrate.filter(function(r) { return r.month === selectedMonth; });
  var monthProjects = forecastData.projects.filter(function(p) { return p.month === selectedMonth; });
  var totalRunrate = 0, totalProject = 0;
  for (var i = 0; i < monthRunrate.length; i++) totalRunrate += monthRunrate[i].qty;
  for (var i = 0; i < monthProjects.length; i++) totalProject += monthProjects[i].totalQty;
  
  var monthCardsHtml = '<div class="month-scroll">';
  for (var i = 0; i < allMonths.length; i++) {
    var m = allMonths[i];
    var summary = monthSummary[m] || { total: 0, runrate: 0, project: 0 };
    var activeClass = (selectedMonth === m) ? 'active' : '';
    monthCardsHtml += '<div class="month-card ' + activeClass + '" onclick="selectMonth(\'' + m + '\')">';
    monthCardsHtml += '<div class="month-name">' + m + '</div>';
    monthCardsHtml += '<div class="month-total">' + summary.total + '</div>';
    monthCardsHtml += '<div class="month-detail">🏪' + summary.runrate + ' 📋' + summary.project + '</div>';
    monthCardsHtml += '</div>';
  }
  monthCardsHtml += '</div>';
  
  var statsHtml = '<div class="stats-grid">';
  statsHtml += '<div class="stat-card"><div class="stat-month">' + (selectedMonth || '-') + '</div><div class="stat-qty">' + (totalRunrate + totalProject) + '</div><div class="stat-detail">รวมทั้งสิ้น</div></div>';
  statsHtml += '<div class="stat-card"><div class="stat-month">🏪 Run Rate</div><div class="stat-qty">' + totalRunrate + '</div><div class="stat-detail">ชิ้น</div></div>';
  statsHtml += '<div class="stat-card"><div class="stat-month">📋 โครงการ</div><div class="stat-qty">' + totalProject + '</div><div class="stat-detail">ชิ้น</div></div>';
  statsHtml += '<div class="stat-card"><div class="stat-month">📦 โครงการ</div><div class="stat-qty">' + monthProjects.length + '</div><div class="stat-detail">รายการ</div></div>';
  statsHtml += '</div>';
  
  var runrateHtml = '';
  for (var i = 0; i < monthRunrate.length; i++) {
    var r = monthRunrate[i];
    runrateHtml += '<div class="forecast-item">';
    runrateHtml += '<div style="flex:2"><strong>' + esc(r.model) + '</strong></div>';
    runrateHtml += '<div style="width:80px;text-align:center">x' + r.qty + '</div>';
    runrateHtml += '<button class="btn btn-sm btn-warning" onclick="editRunrateItem(' + i + ')">✏️</button>';
    runrateHtml += '<button class="btn btn-sm btn-danger" onclick="deleteRunrateItem(' + i + ')">🗑️</button>';
    runrateHtml += '</div>';
  }
  if (runrateHtml === '') runrateHtml = '<div class="hint" style="padding:16px;text-align:center">ยังไม่มีรายการ — เพิ่มด้านล่าง</div>';
  
  var projectsHtml = '';
  for (var i = 0; i < monthProjects.length; i++) {
    var proj = monthProjects[i];
    var itemsText = '';
    for (var j = 0; j < proj.items.length; j++) {
      itemsText += proj.items[j].model + ' x' + proj.items[j].qty;
      if (j < proj.items.length - 1) itemsText += ', ';
    }
    projectsHtml += '<div class="project-item" onclick="toggleProjectDetail(' + i + ')">';
    projectsHtml += '<div class="project-name"><span>📋 ' + esc(proj.projectName) + '</span><span style="font-size:12px">' + proj.totalQty + ' ชิ้น</span></div>';
    if (proj.endUser && proj.endUser !== '-') projectsHtml += '<div class="project-items">👤 ' + esc(proj.endUser) + '</div>';
    projectsHtml += '<div class="project-items">📦 ' + esc(itemsText) + '</div>';
    projectsHtml += '<div class="project-detail" id="projectDetail_' + i + '">';
    projectsHtml += '<div style="display:flex;gap:8px;margin-top:12px"><button class="btn btn-sm btn-warning" onclick="event.stopPropagation();editProjectItem(' + i + ')">✏️ แก้ไข</button>';
    projectsHtml += '<button class="btn btn-sm btn-danger" onclick="event.stopPropagation();deleteProjectItem(' + i + ')">🗑️ ลบ</button></div></div></div>';
  }
  if (projectsHtml === '') projectsHtml = '<div class="hint" style="padding:16px;text-align:center">ยังไม่มีโครงการ — เพิ่มด้านล่าง</div>';
  
  var existingOptions = '<option value="">-- เลือกโครงการที่มี (ดึงสินค้าอัตโนมัติ) --</option>';
  for (var i = 0; i < pipelinesData.length; i++) existingOptions += '<option value="' + i + '">📋 ' + esc(pipelinesData[i].projectName) + '</option>';
  
  var modelDatalist = '<datalist id="globalModelList">';
  for (var i = 0; i < allModels.length; i++) modelDatalist += '<option value="' + esc(allModels[i]) + '">';
  modelDatalist += '</datalist>';
  
  var html = '<div class="section"><div class="section-title">📦 แผนการสั่งซื้อ (Forecast)</div>';
  html += '<div style="text-align:right; margin-bottom:10px"><button class="btn btn-sm btn-primary" onclick="refreshData()">🔄 รีเฟรช</button></div>';
  html += '<div class="month-carousel">' + monthCardsHtml;
  html += '<div style="margin-top:12px;text-align:center"><select id="monthDropdown" onchange="selectMonth(this.value)" style="padding:8px 16px;border-radius:20px;background:var(--bg);border:1px solid var(--border);color:var(--text)">';
  for (var i = 0; i < allMonths.length; i++) html += '<option value="' + allMonths[i] + '" ' + (selectedMonth === allMonths[i] ? 'selected' : '') + '>' + allMonths[i] + '</option>';
  html += '</select></div></div>';
  html += statsHtml;
  
  html += '<div style="margin-bottom:24px"><div class="section-title" style="font-size:15px">🏪 สินค้าทั่วไป (Run Rate)</div>';
  html += '<div class="form-row" style="margin-bottom:12px">';
  html += '<div style="flex:2"><input type="text" id="runrateModel" list="globalModelList" placeholder="พิมพ์ชื่อสินค้า..." style="width:100%"></div>';
  html += '<div style="width:100px"><input type="number" id="runrateQty" value="1" min="1" placeholder="จำนวน" style="width:100%"></div>';
  html += '<div><button class="btn btn-primary" onclick="addRunrateItem()">➕ เพิ่ม</button></div>';
  html += '</div>';
  html += '<div>' + runrateHtml + '</div></div>';
  
  html += '<div style="margin-bottom:24px"><div class="section-title" style="font-size:15px">📋 โครงการ (Project-based)</div>';
  html += '<div class="form-group"><label>🔗 เลือกจากโครงการที่มี</label>';
  html += '<select id="existingProjectSelect" class="form-control" onchange="loadProjectToForm()">' + existingOptions + '</select>';
  html += '</div><div style="margin-top:16px;border-top:1px solid var(--border);padding-top:16px">';
  html += '<div class="form-group"><label>📋 ชื่อโครงการใหม่</label><input type="text" id="newProjectName" class="form-control" placeholder="ชื่อโครงการ"></div>';
  html += '<div class="form-group"><label>👤 End User</label><input type="text" id="newProjectEndUser" class="form-control" placeholder="ชื่อหน่วยงาน"></div>';
  html += '<div class="form-row" style="margin-bottom:8px">';
  html += '<div style="flex:2"><input type="text" id="newProjectItemModel" list="globalModelList" placeholder="พิมพ์ชื่อสินค้า..." style="width:100%"></div>';
  html += '<div style="width:100px"><input type="number" id="newProjectItemQty" value="1" min="1" placeholder="จำนวน" style="width:100%"></div>';
  html += '<div><button class="btn btn-sm" onclick="addProjectItem()">➕ เพิ่มสินค้า</button></div>';
  html += '</div><div id="newProjectItemsContainer" style="margin-bottom:12px"></div>';
  html += '<div class="form-row" style="margin-top:12px;gap:10px">';
  html += '<button class="btn btn-primary" onclick="addNewProject()">📌 เพิ่มโครงการนี้</button>';
  html += '<button class="btn btn-warning" onclick="clearProjectForm()">🗑️ ล้างฟอร์ม</button>';
  html += '</div></div><div style="margin-top:16px"><strong>📋 รายการโครงการที่เพิ่มแล้ว</strong></div>';
  html += '<div style="margin-top:8px">' + projectsHtml + '</div></div>';
  
  html += '<div class="form-row" style="margin-top:16px">';
  html += '<button class="btn btn-success" onclick="saveClientForecast()">💾 บันทึกทั้งหมด</button>';
  html += '<button class="btn btn-primary" onclick="downloadForecastExcel()">📎 ดาวน์โหลด Excel</button>';
  html += '<div><input type="file" id="excelFile" accept=".xlsx,.xls" style="display:none" onchange="uploadForecastExcel(this)"><button class="btn" onclick="document.getElementById(\'excelFile\').click()">📤 อัปโหลด Excel</button></div>';
  html += '</div>' + modelDatalist + '</div>';
  
  document.getElementById('tabContent').innerHTML = html;
}

function renderTimelineTab() {
  if (!timelineLogs.length) {
    document.getElementById('tabContent').innerHTML = '<div class="section"><div class="section-title">📝 ประวัติการอัพเดท</div><div class="empty-state"><div class="empty-state-icon">📭</div><div>ยังไม่มีประวัติการอัพเดท</div></div></div>';
    return;
  }
  var html = '<div class="section"><div class="section-title">📝 ประวัติการอัพเดททั้งหมด</div>';
  html += '<div style="text-align:right; margin-bottom:12px"><button class="btn btn-sm btn-primary" onclick="refreshData()">🔄 รีเฟรช</button></div>';
  html += '<div style="max-height:500px;overflow-y:auto">';
  for (var i = 0; i < timelineLogs.length; i++) {
    var l = timelineLogs[i];
    var icon = l.type === 'pipeline_update' ? '📋' : (l.type === 'runrate_update' ? '📦' : '📝');
    var dateStr = l.timestamp ? formatThaiDate(l.timestamp.toDate ? l.timestamp.toDate() : l.timestamp) : '-';
    var statusLabel = l.status === 'pending' ? '<span class="pending-badge" style="margin-left:6px">รอตรวจสอบ</span>' : '';
    html += '<div style="padding:14px;border-bottom:1px solid var(--border)">';
    html += '<div style="font-size:11px;color:var(--text2);margin-bottom:4px">' + dateStr + ' ' + icon + statusLabel + '</div>';
    html += '<div style="font-size:13px;line-height:1.5">' + esc(l.content || '') + '</div>';
    html += '</div>';
  }
  html += '</div></div>';
  document.getElementById('tabContent').innerHTML = html;
}

function renderCurrentTab() {
  if (currentTab === 'pipeline') renderPipelineTab();
  else if (currentTab === 'forecast') renderForecastTab();
  else renderTimelineTab();
}

// Initialize
var urlParams = new URLSearchParams(window.location.search);
dealerId = urlParams.get('dealerId');

if (!dealerId) {
  document.getElementById('tabContent').innerHTML = '<div class="empty-state"><div class="empty-state-icon">❌</div><div>ไม่พบข้อมูล Dealer</div><div class="hint">กรุณาติดต่อพนักงานขายเพื่อรับลิงก์ที่ถูกต้อง</div></div>';
} else {
  document.getElementById('footerDate').innerHTML = new Date().toISOString().split('T')[0].replace(/-/g, '/');
  loadModels();
  loadAllData();
}

// Tab click
document.getElementById('tabBar').addEventListener('click', function(e) {
  var btn = e.target.closest('.tab-btn');
  if (!btn) return;
  var tab = btn.dataset.tab;
  if (!tab) return;
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach(function(b) { b.classList.remove('active'); });
  btn.classList.add('active');
  renderCurrentTab();
});
