<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DJI Enterprise - ติดตามสถานะโครงการ</title>
<!-- SheetJS สำหรับอ่าน Excel -->
<script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
<style>
/* ===== CSS VARIABLES ===== */
:root {
  --bg: #0f172a;
  --bg2: #1e293b;
  --card: #1e293b;
  --border: #334155;
  --text: #e2e8f0;
  --text2: #94a3b8;
  --text3: #64748b;
  --accent: #3b82f6;
  --accent-light: rgba(59,130,246,0.1);
  --radius: 12px;
  --input-bg: #0f172a;
  --success: #22c55e;
  --warning: #f59e0b;
  --danger: #ef4444;
}

.theme-light {
  --bg: #f1f5f9;
  --bg2: #ffffff;
  --card: #ffffff;
  --border: #e2e8f0;
  --text: #1e293b;
  --text2: #475569;
  --text3: #64748b;
  --accent: #2563eb;
  --accent-light: #eff6ff;
  --input-bg: #ffffff;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Segoe UI', 'Noto Sans Thai', sans-serif;
  background: var(--bg);
  color: var(--text);
  transition: background 0.2s, color 0.2s;
}

/* Theme Toggle */
.theme-toggle {
  position: fixed;
  top: 20px;
  right: 20px;
  width: 40px;
  height: 40px;
  border-radius: 50%;
  background: var(--card);
  border: 1px solid var(--border);
  color: var(--text2);
  cursor: pointer;
  font-size: 18px;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 1000;
  transition: 0.2s;
}
.theme-toggle:hover { transform: scale(1.05); border-color: var(--accent); color: var(--accent); }

/* Container */
.cv-container { max-width: 1200px; margin: 0 auto; padding: 24px; padding-top: 20px; }
.cv-header { text-align: center; padding: 24px 0 32px; margin-bottom: 24px; border-bottom: 2px solid rgba(100,181,246,0.2); }
.cv-logo { font-size: 14px; color: var(--accent); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 8px; }
.cv-dealer-name { font-size: 32px; font-weight: 800; background: linear-gradient(90deg, var(--accent), #60a5fa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 4px; }
.cv-dealer-sub { font-size: 14px; color: var(--text2); }

/* Tabs */
.tab-bar {
  display: flex;
  gap: 4px;
  margin-bottom: 20px;
  border-bottom: 2px solid var(--border);
  padding-bottom: 0;
  overflow-x: auto;
}
.tab-btn {
  padding: 10px 20px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  color: var(--text2);
  border-bottom: 2px solid transparent;
  transition: 0.15s;
  white-space: nowrap;
}
.tab-btn:hover { color: var(--accent); }
.tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }

/* Section */
.section {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
  margin-bottom: 20px;
}
.section-title {
  font-size: 18px;
  font-weight: 700;
  margin-bottom: 16px;
  padding-bottom: 8px;
  border-bottom: 1px solid var(--border);
  color: var(--accent);
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
  gap: 10px;
}

/* Table */
.data-table {
  width: 100%;
  border-collapse: collapse;
}
.data-table th {
  text-align: left;
  padding: 10px 8px;
  font-size: 11px;
  color: var(--text2);
  text-transform: uppercase;
  border-bottom: 2px solid var(--border);
}
.data-table td {
  padding: 8px;
  border-bottom: 1px solid var(--border);
  font-size: 13px;
  vertical-align: middle;
}
.data-table input, .data-table select {
  width: 100%;
  padding: 6px 8px;
  border-radius: 6px;
  border: 1px solid var(--border);
  background: var(--input-bg);
  color: var(--text);
  font-size: 12px;
}
.data-table input:focus { outline: none; border-color: var(--accent); }

/* Status Badge */
.status-badge {
  padding: 3px 10px;
  border-radius: 12px;
  font-size: 11px;
  font-weight: 600;
  display: inline-block;
}
.status-prospect { background: rgba(100,181,246,0.12); color: #64b5f6; }
.status-tor { background: rgba(186,104,200,0.12); color: #ba68c8; }
.status-quote { background: rgba(255,183,77,0.12); color: #ffb74d; }
.status-bidding { background: rgba(255,235,59,0.12); color: #fdd835; }
.status-nego { background: rgba(77,208,225,0.12); color: #4dd0e1; }
.status-win { background: rgba(129,199,132,0.12); color: #81c784; }
.status-ordered { background: rgba(76,175,80,0.12); color: #4caf50; }
.status-delivered { background: rgba(76,175,80,0.15); color: #66bb6a; }

/* Buttons */
.btn { padding: 6px 12px; border-radius: 6px; border: 1px solid var(--border); background: transparent; color: var(--text2); cursor: pointer; font-size: 12px; transition: 0.15s; }
.btn-primary { background: var(--accent); border-color: var(--accent); color: #fff; }
.btn-primary:hover { opacity: 0.9; }
.btn-sm { padding: 4px 8px; font-size: 11px; }
.btn-danger { border-color: var(--danger); color: var(--danger); }
.btn-danger:hover { background: rgba(239,68,68,0.1); }

/* Form */
.form-group { margin-bottom: 16px; }
.form-group label { display: block; font-size: 12px; font-weight: 600; color: var(--text2); margin-bottom: 5px; }
.form-group input, .form-group select, .form-group textarea {
  width: 100%;
  padding: 8px 12px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--input-bg);
  color: var(--text);
  font-size: 13px;
}
.form-group input:focus, .form-group select:focus, .form-group textarea:focus {
  outline: none;
  border-color: var(--accent);
}
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.hint { font-size: 11px; color: var(--text2); margin-top: 4px; }

/* Upload Area */
.upload-area {
  border: 2px dashed var(--border);
  border-radius: 12px;
  padding: 20px;
  text-align: center;
  margin-bottom: 16px;
  background: var(--bg);
}
.upload-area:hover { border-color: var(--accent); }
.file-input { display: none; }

/* Forecast Items */
.forecast-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px;
  background: var(--bg);
  border-radius: 8px;
  margin-bottom: 6px;
  flex-wrap: wrap;
}
.forecast-item select { flex: 2; min-width: 150px; }
.forecast-item input[type="number"] { width: 80px; }
.forecast-item .month-select { width: 100px; }

/* Summary Cards */
.summary-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 12px;
  margin-top: 12px;
}
.summary-card {
  background: var(--bg);
  border-radius: 10px;
  padding: 12px;
  text-align: center;
}
.summary-month { font-size: 14px; font-weight: 700; color: var(--accent); }
.summary-qty { font-size: 24px; font-weight: 800; margin: 4px 0; }
.summary-detail { font-size: 11px; color: var(--text2); }

/* Timeline */
.timeline { position: relative; padding-left: 24px; }
.timeline-item { position: relative; padding-bottom: 16px; border-left: 2px solid var(--border); margin-left: 8px; padding-left: 20px; }
.timeline-item:last-child { border-left-color: transparent; }
.timeline-dot { position: absolute; left: -9px; top: 0; width: 16px; height: 16px; border-radius: 50%; background: var(--accent); border: 2px solid var(--card); }
.timeline-date { font-size: 11px; color: var(--text2); margin-bottom: 4px; }
.timeline-content { font-size: 13px; line-height: 1.5; background: var(--bg); padding: 8px 12px; border-radius: 8px; margin-bottom: 4px; }

/* Modal */
.modal-overlay {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background: rgba(0,0,0,0.7);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 2000;
}
.modal-container {
  background: var(--card);
  border-radius: 16px;
  max-width: 500px;
  width: 90%;
  max-height: 85vh;
  overflow-y: auto;
}
.modal-header {
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
  display: flex;
  justify-content: space-between;
  align-items: center;
  position: sticky;
  top: 0;
  background: var(--card);
}
.modal-header h3 { font-size: 18px; color: var(--accent); }
.modal-close { background: none; border: none; color: var(--text2); font-size: 24px; cursor: pointer; }
.modal-body { padding: 20px; }
.modal-footer {
  padding: 16px 20px;
  border-top: 1px solid var(--border);
  display: flex;
  justify-content: flex-end;
  gap: 12px;
  position: sticky;
  bottom: 0;
  background: var(--card);
}

/* Toast */
.success-toast {
  position: fixed;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--success);
  color: #fff;
  padding: 12px 24px;
  border-radius: 40px;
  font-size: 14px;
  font-weight: 600;
  z-index: 2001;
  animation: fadeInUp 0.3s ease, fadeOut 0.3s ease 2.7s forwards;
}
@keyframes fadeInUp {
  from { opacity: 0; transform: translateX(-50%) translateY(20px); }
  to { opacity: 1; transform: translateX(-50%) translateY(0); }
}
@keyframes fadeOut {
  to { opacity: 0; visibility: hidden; }
}

.loading { text-align: center; padding: 40px; color: var(--text2); }

/* Responsive */
@media (max-width: 768px) {
  .cv-container { padding: 12px; }
  .cv-dealer-name { font-size: 24px; }
  .form-row { grid-template-columns: 1fr; }
  .forecast-item { flex-direction: column; align-items: stretch; }
  .forecast-item select, .forecast-item input, .forecast-item .month-select { width: 100%; }
}
</style>
</head>
<body>
<div class="cv-container" id="cvContainer">
  <div class="cv-header">
    <div class="cv-logo">🚁 DJI Enterprise</div>
    <div class="cv-dealer-name" id="dealerName">กำลังโหลด...</div>
    <div class="cv-dealer-sub">DJI Authorized Dealer</div>
  </div>

  <!-- Tabs -->
  <div class="tab-bar" id="tabBar">
    <div class="tab-btn active" data-tab="pipeline">📋 โครงการของฉัน</div>
    <div class="tab-btn" data-tab="forecast">📦 แผนการสั่งซื้อ</div>
    <div class="tab-btn" data-tab="timeline">📝 ประวัติการอัพเดท</div>
  </div>

  <div id="tabContent"></div>

  <div class="cv-footer" style="text-align:center; padding:24px 0; margin-top:32px; border-top:1px solid var(--border); font-size:12px; color:var(--text2)">
    <div>Powered by SIS Distribution (Thailand) PLC — DJI Authorized Distributor</div>
    <div id="footerDate"></div>
  </div>
</div>
<button class="theme-toggle" onclick="toggleTheme()" title="เปลี่ยนธีม">🌙</button>

<script>
// ===== THEME =====
function getSavedTheme() { return localStorage.getItem('cv_theme') || 'dark'; }
function applyTheme(theme) {
  if (theme === 'light') { document.body.classList.add('theme-light'); document.querySelector('.theme-toggle').textContent = '☀️'; }
  else { document.body.classList.remove('theme-light'); document.querySelector('.theme-toggle').textContent = '🌙'; }
}
function toggleTheme() { var current = getSavedTheme(); var next = current === 'dark' ? 'light' : 'dark'; localStorage.setItem('cv_theme', next); applyTheme(next); }
applyTheme(getSavedTheme());

// ===== HELPER =====
function esc(s) { if (!s) return ''; return String(s).replace(/</g, '&lt;').replace(/>/g, '&gt;'); }
function formatThaiDate(iso) { if (!iso) return ''; var d = new Date(iso); if (isNaN(d)) return iso; return d.getDate().toString().padStart(2,'0')+'/'+(d.getMonth()+1).toString().padStart(2,'0')+'/'+d.getFullYear(); }
function showSuccessToast(msg) { var t = document.createElement('div'); t.className = 'success-toast'; t.textContent = msg || '✅ บันทึกเรียบร้อยแล้ว!'; document.body.appendChild(t); setTimeout(function() { if(t.remove) t.remove(); }, 3000); }
function closeModal() { var modal = document.querySelector('.modal-overlay'); if (modal) modal.remove(); }

// ===== STATUS =====
var STATUS_LIST = [
  { id: 'prospect', name: '🔵 Prospect' }, { id: 'tor_review', name: '🟣 TOR Review' },
  { id: 'quotation', name: '🟠 Quotation' }, { id: 'bidding', name: '🟡 Bidding' },
  { id: 'negotiation', name: '🔵 Negotiation' }, { id: 'win', name: '🟢 Win' },
  { id: 'ordered', name: '🟢 Ordered' }, { id: 'delivered', name: '✅ Delivered' }
];
function getStatusLabel(status) { var s = STATUS_LIST.find(x => x.id === status); return '<span class="status-badge status-'+status+'">'+(s ? s.name : status)+'</span>'; }

// ===== DATA =====
var dealerId = new URLSearchParams(window.location.search).get('dealerId');
var currentTab = 'pipeline';
var allModels = [];
var pipelinesData = [];
var forecastData = { projects: [], runrate: [] };
var timelineLogs = [];
var dealerName = '';

// ===== LOAD MODELS =====
function loadModels() {
  var cfg = localStorage.getItem('v7_config');
  if (cfg) {
    try {
      var config = JSON.parse(cfg);
      if (config.models && config.models.length) {
        allModels = config.models.map(function(m) { return typeof m === 'object' ? m.name : m; }).filter(function(m) { return m; });
      }
    } catch(e) {}
  }
  if (!allModels.length) {
    allModels = ['DJI Matrice 4E', 'DJI Matrice 4T', 'DJI Matrice 4TD', 'DJI Matrice 400', 'DJI Matrice 30', 'DJI Matrice 30T',
      'Zenmuse L2', 'Zenmuse L3', 'Zenmuse H30', 'Zenmuse H30T', 'Zenmuse P1', 'DJI Dock 2', 'DJI Dock 3',
      'DJI FlightHub 2', 'DJI Terra', 'Mavic 3 Enterprise', 'Mavic 3 Multispectral', 'อื่นๆ'];
  }
}

// ===== LOAD CLIENT FORECAST =====
function loadClientForecast() {
  var key = 'v7_client_forecast_' + dealerId;
  var saved = localStorage.getItem(key);
  if (saved) {
    try { forecastData = JSON.parse(saved); } catch(e) {}
  }
  if (!forecastData.projects) forecastData.projects = [];
  if (!forecastData.runrate) forecastData.runrate = [];
}

function saveClientForecast() {
  var key = 'v7_client_forecast_' + dealerId;
  forecastData.updatedAt = new Date().toISOString();
  localStorage.setItem(key, JSON.stringify(forecastData));
  showSuccessToast('✅ บันทึกแผนการสั่งซื้อเรียบร้อยแล้ว');
  renderCurrentTab();
}

// ===== LOAD PIPELINE =====
function loadPipeline() {
  var allPipes = JSON.parse(localStorage.getItem('v7_pipeline') || '[]');
  var pipeLogs = JSON.parse(localStorage.getItem('v7_pipelog') || '[]');
  var activePipes = allPipes.filter(function(p) { return p.dealerId === dealerId && ['lost','on_hold'].indexOf(p.status) === -1; });
  
  pipelinesData = [];
  for (var i = 0; i < activePipes.length; i++) {
    var p = activePipes[i];
    var items = [];
    if (p.items && p.items.length) items = p.items;
    else if (p.model) items = [{ model: p.model, qty: p.modelQty || 1 }];
    
    var logs = pipeLogs.filter(function(l) { return l.pipeId === p.id; }).sort(function(a,b) { return (b.date||'').localeCompare(a.date||''); });
    var lastUpdateDays = null;
    if (logs.length && logs[0].date) {
      var d = new Date(logs[0].date);
      var now = new Date(); now.setHours(0,0,0,0);
      lastUpdateDays = Math.floor((now - d) / 86400000);
    }
    
    pipelinesData.push({
      id: p.id,
      projectName: p.projectName || '-',
      endUserTH: p.endUserTH || '-',
      status: p.status,
      biddingDate: p.biddingDate || '-',
      shipmentDate: p.shipmentDate || '-',
      forecastAmount: p.forecastAmount || 0,
      items: items,
      lastUpdateDays: lastUpdateDays
    });
  }
}

// ===== LOAD TIMELINE =====
function loadTimeline() {
  var allLogs = JSON.parse(localStorage.getItem('v7_pipelog') || '[]');
  var myLogs = allLogs.filter(function(l) {
    var pipe = pipelinesData.find(function(p) { return p.id === l.pipeId; });
    return pipe;
  }).sort(function(a,b) { return (b.date||'').localeCompare(a.date||''); });
  timelineLogs = myLogs.slice(0, 50);
}

// ===== RENDER PIPELINE TAB (with Add Project button) =====
function renderPipelineTab() {
  if (!pipelinesData.length) {
    return '<div class="section">' +
      '<div class="section-title">📊 โครงการของท่าน</div>' +
      '<div style="text-align:center;padding:20px">📭 ไม่มีโครงการที่กำลังดำเนินการ</div>' +
      '<div style="text-align:center;padding:10px"><button class="btn btn-primary" onclick="showAddProjectForm()">➕ เพิ่มโครงการใหม่</button></div>' +
      '</div>';
  }
  
  var html = '<div class="section">' +
    '<div class="section-title" style="display:flex;justify-content:space-between;align-items:center">' +
    '<span>📊 โครงการของท่าน (' + pipelinesData.length + ' โครงการ)</span>' +
    '<button class="btn btn-primary btn-sm" onclick="showAddProjectForm()">➕ เพิ่มโครงการ</button>' +
    '</div>';
  html += '<div style="overflow-x:auto"><table class="data-table">';
  html += '<thead><tr><th>#</th><th>โครงการ</th><th>End User</th><th>สถานะ</th><th>อัพเดทล่าสุด</th><th>Bidding</th><th>Shipment</th><th></th></tr></thead><tbody>';
  
  for (var i = 0; i < pipelinesData.length; i++) {
    var p = pipelinesData[i];
    var updateBadge = p.lastUpdateDays === null ? '🆕 ยังไม่มีอัพเดท' : (p.lastUpdateDays <= 3 ? '✅ อัพเดท '+p.lastUpdateDays+' วันที่แล้ว' : '⚠️ '+p.lastUpdateDays+' วันที่แล้ว');
    html += '<tr>';
    html += '<td class="cv-num">' + (i+1) + '</td>';
    html += '<td><strong>' + esc(p.projectName) + '</strong></td>';
    html += '<td>' + esc(p.endUserTH) + '</td>';
    html += '<td>' + getStatusLabel(p.status) + '</td>';
    html += '<td><span style="font-size:11px">' + updateBadge + '</span></td>';
    html += '<td>' + (p.biddingDate || '-') + '</td>';
    html += '<td>' + (p.shipmentDate || '-') + '</td>';
    html += '<td><button class="btn btn-sm" onclick="showProjectDetail(\'' + p.id + '\')">ดูรายละเอียด</button></td>';
    html += '</tr>';
  }
  html += '</tbody></table></div></div>';
  return html;
}

// ===== RENDER FORECAST TAB (NEW SIMPLE VERSION) =====
function renderForecastTab() {
  // สร้าง options สำหรับ dropdown สินค้า
  var modelOptions = '<option value="">-- เลือกสินค้า --</option>';
  for (var i = 0; i < allModels.length; i++) {
    modelOptions += '<option value="' + esc(allModels[i]) + '">' + esc(allModels[i]) + '</option>';
  }
  
  // เดือนที่แสดง (มิ.ย.69 - พ.ค.70)
  var months = ['มิ.ย. 69', 'ก.ค. 69', 'ส.ค. 69', 'ก.ย. 69', 'ต.ค. 69', 'พ.ย. 69', 'ธ.ค. 69', 'ม.ค. 70', 'ก.พ. 70', 'มี.ค. 70', 'เม.ย. 70', 'พ.ค. 70'];
  
  // รวมข้อมูลจาก projects และ runrate เข้าด้วยกัน
  var forecastMap = {}; // key: model+month
  
  // รวบรวม runrate
  for (var i = 0; i < forecastData.runrate.length; i++) {
    var rr = forecastData.runrate[i];
    var key = rr.model + '|' + rr.month;
    if (!forecastMap[key]) forecastMap[key] = { model: rr.model, month: rr.month, qty: 0, projectName: '' };
    forecastMap[key].qty += rr.qty;
  }
  
  // รวบรวม projects (แยกตามสินค้าแต่ละรายการในโครงการ)
  for (var i = 0; i < forecastData.projects.length; i++) {
    var proj = forecastData.projects[i];
    for (var j = 0; j < proj.items.length; j++) {
      var it = proj.items[j];
      var key = it.model + '|' + proj.month;
      if (!forecastMap[key]) forecastMap[key] = { model: it.model, month: proj.month, qty: 0, projectName: '' };
      forecastMap[key].qty += it.qty;
      if (forecastMap[key].projectName) forecastMap[key].projectName += ', ' + proj.projectName;
      else forecastMap[key].projectName = proj.projectName;
    }
  }
  
  // แปลงเป็น array และเรียงตามเดือน
  var forecastList = Object.values(forecastMap);
  forecastList.sort(function(a, b) {
    var monthOrder = {};
    for (var i = 0; i < months.length; i++) monthOrder[months[i]] = i;
    return (monthOrder[a.month] || 99) - (monthOrder[b.month] || 99);
  });
  
  // สร้างตาราง Grid
  var tableHtml = '<div style="overflow-x:auto"><table class="data-table" style="min-width:600px">';
  tableHtml += '<thead><tr><th style="width:35%">สินค้า / Model</th>';
  for (var i = 0; i < months.length; i++) {
    tableHtml += '<th style="text-align:center;width:60px">' + months[i] + '</th>';
  }

// ===== NEW FUNCTIONS FOR FORECAST GRID =====
function updateForecastQty(input) {
  var model = input.getAttribute('data-model');
  var month = input.getAttribute('data-month');
  var qty = parseInt(input.value) || 0;
  
  // หา row และ update project note
  var row = input.closest('tr');
  var noteInput = row.querySelector('td:nth-last-child(2) input');
  var projectName = noteInput ? noteInput.value : '';
  
  // Update หรือลบรายการใน forecastData
  // ลบรายการเดิม
  forecastData.runrate = forecastData.runrate.filter(function(rr) {
    return !(rr.model === model && rr.month === month);
  });
  forecastData.projects = forecastData.projects.filter(function(proj) {
    // ถ้าโครงการมีแค่สินค้านี้และไม่มีชื่อโครงการ ให้ลบ
    if (proj.items.length === 1 && proj.items[0].model === model && proj.month === month && !proj.projectName) {
      return false;
    }
    // ลบ item นี้ออกจากโครงการถ้ามี
    if (proj.month === month) {
      var newItems = proj.items.filter(function(it) { return !(it.model === model); });
      if (newItems.length === 0) return false;
      proj.items = newItems;
    }
    return true;
  });
  
  if (qty > 0) {
    if (projectName) {
      // เป็น project-based
      var existingProj = null;
      for (var i = 0; i < forecastData.projects.length; i++) {
        if (forecastData.projects[i].projectName === projectName && forecastData.projects[i].month === month) {
          existingProj = forecastData.projects[i];
          break;
        }
      }
      if (existingProj) {
        var itemExists = false;
        for (var j = 0; j < existingProj.items.length; j++) {
          if (existingProj.items[j].model === model) {
            existingProj.items[j].qty = qty;
            itemExists = true;
            break;
          }
        }
        if (!itemExists) {
          existingProj.items.push({ model: model, qty: qty });
        }
      } else {
        forecastData.projects.push({
          id: 'proj_' + Date.now() + '_' + Math.random().toString(36).substr(2, 4),
          projectName: projectName,
          month: month,
          items: [{ model: model, qty: qty }],
          createdAt: new Date().toISOString()
        });
      }
    } else {
      // เป็น runrate
      forecastData.runrate.push({
        id: 'rr_' + Date.now() + '_' + Math.random().toString(36).substr(2, 4),
        model: model,
        qty: qty,
        month: month,
        createdAt: new Date().toISOString()
      });
    }
  }
  
  // ถ้า qty = 0 และไม่มีชื่อโครงการ ก็แค่ลบ (ทำแล้ว)
}

function updateForecastNote(input) {
  var row = input.closest('tr');
  var model = row.getAttribute('data-model');
  var projectName = input.value;
  
  // รวบรวมจำนวนในแต่ละเดือนจากแถวนี้
  var monthQtys = {};
  var qtyInputs = row.querySelectorAll('td input[type="number"]');
  for (var i = 0; i < qtyInputs.length; i++) {
    var inp = qtyInputs[i];
    var month = inp.getAttribute('data-month');
    var qty = parseInt(inp.value) || 0;
    if (qty > 0) {
      monthQtys[month] = qty;
    }
  }
  
  // ลบรายการเดิมของ model นี้
  forecastData.runrate = forecastData.runrate.filter(function(rr) {
    return rr.model !== model;
  });
  forecastData.projects = forecastData.projects.filter(function(proj) {
    // ลบเฉพาะ project ที่มีแค่ model นี้และไม่มีชื่อโครงการ
    if (proj.items.length === 1 && proj.items[0].model === model && !proj.projectName) {
      return false;
    }
    // หรือลบ item นี้ออกจาก project
    if (proj.projectName === projectName) {
      proj.items = proj.items.filter(function(it) { return it.model !== model; });
      return proj.items.length > 0;
    }
    return true;
  });
  
  // เพิ่มใหม่
  for (var month in monthQtys) {
    if (projectName) {
      var existingProj = null;
      for (var i = 0; i < forecastData.projects.length; i++) {
        if (forecastData.projects[i].projectName === projectName && forecastData.projects[i].month === month) {
          existingProj = forecastData.projects[i];
          break;
        }
      }
      if (existingProj) {
        var itemExists = false;
        for (var j = 0; j < existingProj.items.length; j++) {
          if (existingProj.items[j].model === model) {
            existingProj.items[j].qty = monthQtys[month];
            itemExists = true;
            break;
          }
        }
        if (!itemExists) {
          existingProj.items.push({ model: model, qty: monthQtys[month] });
        }
      } else {
        forecastData.projects.push({
          id: 'proj_' + Date.now() + '_' + Math.random().toString(36).substr(2, 4),
          projectName: projectName,
          month: month,
          items: [{ model: model, qty: monthQtys[month] }],
          createdAt: new Date().toISOString()
        });
      }
    } else {
      forecastData.runrate.push({
        id: 'rr_' + Date.now() + '_' + Math.random().toString(36).substr(2, 4),
        model: model,
        qty: monthQtys[month],
        month: month,
        createdAt: new Date().toISOString()
      });
    }
  }
}

function removeForecastRow(model) {
  if (!confirm('ลบรายการ ' + model + ' ทั้งหมด?')) return;
  forecastData.runrate = forecastData.runrate.filter(function(rr) { return rr.model !== model; });
  forecastData.projects = forecastData.projects.filter(function(proj) {
    proj.items = proj.items.filter(function(it) { return it.model !== model; });
    return proj.items.length > 0;

// ===== EXCEL FUNCTIONS =====
function downloadForecastTemplate() {
  var wsData = [['Model / สินค้า', 'มิ.ย. 69', 'ก.ค. 69', 'ส.ค. 69', 'ก.ย. 69', 'ต.ค. 69', 'พ.ย. 69', 'ธ.ค. 69', 'โครงการ (ถ้ามี)']];
  for (var i = 0; i < allModels.slice(0, 30).length; i++) {
    wsData.push([allModels[i], 0, 0, 0, 0, 0, 0, 0, '']);
  }
  wsData.push(['อื่นๆ (โปรดระบุ)', 0, 0, 0, 0, 0, 0, 0, '']);
  var ws = XLSX.utils.aoa_to_sheet(wsData);
  var wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Forecast');
  XLSX.writeFile(wb, 'Forecast_Template_' + new Date().toISOString().split('T')[0] + '.xlsx');
}

function uploadExcelFile(input) {
  var file = input.files[0];
  if (!file) return;
  var reader = new FileReader();
  reader.onload = function(e) {
    var data = new Uint8Array(e.target.result);
    var workbook = XLSX.read(data, { type: 'array' });
    var sheet = workbook.Sheets[workbook.SheetNames[0]];
    var rows = XLSX.utils.sheet_to_json(sheet, { header: 1, defval: 0 });
    if (!rows || rows.length < 2) { alert('ไม่พบข้อมูล'); return; }
    
    var months = ['มิ.ย. 69', 'ก.ค. 69', 'ส.ค. 69', 'ก.ย. 69', 'ต.ค. 69', 'พ.ย. 69', 'ธ.ค. 69'];
    var newRunrates = [];
    
    for (var i = 1; i < rows.length; i++) {
      var row = rows[i];
      if (!row || !row[0]) continue;
      var model = row[0];
      if (!model || model === 'อื่นๆ (โปรดระบุ)') continue;
      for (var m = 0; m < months.length; m++) {
        var qty = parseInt(row[m+1]) || 0;
        if (qty > 0) {
          newRunrates.push({ model: model, qty: qty, month: months[m] });
        }
      }
    }
    
    for (var i = 0; i < newRunrates.length; i++) {
      var exists = false;
      for (var j = 0; j < forecastData.runrate.length; j++) {
        if (forecastData.runrate[j].model === newRunrates[i].model && forecastData.runrate[j].month === newRunrates[i].month) {
          forecastData.runrate[j].qty += newRunrates[i].qty;
          exists = true;
          break;
        }
      }
      if (!exists) {
        forecastData.runrate.push({
          id: 'rr_' + Date.now() + '_' + i + '_' + Math.random().toString(36).substr(2, 4),
          model: newRunrates[i].model,
          qty: newRunrates[i].qty,
          month: newRunrates[i].month,
          createdAt: new Date().toISOString()
        });
      }
    }
    saveClientForecast();
    input.value = '';
  };
  reader.readAsArrayBuffer(file);
}

  modalHtml += '<div class="modal-body">';
  modalHtml += '<div><label style="color:var(--text2);font-size:11px">สถานะ</label><div>' + getStatusLabel(p.status) + '</div></div>';
  modalHtml += '<div style="margin-top:10px"><label style="color:var(--text2);font-size:11px">End User</label><div>' + esc(p.endUserTH) + '</div></div>';
  modalHtml += '<div style="margin-top:10px"><label style="color:var(--text2);font-size:11px">สินค้า</label><div>' + itemsHtml + '</div></div>';
  modalHtml += '<div style="margin-top:10px"><label style="color:var(--text2);font-size:11px">Bidding Date</label><div>' + (p.biddingDate || '-') + '</div></div>';
  modalHtml += '<div style="margin-top:10px"><label style="color:var(--text2);font-size:11px">Shipment Date</label><div>' + (p.shipmentDate || '-') + '</div></div>';
  modalHtml += '</div>';
  modalHtml += '<div class="modal-footer"><button class="btn" onclick="closeModal()">ปิด</button></div>';
  modalHtml += '</div></div>';
  
  document.body.insertAdjacentHTML('beforeend', modalHtml);
}

// ===== ADD NEW PROJECT FROM CLIENT (PART 4) =====
function showAddProjectForm() {
  var modalHtml = '<div class="modal-overlay" onclick="if(event.target===this)closeModal()">';
  modalHtml += '<div class="modal-container">';
  modalHtml += '<div class="modal-header"><h3>➕ เพิ่มโครงการใหม่</h3><button class="modal-close" onclick="closeModal()">✕</button></div>';
  modalHtml += '<div class="modal-body">';
  modalHtml += '<div class="form-group"><label>📋 ชื่อโครงการ *</label><input type="text" id="newPipeProjectName" placeholder="เช่น โครงการ ม.เกษตรศาสตร์"></div>';
  modalHtml += '<div class="form-group"><label>👤 End User</label><input type="text" id="newPipeEndUser" placeholder="ชื่อหน่วยงาน"></div>';
  modalHtml += '<div class="form-group"><label>🏢 Unit Type</label><select id="newPipeUnitType"><option value="University">University</option><option value="Government">Government</option><option value="Military">Military</option><option value="Private">Private</option></select></div>';
  modalHtml += '<div class="form-group"><label>📦 สินค้า</label><div id="newPipeItems"></div><button class="btn btn-sm" onclick="addNewPipeItemRow()">➕ เพิ่มสินค้า</button></div>';
  modalHtml += '<div class="form-group"><label>📅 เดือนที่คาดส่งมอบ</label><select id="newPipeMonth">' + getMonthOptionsHtml() + '</select></div>';
  modalHtml += '</div>';
  modalHtml += '<div class="modal-footer">';
  modalHtml += '<button class="btn" onclick="closeModal()">ยกเลิก</button>';
  modalHtml += '<button class="btn btn-primary" onclick="submitNewPipeline()">💾 บันทึกโครงการ</button>';
  modalHtml += '</div></div></div>';
  
  document.body.insertAdjacentHTML('beforeend', modalHtml);
}

var newPipeItemsRows = [];
function addNewPipeItemRow() {
  var idx = newPipeItemsRows.length;
  var modelOptions = '<option value="">-- เลือกสินค้า --</option>';
  for (var i = 0; i < allModels.length; i++) {
    modelOptions += '<option value="' + esc(allModels[i]) + '">' + esc(allModels[i]) + '</option>';
  }
  var html = '<div class="forecast-item" id="newPipeItemRow_' + idx + '">';
  html += '<select id="newPipeModel_' + idx + '" style="flex:2">' + modelOptions + '</select>';
  html += '<input type="number" id="newPipeQty_' + idx + '" placeholder="จำนวน" style="width:80px" value="1">';
  html += '<button class="btn btn-sm btn-danger" onclick="removeNewPipeItemRow(' + idx + ')">🗑️</button>';
  html += '</div>';
  document.getElementById('newPipeItems').insertAdjacentHTML('beforeend', html);
  newPipeItemsRows.push(idx);
}

function removeNewPipeItemRow(idx) {
  var el = document.getElementById('newPipeItemRow_' + idx);
  if (el) el.remove();
  newPipeItemsRows = newPipeItemsRows.filter(function(i) { return i !== idx; });
}

function submitNewPipeline() {
  var projectName = document.getElementById('newPipeProjectName').value.trim();
  if (!projectName) { alert('กรุณากรอกชื่อโครงการ'); return; }
  
  var endUser = document.getElementById('newPipeEndUser').value.trim() || '-';
  var unitType = document.getElementById('newPipeUnitType').value;
  var month = document.getElementById('newPipeMonth').value;
  
  var items = [];
  for (var i = 0; i < newPipeItemsRows.length; i++) {
    var model = document.getElementById('newPipeModel_' + i);
    var qty = document.getElementById('newPipeQty_' + i);
    if (model && model.value && qty && parseInt(qty.value) > 0) {
      items.push({ model: model.value, qty: parseInt(qty.value) });
    }
  }
  
  if (!items.length) { alert('กรุณาเพิ่มสินค้าอย่างน้อย 1 รายการ'); return; }
  
  var allPipes = JSON.parse(localStorage.getItem('v7_pipeline') || '[]');
  var newPipe = {
    id: 'pipe_' + Date.now() + '_' + Math.random().toString(36).substr(2, 4),
    projectName: projectName,
    endUserTH: endUser,
    unitType: unitType,
    dealerId: dealerId,
    status: 'prospect',
    registerDate: new Date().toISOString().split('T')[0],
    shipmentDate: month,
    items: items,
    model: items[0].model,
    modelQty: items.reduce(function(sum, it) { return sum + it.qty; }, 0),
    forecastAmount: 0,
    created: new Date().toISOString()
  };
  allPipes.push(newPipe);
  localStorage.setItem('v7_pipeline', JSON.stringify(allPipes));
  
  var pipeLogs = JSON.parse(localStorage.getItem('v7_pipelog') || '[]');
  pipeLogs.unshift({
    id: 'log_' + Date.now(),
    pipeId: newPipe.id,
    type: 'update',
    content: '✅ ลูกค้าเพิ่มโครงการใหม่: ' + projectName,
    date: new Date().toISOString()
  });
  localStorage.setItem('v7_pipelog', JSON.stringify(pipeLogs));
  
  var tasks = JSON.parse(localStorage.getItem('v7_tasks') || '[]');
  tasks.unshift({
    id: 'task_' + Date.now(),
    title: '📋 ลูกค้าเพิ่มโครงการใหม่ - ' + projectName,
    description: 'ลูกค้า ' + dealerName + ' เพิ่มโครงการใหม่ กรุณาตรวจสอบและดำเนินการ\n\nโครงการ: ' + projectName + '\nEnd User: ' + endUser + '\nสินค้า: ' + items.map(function(it) { return it.model + ' x' + it.qty; }).join(', '),
    pipeId: newPipe.id,
    dealerId: dealerId,
    dueDate: new Date(Date.now() + 2 * 86400000).toISOString().split('T')[0],
    priority: 'high',
    status: 'active',
    category: 'New Project'
  });
  localStorage.setItem('v7_tasks', JSON.stringify(tasks));
  
  showSuccessToast('✅ เพิ่มโครงการ "' + projectName + '" เรียบร้อยแล้ว');
  closeModal();
  setTimeout(function() { loadPipeline(); renderCurrentTab(); }, 500);
}

function getMonthOptionsHtml() {
  var options = '';
  var now = new Date();
  for (var i = 0; i < 12; i++) {
    var d = new Date(now.getFullYear(), now.getMonth() + i, 1);
    var year = d.getFullYear() + 543;
    var month = d.getMonth() + 1;
    var value = d.getFullYear() + '-' + String(month).padStart(2, '0');
    var label = (month < 10 ? '0' + month : month) + '/' + year;
    options += '<option value="' + value + '">' + label + '</option>';
  }
  return options;
}

// ===== RENDER CURRENT TAB =====
function renderCurrentTab() {
  var content = '';
  if (currentTab === 'pipeline') content = renderPipelineTab();
  else if (currentTab === 'forecast') content = renderForecastTab();
  else content = renderTimelineTab();
  document.getElementById('tabContent').innerHTML = content;
}

// ===== LOAD ALL DATA =====
function loadAllData() {
  if (!dealerId) {
    document.getElementById('tabContent').innerHTML = '<div class="section" style="text-align:center"><p>❌ ไม่พบข้อมูล Dealer</p></div>';
    return;
  }
  
  var dealers = JSON.parse(localStorage.getItem('v7_dealers') || '[]');
  var dealer = dealers.find(function(d) { return d.id === dealerId; });
  if (!dealer) {
    document.getElementById('tabContent').innerHTML = '<div class="section" style="text-align:center"><p>❌ ไม่พบข้อมูล Dealer</p></div>';
    return;
  }
  
  dealerName = dealer.name || '-';
  document.getElementById('dealerName').innerHTML = esc(dealerName);
  document.getElementById('footerDate').innerHTML = new Date().toISOString().split('T')[0].replace(/-/g, '/');
  
  loadModels();
  loadPipeline();
  loadClientForecast();
  loadTimeline();
  renderCurrentTab();
}

// ===== TAB EVENT =====
document.getElementById('tabBar').addEventListener('click', function(e) {
  var btn = e.target.closest('.tab-btn');
  if (!btn) return;
  var tab = btn.dataset.tab;
  if (!tab) return;
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach(function(b) { b.classList.remove('active'); });
  btn.classList.add('active');
  renderCurrentTab();
});

window.toggleTheme = toggleTheme;

window.addNewPipeItemRow = addNewPipeItemRow;

// ===== START =====
loadAllData();
</script>
